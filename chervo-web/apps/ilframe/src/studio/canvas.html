<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>iLFrame - Canvas</title>
<style>
:root{
  --bg:rgba(245,245,247,.82);--ink:#1c1c1e;--ink2:rgba(242,242,247,.9);--ink3:rgba(0,0,0,.1);
  --accent:#FE0000;--red:#FE0000;--orange:#ff9f0a;--green:#34c759;--label:#8e8e93;
  --tb:48px;--prop:44px;
  --font:'Exo',-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;touch-action:none;user-select:none;font-family:var(--font);background:#fff;}
body{display:flex;flex-direction:column;}

#tabs { display: flex; height: 44px; background: #fff; border-bottom: 1px solid #e5e5ea; flex-shrink: 0;}
.tab { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 500; color: var(--label); text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; border-bottom: 3px solid transparent; transition:0.2s; }
.tab.active { color: var(--ink); border-bottom-color: var(--accent); }

.bar{ height:var(--tb); background:#fff; border-bottom:1px solid #e5e5ea; display:flex; align-items:center; padding:0 8px; flex-shrink:0; }
.tg{ display:flex; align-items:center; gap:2px; padding:0 6px; height:100%; border-right:1px solid rgba(0,0,0,.06); }
.tg:last-child{ border-right:none; }
.tb{ width:38px; height:38px; border-radius:8px; background:transparent; border:none; color:var(--ink); cursor:pointer; display:flex; align-items:center; justify-content:center; }
.tb svg{ width:20px; height:20px; fill:none; stroke:currentColor; stroke-width:1.1; stroke-linecap:round; stroke-linejoin:round; pointer-events:none; }
.tb.on{ background:var(--accent); color:#fff; }
.tb:active{ background:rgba(0,0,0,.08); }

#btn-herr { position:fixed; right:16px; top:110px; width:56px; height:56px; border-radius:50%; background:var(--accent); border:none; color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 12px rgba(254,0,0,.3); z-index:160; }
#btn-herr svg { width:24px; height:24px; fill:none; stroke:currentColor; stroke-width:1.4; stroke-linecap:round; stroke-linejoin:round; pointer-events:none;}
#panel-herr { position:fixed; right:16px; top:174px; background:#fff; border:1px solid #e5e5ea; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,.1); z-index:150; display:none; flex-direction:column; padding:8px; gap:6px; }
#panel-herr.open { display:flex; }
.phb { display: none; width:48px; height:48px; border-radius:10px; background:#f2f2f7; border:none; color:var(--ink); cursor:pointer; align-items:center; justify-content:center; }
.phb svg { width:24px; height:24px; fill:none; stroke:currentColor; stroke-width:1.1; stroke-linecap:round; stroke-linejoin:round; pointer-events:none;}
.phb.on { background:var(--accent); color:#fff; }

body[data-vista="planta"] .phb-planta { display: flex; }
body[data-vista="alzado"] .phb-alzado { display: flex; }
body[data-vista="techo"]  .phb-techo  { display: flex; }

#wrap{flex:1;position:relative;overflow:hidden;background:#f9f9f9;}
#cv{position:absolute;top:0;left:0;}

#propbar { height: var(--prop); background: #fff; border-top: 1px solid #e5e5ea; display: flex; align-items: center; padding: 0 16px; justify-content: space-between; cursor: pointer; flex-shrink: 0; z-index: 190; }
#pbTool { font-size: 14px; font-weight: 500; color: var(--accent); text-transform: uppercase; }
.pb-open-indicator { font-size: 13px; font-weight: 500; color: var(--label); text-transform: uppercase; letter-spacing: 0.5px;}

#prop-card { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #e5e5ea; border-radius: 12px 12px 0 0; box-shadow: 0 -8px 24px rgba(0,0,0,0.06); display: none; flex-direction: column; padding: 12px 16px 20px 16px; z-index: 200; max-height: 48vh; overflow-y: auto; }
.prop-header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; border-bottom: 2px solid #f2f2f7; padding-bottom: 6px; }
.prop-head { font-size: 14px; font-weight: 500; color: var(--accent); text-transform: uppercase; }

.prop-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.prop-row label { font-size: 14px; font-weight: 500; color: var(--label); text-transform: uppercase; }
.prop-row input[type="number"], .prop-row select { width: 120px; text-align: right; background: #f2f2f7; border: 1px solid #e5e5ea; border-radius: 6px; padding: 8px 10px; font-size: 16px; font-weight: 500; font-family: var(--font); color: var(--ink); outline: none; }
.prop-row input:focus { border-color: var(--accent); background: #fff;}
.prop-row input:disabled { opacity: 0.5; cursor: not-allowed; }
.prop-row select { text-align: left; }
.prop-row input[type="checkbox"] { width: 22px; height: 22px; accent-color: var(--accent); }

.prop-btn-full { width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: 6px; font-weight: 500; font-size: 14px; font-family: var(--font); cursor: pointer; margin-top: 6px; text-transform: uppercase; letter-spacing: 0.5px;}
.btn-outline { background: #fff; color: var(--accent); border: 1.5px solid var(--accent); }
.btn-outline:active { background: #f2f2f7; }

#ctx{display:none; position:fixed; z-index:300; background:rgba(255,255,255,.95); border:1px solid #e5e5ea; border-radius:12px; overflow:hidden; box-shadow:0 8px 32px rgba(0,0,0,.15); min-width:150px;}
#ctx.show{display:block;}
.ci{display:flex; align-items:center; gap:10px; padding:13px 16px; font-size:16px; font-weight:500; color:var(--ink); cursor:pointer; border-bottom:1px solid rgba(0,0,0,.06);}
.ci:last-child{border-bottom:none;}
.ci:active{background:rgba(254,0,0,.08);}
.ci svg{width:18px; height:18px; fill:none; stroke:currentColor; stroke-width:1.4;}
.ci.danger{color:var(--red);}
#toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:rgba(28,28,30,.9);color:#fff;padding:9px 18px;border-radius:20px;font-size:15px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:999;}
#toast.show{opacity:1;}
</style>
</head>
<body data-vista="planta">

<div id="tabs">
  <div class="tab active" id="tabPlanta" onclick="setVista('planta')">Planta</div>
  <div class="tab" id="tabAlzado" onclick="setVista('alzado')">Alzado</div>
  <div class="tab" id="tabTecho" onclick="setVista('techo')">Techo</div>
  <div class="tab" id="tab3D" onclick="setVista('3d')">3D</div>
</div>

<div class="bar">
  <div class="tg">
    <button class="tb" onclick="undo()"><svg viewBox="0 0 24 24"><path d="M3 10h10a6 6 0 010 12H3"/><polyline points="7 6 3 10 7 14"/></svg></button>
  </div>
  <div class="tg">
    <button class="tb on" id="snapBtn" onclick="toggleSnap()"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="2"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg></button>
  </div>
  <div style="flex:1"></div>
  <div class="tg" style="border:none">
    <button class="tb" onclick="descargarVista()" title="Descargar Imagen"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
    <button class="tb on" data-t="select" id="escBtn" onclick="ST('select')"><svg viewBox="0 0 24 24"><path d="M5 3l14 9-7 1-4 7z"/></svg></button>
  </div>
</div>

<button id="btn-herr" onclick="toggleTools()"><svg viewBox="0 0 24 24"><rect x="3" y="8" width="18" height="8" rx="1"/></svg></button>
<div id="panel-herr">
  <button class="phb phb-planta" data-t="wall" onclick="ST('wall');toggleTools()"><svg viewBox="0 0 24 24"><rect x="3" y="8" width="18" height="8" rx="1"/></svg></button>
  <button class="phb phb-planta" data-t="cercha" onclick="ST('cercha');toggleTools()"><svg viewBox="0 0 24 24"><path d="M2 22 L12 2 L22 22 Z M2 22 L22 22 M12 2 L12 22 M7 12 L17 12"/></svg></button>
  <button class="phb phb-planta" data-t="columna" onclick="ST('columna');toggleTools()"><svg viewBox="0 0 24 24"><rect x="9" y="3" width="6" height="18" rx="1"/></svg></button>
  <button class="phb phb-planta" data-t="join" onclick="ST('join');toggleTools()"><svg viewBox="0 0 24 24"><path d="M4 14h6v6"/><path d="M14 4v6h6"/><path d="M10 14L4 20"/><path d="M20 4l-6 6"/></svg></button>
  <button class="phb phb-planta phb-alzado phb-techo" data-t="guide" onclick="ST('guide');toggleTools()"><svg viewBox="0 0 24 24"><line x1="12" y1="2" x2="12" y2="22" stroke-dasharray="4 4"/><line x1="2" y1="12" x2="22" y2="12" stroke-dasharray="4 4"/></svg></button>

  <button class="phb phb-alzado" data-t="puerta" onclick="ST('puerta');toggleTools()"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path></svg></button>
  <button class="phb phb-alzado" data-t="ventana" onclick="ST('ventana');toggleTools()"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line></svg></button>
  <button class="phb phb-alzado" data-t="vano" onclick="ST('vano');toggleTools()"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2" stroke-dasharray="4 4"></rect></svg></button>

  <button class="phb phb-techo" data-t="roof" onclick="ST('roof');toggleTools()"><svg viewBox="0 0 24 24"><polygon points="2,12 12,2 22,12"/><rect x="4" y="12" width="16" height="10"/></svg></button>
  <button class="phb phb-techo" data-t="babeta" onclick="ST('babeta');toggleTools()"><svg viewBox="0 0 24 24"><polyline points="4,20 10,12 16,16 22,6"/></svg></button>
</div>

<div id="wrap"><canvas id="cv"></canvas></div>

<div id="ctx">
  <div class="ci" onclick="ctxDo('move')"><svg viewBox="0 0 24 24"><polyline points="5 9 2 12 5 15"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg> Mover</div>
  <div class="ci" onclick="ctxDo('copy')"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/></svg> Copiar</div>
  <div class="ci" onclick="ctxDo('rotate')"><svg viewBox="0 0 24 24"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0115-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 01-15 6.7L3 16"/></svg> Rotar</div>
  <div class="ci danger" onclick="ctxDo('delete')"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/></svg> Borrar</div>
</div>

<div id="propbar" onclick="abrirPanelDesdeBarra()">
  <span id="pbTool">Select</span>
  <span class="pb-open-indicator" id="pb-indicator">Editar Medidas ▴</span>
</div>

<div id="prop-card">
  <div class="prop-header-row">
    <div class="prop-head" id="pc-title">PROPIEDADES</div>
    <button onclick="cerrarPanelCard()" style="background:none; border:none; color:var(--label); font-weight:500; padding:4px; cursor:pointer; font-size:13px;">CERRAR</button>
  </div>
  <div id="pc-content"></div>
</div>

<div id="toast"></div>

<script>
const cv = document.getElementById('cv'), ctx = cv.getContext('2d'), wrap = document.getElementById('wrap');

let vpX = 0, vpY = 0, vpZ = 0.1, cellPx = 400, snapOn = true, tool = 'wall';
let objects = [], nextId = 1, history = [];
let drawing = false, dragStartW = null, dragCurW = null;
let startObjId = null, polyPts = [];

let nextWallNum = 1, nextCerchaNum = 1, nextColNum = 1, espesorActual = 100;
let seleccionId = null, seleccionAbId = null, vistaActual = 'planta', muroAlzadoId = null;

let panning = false, panRef = null, pinching = false, pinch0 = null, touches = {};
let longTimer = null, forceCardOpen = false;

let lastCopyData = null;
let guideData = { hitWall: false, angle: 0, startP: null };

const kEnt = "if(event.key==='Enter'){ this.blur(); }";

// ── Tipos definidos en Componentes (material de cada pieza) ─────
let ilWalls = []; // [{ name, espesorMm }]
let wallTypeIdx = 0;
function ilSetWall(idx) { wallTypeIdx = +idx; const w = ilWalls[wallTypeIdx]; if (w && w.espesorMm) espesorActual = w.espesorMm; }

// ── Puente con la app (caja de proyectos) ──────────────────────
let _saveT = null;
function ilPersist() {
  clearTimeout(_saveT);
  _saveT = setTimeout(() => {
    try { parent.postMessage({ ilframe: 'studio', objects, meta: { nextId, nextWallNum, nextCerchaNum, nextColNum } }, '*'); } catch (e) {}
  }, 400);
}
window.addEventListener('message', (e) => {
  const d = e.data || {};
  if (d.ilframe === 'load' && Array.isArray(d.objects)) {
    objects = d.objects;
    const m = d.meta || {};
    nextId = m.nextId || (objects.reduce((a, o) => Math.max(a, o.id || 0), 0) + 1);
    nextWallNum = m.nextWallNum || 1; nextCerchaNum = m.nextCerchaNum || 1; nextColNum = m.nextColNum || 1;
    render();
  } else if (d.ilframe === 'types') {
    ilWalls = Array.isArray(d.walls) ? d.walls : [];
    if (ilWalls.length) { if (wallTypeIdx >= ilWalls.length) wallTypeIdx = 0; const w = ilWalls[wallTypeIdx]; if (w && w.espesorMm) espesorActual = w.espesorMm; }
    if (tool === 'wall') actualizarPropBar();
  }
});

const w2s = (wx, wy) => vistaActual === 'alzado' ? {x: wx*vpZ + vpX, y: vpY - wy*vpZ} : {x: wx*vpZ + vpX, y: wy*vpZ + vpY};
const s2w = (sx, sy) => vistaActual === 'alzado' ? {x: (sx - vpX)/vpZ, y: (vpY - sy)/vpZ} : {x: (sx - vpX)/vpZ, y: (sy - vpY)/vpZ};
const hyp = (a, b) => Math.sqrt(a*a + b*b);
function getS(e) { let t = e; if (e.touches && e.touches.length > 0) t = e.touches[0]; else if (e.changedTouches && e.changedTouches.length > 0) t = e.changedTouches[0]; const r = cv.getBoundingClientRect(); return {x: t.clientX - r.left, y: t.clientY - r.top}; }
function snp(v) { return snapOn ? Math.round(v/cellPx)*cellPx : v; }

function getLineDistance(p, lineStart, lineAngle) { return (p.x - lineStart.x) * -Math.sin(lineAngle) + (p.y - lineStart.y) * Math.cos(lineAngle); }

function getW(e) {
  const raw = s2w(getS(e).x, getS(e).y);
  if (!snapOn || vistaActual === '3d') return raw;
  let bestSnap = null; let bestD = 20 / vpZ;
  for (const obj of objects) {
    if (obj.type === 'guide' && obj.env === vistaActual) {
      const uX = Math.cos(obj.angle), uY = Math.sin(obj.angle);
      const dx = raw.x - obj.pt[0], dy = raw.y - obj.pt[1];
      const dist = Math.abs(dx * (-uY) + dy * uX);
      if (dist < bestD) { bestD = dist; const projL = dx * uX + dy * uY; bestSnap = { x: obj.pt[0] + projL * uX, y: obj.pt[1] + projL * uY }; }
    }
  }
  if (bestSnap) return { x: Math.round(bestSnap.x), y: Math.round(bestSnap.y) };
  return {x: snp(raw.x), y: snp(raw.y)};
}

function intersect(x1, y1, x2, y2, x3, y3, x4, y4) { const denom = (y4-y3)*(x2-x1) - (x4-x3)*(y2-y1); if (denom === 0) return null; const ua = ((x4-x3)*(y1-y3) - (y4-y3)*(x1-x3)) / denom; return {x: x1 + ua*(x2-x1), y: y1 + ua*(y2-y1)}; }
function distPS(p, a, b) { const dx=b[0]-a[0], dy=b[1]-a[1], l2=dx*dx+dy*dy; if(!l2) return hyp(p.x-a[0], p.y-a[1]); const t=Math.max(0, Math.min(1, ((p.x-a[0])*dx+(p.y-a[1])*dy)/l2)); return hyp(p.x-(a[0]+t*dx), p.y-(a[1]+t*dy)); }
function isPointOnSegment(p, a, b, tol=100) { const d1 = hyp(p.x-a[0], p.y-a[1]), d2 = hyp(p.x-b[0], p.y-b[1]), l = hyp(a[0]-b[0], a[1]-b[1]); return Math.abs((d1+d2) - l) <= tol; }

function resize() { cv.width = wrap.clientWidth; cv.height = wrap.clientHeight; if(vpX === 0 && vpY === 0) { vpX = cv.width/2; vpY = cv.height/2; } render(); }
window.addEventListener('resize', resize);

function getRoofZ(r, px, py) {
  const alero = r.alero || 0; const x1 = Math.min(r.p1[0], r.p2[0]) - alero, y1 = Math.min(r.p1[1], r.p2[1]) - alero;
  const w = Math.abs(r.p2[0] - r.p1[0]) + alero*2, h = Math.abs(r.p2[1] - r.p1[1]) + alero*2;
  const x2 = x1+w, y2 = y1+h; let z = r.hBase;
  if(r.fallDir === 'abajo') z += (y2 - py) * (r.slope/100); else if(r.fallDir === 'arriba') z += (py - y1) * (r.slope/100);
  else if(r.fallDir === 'der') z += (x2 - px) * (r.slope/100); else if(r.fallDir === 'izq') z += (px - x1) * (r.slope/100); return z;
}

function centerCameraOnWall(muro) {
  if (muro.type === 'columna') {
    vpX = cv.width/2 - muro.pt[0]*vpZ; vpY = cv.height/2 - muro.pt[1]*vpZ;
  } else {
    vpX = cv.width/2 - ((muro.pA[0]+muro.pB[0])/2)*vpZ; vpY = cv.height/2 - ((muro.pA[1]+muro.pB[1])/2)*vpZ;
  }
}

function autoFitAlzado(muro) {
  let l = 1000, hMax = 3000;
  if (muro.type === 'wall') { l = hyp(muro.pB[0]-muro.pA[0], muro.pB[1]-muro.pA[1]); hMax = Math.max(muro.hA, muro.hB, muro.peak ? muro.peak.y : 0); }
  else if (muro.type === 'cercha') { l = hyp(muro.pB[0]-muro.pA[0], muro.pB[1]-muro.pA[1]); hMax = Math.max(muro.hIzq, muro.hDer) + muro.hPico; }
  else if (muro.type === 'columna') { l = Math.max(muro.anchoBase, muro.anchoTope); hMax = muro.altura; }

  const zoomX = (cv.width * 0.75) / l, zoomY = (cv.height * 0.60) / hMax;
  vpZ = Math.min(zoomX, zoomY, 0.4); vpX = (cv.width - (l * vpZ)) / 2; vpY = cv.height - ((cv.height - (hMax * vpZ)) / 2);
}

function setVista(vista) {
  document.querySelectorAll('.phb').forEach(e => e.style.display = 'none');
  let targetMuro = null;
  if(seleccionId) { const m = objects.find(o=>o.id===seleccionId); if(m && (m.type==='wall'||m.type==='cercha'||m.type==='columna')) targetMuro = m; }
  if(!targetMuro && muroAlzadoId) { const m = objects.find(o=>o.id===muroAlzadoId); if(m) targetMuro = m; }

  if (vista === 'alzado') {
    if (!targetMuro) { toast("Seleccioná un Panel/Cercha/Columna en Planta"); return; }
    muroAlzadoId = targetMuro.id; seleccionId = targetMuro.id; vistaActual = 'alzado';
    document.querySelectorAll('.phb-alzado, .phb-alzado.phb-techo').forEach(e => e.style.display = 'flex'); autoFitAlzado(targetMuro);
  } else if (vista === '3d') {
    vistaActual = '3d'; vpZ = 0.05; vpX = cv.width/2; vpY = cv.height/2;
  } else if (vista === 'techo') {
    vistaActual = 'techo'; vpZ = 0.1; if(targetMuro) centerCameraOnWall(targetMuro); else { vpX = cv.width/2; vpY = cv.height/2; }
    document.querySelectorAll('.phb-techo').forEach(e => e.style.display = 'flex');
  } else {
    vistaActual = 'planta'; vpZ = 0.1; if(targetMuro) centerCameraOnWall(targetMuro); else { vpX = cv.width/2; vpY = cv.height/2; }
    document.querySelectorAll('.phb-planta').forEach(e => e.style.display = 'flex');
  }

  document.body.dataset.vista = vista; document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(vista === '3d' ? 'tab3D' : (vista === 'alzado' ? 'tabAlzado' : (vista === 'techo' ? 'tabTecho' : 'tabPlanta'))).classList.add('active');
  forceCardOpen = false; drawing = false; polyPts = []; ST('select'); render();
}

function descargarVista() {
  render();
  const tempCanvas = document.createElement('canvas'); tempCanvas.width = cv.width; tempCanvas.height = cv.height; const tCtx = tempCanvas.getContext('2d');
  tCtx.fillStyle = '#ffffff'; tCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height); tCtx.drawImage(cv, 0, 0);
  const a = document.createElement('a'); let name = vistaActual; if (vistaActual === 'alzado' && muroAlzadoId) { const m = objects.find(o=>o.id===muroAlzadoId); name += `_${m ? m.label : ''}`; }
  a.download = `iLFrame_${name}.png`; a.href = tempCanvas.toDataURL('image/png'); a.click(); toast("Plano exportado");
}

function render() {
  ctx.clearRect(0, 0, cv.width, cv.height);
  if (vistaActual === '3d') { draw3D(); } else {
    drawGrid(); objects.filter(o => o.type === 'guide' && o.env === vistaActual).forEach(drawObj);
    if (vistaActual === 'planta') { objects.filter(o => o.type !== 'guide' && o.type !== 'roof' && o.type !== 'babeta').forEach(drawObj); drawPreview(); }
    else if (vistaActual === 'alzado' && muroAlzadoId) {
      const m=objects.find(o=>o.id===muroAlzadoId);

    shouldResetDrawing = false; if(!drawing) { saveHistory(); drawing = true; polyPts = [{...wp}]; forceCardOpen = true; actualizarPropBar(); } else { if(polyPts.length > 2 && hyp(wp.x - polyPts[0].x, wp.y - polyPts[0].y) < 30/vpZ) { polyPts.push({...polyPts[0]}); objects.push({type:'babeta', id:nextId++, pts: [...polyPts]}); drawing = false; polyPts = []; toast("Babeta cerrada"); ST('select'); ilPersist(); } else { polyPts.push({...wp}); } }

    objects.push({type:'guide', id:nextId++, env: vistaActual, angle: finalAng, pt: finalPt}); seleccionId = nextId-1; forceCardOpen = true; ST('select'); ilPersist();
  } else if ((tool === 'puerta' || tool === 'ventana' || tool === 'vano') && drawing && vistaActual === 'alzado' && muroAlzadoId) {
    const m = objects.find(o => o.id === muroAlzadoId);
    if(m && m.type === 'wall') { const x1 = Math.min(dragStartW.x, dragCurW.x), w = Math.abs(dragCurW.x - dragStartW.x), y1 = Math.min(dragStartW.y, dragCurW.y), h = Math.abs(dragCurW.y - dragStartW.y); if(w > 120 && h > 120) { const nId = nextId++; let subType=tool==='puerta'?'batiente':(tool==='ventana'?'corrediza':'vano'); m.aberturas.push({id: nId, type: tool, subType: subType, x: x1, y: y1, w: w, h: h, flipX: false, flipY: false}); seleccionAbId = nId; forceCardOpen = true; ST('select'); ilPersist(); } else { history.pop(); } }
  } else if (tool === 'move' && drawing && seleccionId) {
    const obj = objects.find(o=>o.id===seleccionId);
    if(obj) { saveHistory(); const dx = dragCurW.x-dragStartW.x, dy = dragCurW.y-dragStartW.y; if(obj.type==='wall' || obj.type==='cercha'){ obj.pA[0]+=dx; obj.pA[1]+=dy; obj.pB[0]+=dx; obj.pB[1]+=dy; } else if(obj.type==='columna') { obj.pt[0]+=dx; obj.pt[1]+=dy; } else if(obj.type==='roof'){ obj.p1[0]+=dx; obj.p1[1]+=dy; obj.p2[0]+=dx; obj.p2[1]+=dy; } else if(obj.type==='babeta'){ obj.pts.forEach(p=>{p.x+=dx;p.y+=dy;}); } ilPersist(); } ST('select');
  } else if (tool === 'copy' && drawing && seleccionId) {
    const m = objects.find(o=>o.id===seleccionId);
    if(m && (m.type==='wall' || m.type==='cercha' || m.type==='columna')) {
      saveHistory(); const dx = dragCurW.x-dragStartW.x, dy = dragCurW.y-dragStartW.y; const clon = JSON.parse(JSON.stringify(m)); clon.id = nextId++;

    let targetId = null; let bestD = 25/vpZ; for(const obj of objects) { if(obj.type==='wall' && obj.id !== startObjId && distPS(wp, obj.pA, obj.pB)<bestD) { bestD=distPS(wp,obj.pA,obj.pB); targetId=obj.id; }}
    if(targetId) { const mA = objects.find(o=>o.id===startObjId), mB = objects.find(o=>o.id===targetId); const I = intersect(mA.pA[0], mA.pA[1], mA.pB[0], mA.pB[1], mB.pA[0], mB.pA[1], mB.pB[0], mB.pB[1]); if(I) { saveHistory(); const dAa = hyp(I.x-mA.pA[0], I.y-mA.pA[1]), dAb = hyp(I.x-mA.pB[0], I.y-mA.pB[1]); if(dAa < dAb) { mA.pA = [I.x, I.y]; } else { mA.pB = [I.x, I.y]; } if(!isPointOnSegment(I, mB.pA, mB.pB, 200)) { const dBa = hyp(I.x-mB.pA[0], I.y-mB.pA[1]), dBb = hyp(I.x-mB.pB[0], I.y-mB.pB[1]); if(dBa < dBb) { mB.pA = [I.x, I.y]; } else { mB.pB = [I.x, I.y]; } } toast("Unión Completada"); ilPersist(); } } ST('select');
  }

function onCancel(e) { touches = {}; pinching = false; pinch0 = null; panning = false; panRef = null; drawing = false; dragStartW = null; render(); }
cv.addEventListener('touchstart', onDown, {passive: false}); cv.addEventListener('touchmove', onMove, {passive: false}); cv.addEventListener('touchend', onUp, {passive: false}); cv.addEventListener('touchcancel', onCancel, {passive: false});

function ejecutarMatriz(tipo, valor) {
  if (!lastCopyData) return; const num = parseInt(valor); if (isNaN(num) || num < 2) return; const src = objects.find(o => o.id === lastCopyData.srcId); if (!src) return;
  saveHistory(); objects = objects.filter(o => o.id !== lastCopyData.newId);
  if (tipo === 'repetir') {
    for (let i = 1; i <= num; i++) {
      const clon = JSON.parse(JSON.stringify(src)); clon.id = nextId++;
      if (src.type === 'columna') { clon.label = 'P'+nextColNum++; clon.pt[0] += lastCopyData.dx * i; clon.pt[1] += lastCopyData.dy * i; }
      else { clon.label = (src.type==='wall'?'M':'C')+(src.type==='wall'?nextWallNum++:nextCerchaNum++); clon.pA[0] += lastCopyData.dx * i; clon.pA[1] += lastCopyData.dy * i; clon.pB[0] += lastCopyData.dx * i; clon.pB[1] += lastCopyData.dy * i; }
      objects.push(clon);
    } toast(`Matriz: ${num} repeticiones`);
  } else if (tipo === 'dividir') {
    for (let i = 1; i < num; i++) {
      const stepX = (lastCopyData.dx / num) * i, stepY = (lastCopyData.dy / num) * i;
      const clon = JSON.parse(JSON.stringify(src)); clon.id = nextId++;
      if (src.type === 'columna') { clon.label = 'P'+nextColNum++; clon.pt[0] += stepX; clon.pt[1] += stepY; }
      else { clon.label = (src.type==='wall'?'M':'C')+(src.type==='wall'?nextWallNum++:nextCerchaNum++); clon.pA[0] += stepX; clon.pA[1] += stepY; clon.pB[0] += stepX; clon.pB[1] += stepY; }
      objects.push(clon);
    }
    const finalClon = JSON.parse(JSON.stringify(src)); finalClon.id = nextId++;
    if (src.type === 'columna') { finalClon.label = 'P'+nextColNum++; finalClon.pt[0] += lastCopyData.dx; finalClon.pt[1] += lastCopyData.dy; }
    else { finalClon.label = (src.type==='wall'?'M':'C')+(src.type==='wall'?nextWallNum++:nextCerchaNum++); finalClon.pA[0] += lastCopyData.dx; finalClon.pA[1] += lastCopyData.dy; finalClon.pB[0] += lastCopyData.dx; finalClon.pB[1] += lastCopyData.dy; }
    objects.push(finalClon); toast(`Copia dividida en ${num} espacios`);
  } lastCopyData = null; seleccionId = null; forceCardOpen = false; ST('select'); ilPersist();
}

function modRoof(prop, val) { if(!seleccionId) return; const r = objects.find(o=>o.id===seleccionId); if(!r || r.type!=='roof') return; saveHistory(); if(prop === 'hBase' || prop === 'slope' || prop === 'alero') r[prop] = parseFloat(val); else if(prop === 'fallDir') r.fallDir = val; render(); ilPersist(); }
function modAb(prop, val) { if(!seleccionId || !seleccionAbId) return; const m = objects.find(o=>o.id===seleccionId); if(!m) return; const ab = m.aberturas.find(a=>a.id===seleccionAbId); if(!ab) return; saveHistory(); let v = parseFloat(val)*1000; let align = document.getElementById('selAbAlign') ? document.getElementById('selAbAlign').value : 'dintel'; if (prop === 'y_align') { if (align === 'dintel') ab.y = v - ab.h; else ab.y = v; } else if (prop === 'h') { if (align === 'dintel') { let currDintel = ab.y + ab.h; ab.h = v; ab.y = currDintel - ab.h; } else { ab.h = v; } } else { ab[prop] = v; } render(); ilPersist(); }
function modAbSubType(val) { if(!seleccionId || !seleccionAbId) return; const ab = objects.find(o=>o.id===seleccionId).aberturas.find(a=>a.id===seleccionAbId); saveHistory(); ab.subType = val; render(); ilPersist(); }
function flipAb(axis) { if(!seleccionId || !seleccionAbId) return; const ab = objects.find(o=>o.id===seleccionId).aberturas.find(a=>a.id===seleccionAbId); saveHistory(); if(axis === 'x') ab.flipX = !ab.flipX; if(axis === 'y') ab.flipY = !ab.flipY; render(); ilPersist(); }
function modGuide(val) { if(!seleccionId) return; const g = objects.find(o=>o.id===seleccionId); if(!g || g.type!=='guide') return; saveHistory(); const dist = parseFloat(val)*1000; g.pt[0] += -Math.sin(g.angle) * dist; g.pt[1] += Math.cos(g.angle) * dist; render(); ilPersist(); }

function modColumna(prop, val) {
  if(!seleccionId) return; const c = objects.find(o=>o.id===seleccionId); if(!c || c.type!=='columna') return; saveHistory();

  else if(prop === 'divisiones') c.divisiones = parseInt(val);
  else if(prop === 'ang') { c.angle = parseFloat(val)*(Math.PI/180); ST('select'); }
  else c[prop] = parseFloat(val)*1000; render(); ilPersist();

function modMuro(prop, val) {
  if(!seleccionId) return; const m = objects.find(o=>o.id===seleccionId); if(!m || m.type!=='wall') return; saveHistory();
  if(prop === 'largo') { const v = parseFloat(val)*1000; const a = Math.atan2(m.pB[1]-m.pA[1], m.pB[0]-m.pA[0]); m.pB=[m.pA[0]+Math.cos(a)*v, m.pA[1]+Math.sin(a)*v]; }
  else if(prop === 'hA' || prop === 'hB') m[prop] = parseFloat(val)*1000; else if(prop === 'techo') m.proyectaTecho = val;
  else if(prop === 'ang') { const ang = parseFloat(val)*(Math.PI/180); const cx=(m.pA[0]+m.pB[0])/2, cy=(m.pA[1]+m.pB[1])/2, l=hyp(m.pB[0]-m.pA[0], m.pB[1]-m.pA[1]); m.pA=[cx-Math.cos(ang)*l/2, cy-Math.sin(ang)*l/2]; m.pB=[cx+Math.cos(ang)*l/2, cy+Math.sin(ang)*l/2]; ST('select'); }
  else if(prop === 'addPeak') { const l = hyp(m.pB[0]-m.pA[0], m.pB[1]-m.pA[1]); m.peak = {x: l/2, y: 3000}; forceCardOpen=true; actualizarPropBar(); }
  else if(prop === 'removePeak') { m.peak = null; forceCardOpen=true; actualizarPropBar(); }
  else if(prop === 'peakX') m.peak.x = parseFloat(val)*1000; else if(prop === 'peakY') m.peak.y = parseFloat(val)*1000; render(); ilPersist();
}

function modCercha(prop, val) {
  if(!seleccionId) return; const c = objects.find(o=>o.id===seleccionId); if(!c || c.type!=='cercha') return; saveHistory();
  if(prop === 'largo') { const v = parseFloat(val)*1000; const a = Math.atan2(c.pB[1]-c.pA[1], c.pB[0]-c.pA[0]); c.pB=[c.pA[0]+Math.cos(a)*v, c.pA[1]+Math.sin(a)*v]; }

        let alignOptions = `<select id="selAbAlign"><option value="dintel" selected>Dintel</option><option value="antepecho">Antepecho</option></select>`; let vY = ((ab.y + ab.h)/1000).toFixed(2); let storedAlign = window.lastAlign || 'dintel'; if(storedAlign === 'antepecho') { alignOptions = `<select id="selAbAlign"><option value="dintel">Dintel</option><option value="antepecho" selected>Antepecho</option></select>`; vY = (ab.y/1000).toFixed(2); }
        let flipBtns = ab.type !== 'vano' ? `<div style="display:flex; gap:8px; margin-top:4px;"><button class="prop-btn-full btn-outline" style="margin-top:0;" onclick="flipAb('x')">Mano ⇄</button><button class="prop-btn-full btn-outline" style="margin-top:0;" onclick="flipAb('y')">Giro ↕</button></div>` : '';
        content.innerHTML = `${subTypeOptions}<div class="prop-row"><label>Posición X (m)</label><input type="number" step="0.01" value="${(ab.x/1000).toFixed(2)}" onchange="modAb('x', this.value)" onkeydown="${kEnt}"></div><div class="prop-row">${alignOptions}<input type="number" step="0.01" value="${vY}" onchange="modAb('y_align', this.value)" onkeydown="${kEnt}"></div><div class="prop-row"><label>Ancho (m)</label><input type="number" step="0.01" value="${(ab.w/1000).toFixed(2)}" onchange="modAb('w', this.value)" onkeydown="${kEnt}"></div><div class="prop-row"><label>Alto (m)</label><input type="number" step="0.01" value="${(ab.h/1000).toFixed(2)}" onchange="modAb('h', this.value)" onkeydown="${kEnt}"></div>${flipBtns}`;
        document.getElementById('selAbAlign').addEventListener('change', function(){ window.lastAlign = this.value; forceCardOpen=true; actualizarPropBar(); });
      }
    }
    else if(seleccionId) {
      const o = objects.find(ob=>ob.id===seleccionId); if(!o) return;
      if(o.type === 'guide') {
        barTool.textContent = `LÍNEA GUÍA`; ind.textContent = 'Propiedades ▾';
        if(showCard) { card.style.display = 'flex'; title.textContent = `LÍNEA GUÍA`; content.innerHTML = `<div class="prop-row"><label>Desplazar Perpendicular (m)</label><input type="number" step="0.01" value="0" onchange="modGuide(this.value)" onkeydown="${kEnt}" placeholder="Ej: 0.50"></div><button class="prop-btn-full" style="background:var(--red);" onclick="ctxDo('delete')">ELIMINAR GUÍA</button>`; }
      }
      else if(o.type === 'roof') {
        barTool.textContent = `CUBIERTA`; ind.textContent = 'Propiedades ▾';
        if(showCard) {
          card.style.display = 'flex'; title.textContent = `PROPIEDADES CUBIERTA`;
          content.innerHTML = `<div class="prop-row"><label>Volado (m)</label><input type="number" step="0.01" value="${((o.alero||0)/1000).toFixed(2)}" onchange="modRoof('alero', this.value*1000)" onkeydown="${kEnt}"></div><div class="prop-row"><label>Altura Apoyo (m)</label><input type="number" step="0.01" value="${(o.hBase/1000).toFixed(2)}" onchange="modRoof('hBase', this.value*1000)" onkeydown="${kEnt}"></div><div class="prop-row"><label>Pendiente (%)</label><input type="number" step="1" value="${o.slope}" onchange="modRoof('slope', this.value)" onkeydown="${kEnt}"></div><div class="prop-row"><label>Caída</label><select onchange="modRoof('fallDir', this.value)"><option value="abajo" ${o.fallDir==='abajo'?'selected':''}>Hacia Abajo ↓</option><option value="arriba" ${o.fallDir==='arriba'?'selected':''}>Hacia Arriba ↑</option><option value="der" ${o.fallDir==='der'?'selected':''}>Hacia Derecha →</option><option value="izq" ${o.fallDir==='izq'?'selected':''}>Hacia Izquierda ←</option></select></div>`;
        }
      }
      else if(o.type === 'babeta') { barTool.textContent = `BABETA`; ind.textContent = 'Seleccionada ▾'; if(showCard) { card.style.display = 'flex'; title.textContent = `BABETA (PRETIL)`; content.innerHTML = `<p style="font-size:14px; color:var(--label); text-align:center;">Línea de restricción para el techo. Usá el menú de mantener presionado para borrarla o moverla.</p>`; } }
      else if(o.type === 'columna') {
        barTool.textContent = `COLUMNA ${o.label}`; ind.textContent = 'Propiedades ▾';
        if(showCard) {
          card.style.display = 'flex'; title.textContent = `Pilar ${o.label}`; const matrizHtml = getMatrizHtml(o.id);
          if (vistaActual === 'planta') {
             content.innerHTML = matrizHtml + `<p style="font-size:14px; color:var(--label); text-align:center; margin-bottom:8px;">Pasá a la vista ALZADO para editar las dimensiones.</p><button class="prop-btn-full btn-outline" onclick="ST('rotate_edit')">ROTAR COLUMNA</button>`;
          } else {
             content.innerHTML = matrizHtml + `
              <div class="prop-row"><label>Altura Total (m)</label><input type="number" step="0.01" value="${(o.altura/1000).toFixed(2)}" onchange="modColumna('altura', this.value)" onkeydown="${kEnt}"></div>
              <div class="prop-row"><label>Ancho Base (m)</label><input type="number" step="0.01" value="${(o.anchoBase/1000).toFixed(2)}" onchange="modColumna('anchoBase', this.value)" onkeydown="${kEnt}"></div>
              <div class="prop-row"><label>Ancho Tope (m)</label><input type="number" step="0.01" value="${(o.anchoTope/1000).toFixed(2)}" onchange="modColumna('anchoTope', this.value)" onkeydown="${kEnt}"></div>
              <div class="prop-row"><label>Cara a Plomo</label><select onchange="modColumna('caraRecta', this.value)"><option value="IZQ" ${o.caraRecta==='IZQ'?'selected':''}>Izquierda</option><option value="DER" ${o.caraRecta==='DER'?'selected':''}>Derecha</option><option value="CENTRO" ${o.caraRecta==='CENTRO'?'selected':''}>Centro (Simétrica)</option></select></div>
              <div class="prop-row"><label>Retícula</label><select onchange="modColumna('patron', this.value)"><option value="WARREN" ${o.patron==='WARREN'?'selected':''}>Warren (Zig-Zag)</option><option value="X_CROSS" ${o.patron==='X_CROSS'?'selected':''}>Cruces</option><option value="LADDER" ${o.patron==='LADDER'?'selected':''}>Escalera</option></select></div>
              <div class="prop-row"><label>Divisiones Verticales</label><input type="number" step="1" value="${o.divisiones}" onchange="modColumna('divisiones', this.value)" onkeydown="${kEnt}"></div>
             `;
          }
        }
      }
      else if(o.type === 'cercha') {
        barTool.textContent = `ESTRUCTURA ${o.label}`; ind.textContent = 'Propiedades ▾';
        if(showCard) {
          card.style.display = 'flex'; title.textContent = `CERCHA / VIGA ${o.label}`; const matrizHtml = getMatrizHtml(o.id);
          if(vistaActual === 'planta' || vistaActual === 'techo') {
            let l = (hyp(o.pB[0]-o.pA[0], o.pB[1]-o.pA[1])/1000).toFixed(2); content.innerHTML = matrizHtml + `<div class="prop-row"><label>Largo (m)</label><input type="number" step="0.01" value="${l}" onchange="modCercha('largo', this.value)" onkeydown="${kEnt}"></div>`;
          } else if(vistaActual === 'alzado') {
            content.innerHTML = matrizHtml + `
              <div class="prop-row"><label>Modelo</label><select onchange="modCercha('modelo', this.value)"><option value="RECTA" ${o.modelo==='RECTA'?'selected':''}>Reticulada Recta</option><option value="FINK" ${o.modelo==='FINK'?'selected':''}>Fink (W)</option><option value="HOWE" ${o.modelo==='HOWE'?'selected':''}>Howe</option><option value="PRATT" ${o.modelo==='PRATT'?'selected':''}>Pratt</option><option value="TIJERA" ${o.modelo==='TIJERA'?'selected':''}>Tijera</option><option value="UN_AGUA" ${o.modelo==='UN_AGUA'?'selected':''}>Un Agua</option><option value="VIGA" ${o.modelo==='VIGA'?'selected':''}>Viga Maciza</option></select></div>
              <div class="prop-row"><label>Apoyo Izq (m)</label><input type="number" step="0.01" value="${(o.hIzq/1000).toFixed(2)}" onchange="modCercha('hIzq', this.value)" onkeydown="${kEnt}"></div>
              <div class="prop-row"><label>Apoyo Der (m)</label><input type="number" step="0.01" value="${(o.hDer/1000).toFixed(2)}" onchange="modCercha('hDer', this.value)" onkeydown="${kEnt}"></div>
              <div class="prop-row"><label>Altura Pico (m)</label><input type="number" step="0.01" value="${(o.hPico/1000).toFixed(2)}" onchange="modCercha('hPico', this.value)" onkeydown="${kEnt}"></div>
              <div class="prop-row"><label>Posición Pico (0-1)</label><input type="number" step="0.1" value="${o.xPico}" onchange="modCercha('xPico', this.value)" onkeydown="${kEnt}"></div>
              <div class="prop-row"><label>Divisiones Inf.</label><input type="number" step="1" value="${o.divisiones}" onchange="modCercha('divisiones', this.value)" onkeydown="${kEnt}"></div>
              <div class="prop-row" style="margin-top:12px; background:#f2f2f7; padding:8px; border-radius:6px;"><label style="color:var(--accent);">Soporta Clavadores</label><input type="checkbox" ${o.soportaClavadores ? 'checked' : ''} onchange="modCercha('soportaClavadores', this.checked)"></div>
            `;
          }
        }
      }
      else if(o.type === 'wall') {
        barTool.textContent = `PANEL ${o.label}`; ind.textContent = 'Propiedades ▾';
        if(showCard) {
          card.style.display = 'flex'; title.textContent = `PANEL ${o.label}`; const matrizHtml = getMatrizHtml(o.id);
          if(vistaActual === 'planta' || vistaActual === 'techo') {
            let l = (hyp(o.pB[0]-o.pA[0], o.pB[1]-o.pA[1])/1000).toFixed(2); content.innerHTML = matrizHtml + `<div class="prop-row"><label>Largo Muro (m)</label><input type="number" step="0.01" value="${l}" onchange="modMuro('largo', this.value)" onkeydown="${kEnt}"></div>`;
          } else if(vistaActual === 'alzado') {
            let isTecho = o.proyectaTecho ? 'checked' : ''; let state = o.proyectaTecho ? 'disabled' : '';
            let base = matrizHtml + `<div class="prop-row" style="margin-bottom:12px; background:#f2f2f7; padding:8px; border-radius:6px;"><label style="color:var(--accent);">Proyectar a Techo</label><input type="checkbox" ${isTecho} onchange="modMuro('techo', this.checked)"></div><div class="prop-row"><label>Alto Izq (m)</label><input type="number" step="0.01" value="${(o.hA/1000).toFixed(2)}" onchange="modMuro('hA', this.value)" onkeydown="${kEnt}" ${state}></div><div class="prop-row"><label>Alto Der (m)</label><input type="number" step="0.01" value="${(o.hB/1000).toFixed(2)}" onchange="modMuro('hB', this.value)" onkeydown="${kEnt}" ${state}></div>`;
            if (!o.proyectaTecho) { if(o.peak) { base += `<div class="prop-row" style="margin-top:8px; border-top:1px solid #eee; padding-top:8px;"><label style="color:var(--accent);">X Cúspide (m)</label><input type="number" step="0.01" value="${(o.peak.x/1000).toFixed(2)}" onchange="modMuro('peakX', this.value)" onkeydown="${kEnt}"></div><div class="prop-row"><label style="color:var(--accent);">Alto Cúspide (m)</label><input type="number" step="0.01" value="${(o.peak.y/1000).toFixed(2)}" onchange="modMuro('peakY', this.value)" onkeydown="${kEnt}"></div><button class="prop-btn-full" style="background:var(--red);" onclick="modMuro('removePeak')">QUITAR CÚSPIDE</button>`; } else { base += `<button class="prop-btn-full" onclick="modMuro('addPeak')">AÑADIR CÚSPIDE CENTRAL</button>`; } } content.innerHTML = base;
          }
        }
      }
    } else { barTool.textContent = 'SELECT'; ind.textContent = 'Toca un objeto'; card.style.display = 'none'; }
  }
}

ST('wall'); setTimeout(resize, 100);
try { parent.postMessage({ ilframe: 'ready' }, '*'); } catch (e) {}
</script>
</body>
</html>
