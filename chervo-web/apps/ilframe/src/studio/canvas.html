<style>
:root{--bg:#F2F2F0;--ink:#1C1C1C;--ink2:#E7E7E4;--ink3:#ECECEC;--accent:#FE0000;--red:#C70000;--orange:#ff9f0a;--green:#34c759;--label:#8A8A8A;--losa:#5856d6;--tb:48px;--prop:44px;--font:'Exo',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;} html,body{height:100%;overflow:hidden;touch-action:none;user-select:none;font-family:var(--font);background:#FFFFFF;color:var(--ink);}
body{display:flex;flex-direction:column;} #tabs{display:flex;height:44px;background:#FFFFFF;border-bottom:1px solid var(--ink3);flex-shrink:0;}
.tab{flex:1;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--label);transition:0.2s;cursor:pointer;border-bottom:2px solid transparent;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:800;}
.bar{height:var(--tb);background:#FFFFFF;border-bottom:1px solid var(--ink3);display:flex;align-items:center;padding:0 8px;flex-shrink:0;}
.tg{display:flex;align-items:center;gap:4px;padding:0 8px;height:100%;border-right:1px solid var(--ink3);} .tg:last-child{border-right:none;}
.tb{width:48px;height:48px;border-radius:10px;background:transparent;border:1px solid transparent;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.2s;}
.tb svg{width:28px;height:28px;fill:none;stroke:currentColor;stroke-width:1.1;stroke-linecap:round;stroke-linejoin:round;pointer-events:none;}
.tb.on{border-color:var(--accent);color:var(--accent);} .tb:active{background:rgba(0,0,0,0.04);}
#btn-herr,#btn-notas{position:fixed;top:110px;width:56px;height:56px;border-radius:14px;background:#FFFFFF;color:var(--ink);border:1px solid var(--ink3);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.08);z-index:160;cursor:pointer;}
#btn-herr{right:16px;} #btn-notas{left:16px;}
#btn-herr svg,#btn-notas svg{width:34px;height:34px;fill:none;stroke:currentColor;stroke-width:1.1;stroke-linecap:round;stroke-linejoin:round;pointer-events:none;}
#btn-herr.on{border-color:var(--accent);color:var(--accent);}
#panel-herr{position:fixed;right:16px;top:174px;background:rgba(255,255,255,0.96);backdrop-filter:blur(12px);border:1px solid var(--ink3);border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.1);z-index:150;display:none;grid-template-columns:repeat(2,58px);justify-items:center;align-items:center;padding:14px;gap:12px;max-height:70vh;overflow-y:auto;}
#panel-herr.open{display:grid;}
.phb{display:none;width:58px;height:58px;border-radius:12px;background:transparent;border:1px solid transparent;color:var(--ink);cursor:pointer;align-items:center;justify-content:center;flex-shrink:0;transition:0.2s;}
.phb svg{width:40px;height:40px;fill:none;stroke:currentColor;stroke-width:1.1;stroke-linecap:round;stroke-linejoin:round;pointer-events:none;}
.phb.on{border-color:var(--accent);color:var(--accent);} .phb:active{transform:scale(0.92);}
body[data-vista="planta"] .phb-planta, body[data-vista="entrepiso"] .phb-entrepiso, body[data-vista="cielorraso"] .phb-cielorraso, body[data-vista="alzado"] .phb-alzado, body[data-vista="techo"] .phb-techo {display:flex;}
#wrap{flex:1;position:relative;overflow:hidden;background:var(--bg);} #cv{position:absolute;top:0;left:0;}
#propbar{height:var(--prop);background:#FFFFFF;border-top:1px solid var(--ink3);display:flex;align-items:center;padding:0 16px;justify-content:space-between;cursor:pointer;flex-shrink:0;z-index:190;}
#pbTool{font-size:16px;font-weight:800;color:var(--accent);text-transform:uppercase;} .pb-open-indicator{font-size:14px;font-weight:600;color:var(--label);text-transform:uppercase;}
#prop-card{position:fixed;bottom:0;left:0;right:0;background:#FFFFFF;border-top:1px solid var(--ink3);border-radius:16px 16px 0 0;box-shadow:0 -8px 24px rgba(0,0,0,0.06);display:none;flex-direction:column;padding:16px 20px;z-index:200;max-height:55vh;overflow-y:auto;}
#prop-card.open{display:flex;animation:cardUp 0.18s ease-out;} @keyframes cardUp{from{transform:translateY(24px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.prop-btn-icon{width:56px;height:52px;display:flex;align-items:center;justify-content:center;background:var(--ink2);border:1px solid transparent;border-radius:8px;cursor:pointer;transition:0.15s;padding:0;}
.prop-btn-icon.on{border-color:var(--accent);background:#FFFFFF;} .prop-btn-icon:active{transform:scale(0.95);}
.prop-btn-full.outline{background:#FFFFFF;color:var(--ink);border:1px solid var(--ink3);} .prop-btn-full.outline.danger{color:var(--red);border-color:var(--red);}
.prop-header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;border-bottom:1px solid var(--ink3);padding-bottom:8px;} .prop-head{font-size:16px;font-weight:800;color:var(--accent);}
.prop-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;} .prop-row label{font-size:14px;font-weight:600;color:var(--label);text-transform:uppercase;}
.prop-row input[type="number"],.prop-row select{width:130px;text-align:right;background:var(--ink2);border:1px solid transparent;border-radius:8px;padding:8px 12px;font-size:16px;font-weight:600;font-family:var(--font);color:var(--ink);outline:none;transition:0.2s;}
.prop-row input:focus,.prop-row select:focus{border-color:var(--accent);background:#FFFFFF;} .prop-row select{text-align:left;cursor:pointer;}
.prop-btn-full{width:100%;padding:14px;background:var(--accent);color:#FFFFFF;border:none;border-radius:8px;font-weight:700;font-size:14px;font-family:var(--font);cursor:pointer;margin-top:8px;text-transform:uppercase;transition:0.2s;} .prop-btn-full:active{transform:scale(0.98);}
.btn-outline{background:var(--ink2);color:var(--ink);border:1px solid var(--ink3);}
.ctx-menu{display:none;flex-direction:row;position:fixed;z-index:350;background:rgba(255,255,255,0.95);backdrop-filter:blur(12px);border:1px solid var(--ink3);border-radius:16px;padding:6px;box-shadow:0 8px 24px rgba(0,0,0,0.12);gap:4px;}
.ctx-menu.show{display:flex;} .ci{display:flex;align-items:center;justify-content:center;width:56px;height:56px;border-radius:10px;color:var(--ink);cursor:pointer;background:transparent;transition:0.2s;}
.ci:active{background:rgba(0,0,0,0.06);transform:scale(0.92);} .ci svg{width:36px;height:36px;fill:none;stroke:currentColor;stroke-width:1.1;stroke-linecap:round;stroke-linejoin:round;pointer-events:none;}
.ci.danger{color:var(--red);} .ci.danger:active{background:rgba(199,0,0,0.1);}
#toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--ink);color:#FFFFFF;padding:12px 24px;border-radius:24px;font-size:14px;font-weight:600;opacity:0;transition:opacity .2s;pointer-events:none;z-index:999;} #toast.show{opacity:1;}
#nota-content:empty:before{content:attr(placeholder);color:var(--label);pointer-events:none;display:block;}
</style></head>

<script>

// ============ iLFrame v1.40 — Motor v1.29 + iLStyle v1.37 ============
// Protocolo URL desde el dashboard de proyecto:

function aplicarTipos(d) {
  const map = {
    wall:       (d.walls    || []).map(w => ({ type:'wall',    name: w.name, esp: w.espesorMm })),
    viga:       (d.vigas    || []).map(v => ({ type:'viga',    name: v.name })),
    cercha:     (d.cerchas  || []).map(c => ({ type:'cercha',  name: c.name })),
    columna:    [ ...(d.columnas || []).map(c => ({ type:'columna', name: c.name, kind:'reticulada' })),
                  ...(d.pilares  || []).map(p => ({ type:'columna', name: p.name, kind:'armada' })) ],
    roof:       (d.techos   || []).map(t => ({ type:'roof',    name: t.name })),
    losa:       (d.losas    || []).map(l => ({ type:'losa',    name: l.name })),
    cielorraso: (d.cielos   || []).map(c => ({ type:'cielorraso', name: c.name })),
  };
  Object.keys(presetsBIM).forEach(k => delete presetsBIM[k]);
  Object.keys(presetActivo).forEach(k => delete presetActivo[k]);
  Object.keys(map).forEach(t => { if (map[t].length) { presetsBIM[t] = map[t]; presetActivo[t] = map[t][0]; } });
  if (pa('wall') && pa('wall').esp) espesorActual = pa('wall').esp;
  if (['wall','viga','cercha','columna','roof','losa','cielorraso'].includes(tool)) actualizarPropBar();
}

function setPreset(tipo, idx) {
  if (!presetsBIM[tipo] || !presetsBIM[tipo][idx]) return;

  if (tipo === 'wall') espesorActual = presetActivo.wall.esp || configBIM.espesor || 160;
  forceCardOpen = true; actualizarPropBar(); toast(presetActivo[tipo].name || 'Preset activo');
}

function reasignarPreset(tipo, idx) {
  if (!seleccionId || !presetsBIM[tipo] || !presetsBIM[tipo][idx]) return;
  const sel = objects.find(o => o.id === seleccionId); if (!sel) return; saveHistory();
  const p = presetsBIM[tipo][idx]; sel.tipo = p.name; if (tipo === 'columna') sel.kind = p.kind || 'reticulada';
  if (tipo === 'wall' || tipo === 'viga' || tipo === 'roof') { if (p.esp) sel.espesor = p.esp; }
  if (tipo === 'losa' || tipo === 'cielorraso') { if (p.mod) sel.modulacion = p.mod; if (p.montaje) sel.tipoMontaje = p.montaje; }
  if (tipo === 'cercha') { if (p.modelo) sel.modelo = p.modelo; if (p.divisiones) sel.divisiones = p.divisiones; }

}

      if (dist < bD) { bD = dist; const pL = dx * uX + dy * uY; bS = { x: o.pt[0] + pL * uX, y: o.pt[1] + pL * uY }; }

    if ((o.type === 'losa' || o.type === 'cielorraso') && o.env === vistaActual) {
      if(o.pts) o.pts.forEach(p => { const d = hyp(raw.x - p.x, raw.y - p.y); if (d < bD) { bD = d; bS = {x: p.x, y: p.y}; } });

function centerCameraOnWall(m) {

  else if (m.type === 'losa' || m.type === 'cielorraso' || m.type === 'roof') { if(m.p1) { vpX = cv.width/2 - (m.p1[0]+m.p2[0])/2*vpZ; vpY = cv.height/2 - (m.p1[1]+m.p2[1])/2*vpZ; } else if(m.pts) { vpX = cv.width/2 - m.pts[0].x*vpZ; vpY = cv.height/2 - m.pts[0].y*vpZ; } }
  else { vpX = cv.width/2 - ((m.pA[0]+m.pB[0])/2)*vpZ; vpY = cv.height/2 - ((m.pA[1]+m.pB[1])/2)*vpZ; }

function autoFitAlzado(m) {
  let l = 1000, hM = 3000;
  if (['wall','viga'].includes(m.type)) { l = hyp(m.pB[0]-m.pA[0], m.pB[1]-m.pA[1]); hM = Math.max(m.hA, m.hB, m.peak ? m.peak.y : 0, 2400); }
  else if (m.type === 'cercha') { l = hyp(m.pB[0]-m.pA[0], m.pB[1]-m.pA[1]); hM = Math.max(m.hIzq, m.hDer) + m.hPico; }
  else if (m.type === 'columna') { l = Math.max(m.anchoBase, m.anchoTope); hM = m.altura; }
  const zX = (cv.width * 0.75) / l, zY = (cv.height * 0.60) / hM;
  vpZ = Math.min(zX, zY, 0.4); vpX = (cv.width - (l * vpZ)) / 2; vpY = cv.height - ((cv.height - (hM * vpZ)) / 2);

window.addEventListener('message', (e) => {
  const d = e.data || {};
  if (d.ilframe === 'load' && Array.isArray(d.objects)) {
    objects = d.objects; const m = d.meta || {};
    nextId = m.nextId || (objects.reduce((a, o) => Math.max(a, o.id || 0), 0) + 1);
    nextWallNum = m.nextWallNum || 1; nextCerchaNum = m.nextCerchaNum || 1; nextVigaNum = m.nextVigaNum || 1;
    nextColNum = m.nextColNum || 1; nextLosaNum = m.nextLosaNum || 1; nextCieloNum = m.nextCieloNum || 1;
    notasProyecto = Array.isArray(m.notas) ? m.notas : [];

    render();
  } else if (d.ilframe === 'types') {
    aplicarTipos(d);
  } else if (d.ilframe === 'focus') {
    // El plano llega conectado al elemento: herramienta + tipo + vista.
    const ftool = d.tool, typeName = d.typeName;
    const claveTipo = { wall:'wall', cercha:'cercha', columna:'columna', roof:'roof', losa:'losa', cielorraso:'cielorraso', viga:'viga' }[ftool];
    if (claveTipo && presetsBIM[claveTipo]) {
      const idx = presetsBIM[claveTipo].findIndex((p) => p.name === typeName);
      if (idx >= 0) { presetActivo[claveTipo] = presetsBIM[claveTipo][idx]; if (claveTipo === 'wall' && presetsBIM.wall[idx].esp) espesorActual = presetsBIM.wall[idx].esp; }
    }
    const targetVista = ftool === 'roof' ? 'techo' : ftool === 'losa' ? 'entrepiso' : ftool === 'cielorraso' ? 'cielorraso' : 'planta';

  }
});

// ---------- DXF DE FONDO ----------
function cargarDXF(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const lines = reader.result.split(/\r\n|\r|\n/); dxfFondo = [];
      let i = 0;
      while (i < lines.length - 1) {
        const code = lines[i].trim(), val = lines[i+1] ? lines[i+1].trim() : '';
        if (code === '0' && val === 'LINE') {
          let x1=null,y1=null,x2=null,y2=null, j = i+2;
          while (j < lines.length - 1) { const c = lines[j].trim(), v = parseFloat(lines[j+1]); if (c === '0') break; if (c==='10') x1=v; else if (c==='20') y1=v; else if (c==='11') x2=v; else if (c==='21') y2=v; j+=2; }
          if (x1!==null && x2!==null) dxfFondo.push([x1,-y1,x2,-y2]); i = j;
        } else if (code === '0' && val === 'LWPOLYLINE') {
          let pts = [], cerrada = false, j = i+2;
          while (j < lines.length - 1) { const c = lines[j].trim(), v = parseFloat(lines[j+1]); if (c === '0') break; if (c==='70') cerrada = (v & 1) === 1; else if (c==='10') pts.push([v, 0]); else if (c==='20' && pts.length) pts[pts.length-1][1] = -v; j+=2; }
          for (let k=0; k<pts.length-1; k++) dxfFondo.push([pts[k][0], pts[k][1], pts[k+1][0], pts[k+1][1]]);
          if (cerrada && pts.length > 2) dxfFondo.push([pts[pts.length-1][0], pts[pts.length-1][1], pts[0][0], pts[0][1]]);
          i = j;
        } else i += 2;
      }
      if (dxfFondo.length) {
        let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
        dxfFondo.forEach(s => { minX=Math.min(minX,s[0],s[2]); maxX=Math.max(maxX,s[0],s[2]); minY=Math.min(minY,s[1],s[3]); maxY=Math.max(maxY,s[1],s[3]); });
        // Heurística de unidades: si el dibujo es chico se asume metros y se escala a mm
        if (maxX - minX < 1000 && maxY - minY < 1000) dxfFondo = dxfFondo.map(s => s.map(v => v*1000));
        const cx = (minX+maxX)/2, cy = (minY+maxY)/2;
        vpX = cv.width/2 - cx*vpZ; vpY = cv.height/2 - cy*vpZ;
        toast(`DXF: ${dxfFondo.length} segmentos`);
      } else toast("DXF sin líneas legibles");
      render();
    } catch(err) { toast("Error leyendo DXF"); }
  };
  reader.readAsText(file); event.target.value = '';
}

function drawDXF() {
  if (!dxfFondo.length || vistaActual === '3d' || vistaActual === 'alzado') return;
  ctx.save(); ctx.strokeStyle = 'rgba(0,0,0,0.18)'; ctx.lineWidth = 1; ctx.beginPath();
  dxfFondo.forEach(s => { const a = w2s(s[0], s[1]), b = w2s(s[2], s[3]); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); });
  ctx.stroke(); ctx.restore();
}

function drawStrokeText(txt, x, y) { ctx.lineJoin = 'round'; ctx.miterLimit = 2; ctx.lineWidth = 4; ctx.strokeStyle = '#fff'; ctx.strokeText(txt, x, y); ctx.fillText(txt, x, y); }

function render() {
  try {
    ctx.clearRect(0, 0, cv.width, cv.height);
    if (vistaActual === '3d') { draw3D(); } else {
      drawGrid(); drawDXF();
      objects.filter(o => o.type === 'guide' && o.env === vistaActual).forEach(drawObj);
      if (vistaActual === 'planta') { objects.filter(o => !['guide','roof','babeta','hueco'].includes(o.type) && o.env !== 'entrepiso' && o.env !== 'cielorraso').forEach(drawObj); drawPreview(); }
      else if (vistaActual === 'entrepiso' || vistaActual === 'cielorraso') { ctx.save(); ctx.globalAlpha = vistaActual === 'entrepiso' ? 0.3 : 0.2; objects.filter(o => ['wall','viga','cercha','columna'].includes(o.type)).forEach(drawObj); ctx.restore(); objects.filter(o => o.env === vistaActual && o.type !== 'guide').forEach(drawObj); drawPreview(); }
      else if (vistaActual === 'alzado' && muroAlzadoId) { const m = objects.find(o=>o.id===muroAlzadoId); if(m) { if (['wall','viga'].includes(m.type)) drawAlzado(m); else if (m.type === 'cercha') drawCerchaAlzado(m); else if (m.type === 'columna') drawColumnaAlzado(m); } drawPreview(); }
      else if (vistaActual === 'techo') { ctx.globalAlpha = 0.25; objects.filter(o => ['wall','viga','cercha','columna'].includes(o.type)).forEach(drawObj); ctx.globalAlpha = 1.0; objects.filter(o => ['roof','babeta'].includes(o.type) || (o.type === 'hueco' && o.env === 'techo')).forEach(drawObj); drawPreview(); }
    }
  } catch(e) { console.error(e); }
  ilPersist();   // guarda al dashboard (debounced) tras cualquier cambio dibujado
}

function drawGrid() { const cs = cellPx * vpZ; if (cs < 5) return; const ox = ((vpX%cs)+cs)%cs, oy = ((vpY%cs)+cs)%cs; ctx.save(); ctx.strokeStyle = 'rgba(0,0,0,0.05)'; ctx.lineWidth = 1; for (let x=ox; x<cv.width; x+=cs) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,cv.height); ctx.stroke(); } for (let y=oy; y<cv.height; y+=cs) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(cv.width,y); ctx.stroke(); } ctx.restore(); }

function cloneAndDrawGhost(o, dx, dy) { const g = JSON.parse(JSON.stringify(o)); if(['wall','viga','cercha'].includes(g.type)){ g.pA[0]+=dx; g.pA[1]+=dy; g.pB[0]+=dx; g.pB[1]+=dy; } else if(g.type==='columna'){ g.pt[0]+=dx; g.pt[1]+=dy; } else if(['roof','losa'].includes(g.type)){ g.p1[0]+=dx; g.p1[1]+=dy; g.p2[0]+=dx; g.p2[1]+=dy; } else if(['babeta','hueco','cielorraso'].includes(g.type)){ g.pts.forEach(p=>{p.x+=dx;p.y+=dy;}); } ctx.globalAlpha = 0.5; drawObj(g); ctx.globalAlpha = 1.0; }

function getMuroPts(m) { const l = hyp(m.pB[0]-m.pA[0], m.pB[1]-m.pA[1]); let pts = [{x:0, y:0}, {x:0, y:m.hA}]; if(m.peak) pts.push({x:m.peak.x, y:m.peak.y}); pts.push({x:l, y:m.hB}, {x:l, y:0}); return pts; }


// ---------- ALZADOS ----------
function drawColumnaAlzado(c) {
  ctx.save(); const isS = (seleccionId===c.id); ctx.strokeStyle = isS ? COL.accent : COL.ink; ctx.lineWidth = 3; ctx.lineJoin = 'round';
  const h = c.altura; let bxL, bxR, txL, txR;
  if (c.caraRecta === 'IZQ') { bxL = 0; bxR = c.anchoBase; txL = 0; txR = c.anchoTope; } else if (c.caraRecta === 'DER') { bxL = -c.anchoBase; bxR = 0; txL = -c.anchoTope; txR = 0; } else { bxL = -c.anchoBase/2; bxR = c.anchoBase/2; txL = -c.anchoTope/2; txR = c.anchoTope/2; }
  ctx.beginPath(); const sbL = w2s(bxL, 0), sbR = w2s(bxR, 0), stL = w2s(txL, h), stR = w2s(txR, h); ctx.moveTo(sbL.x, sbL.y); ctx.lineTo(sbR.x, sbR.y); ctx.lineTo(stR.x, stR.y); ctx.lineTo(stL.x, stL.y); ctx.closePath();
  ctx.fillStyle = isS ? 'rgba(254,0,0,0.05)' : 'rgba(235, 235, 240, 0.5)'; ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.lineWidth = 1.5; ctx.strokeStyle = isS ? COL.accent : COL.gris; const divs = c.divisiones > 0 ? c.divisiones : 1;
  for(let i=1; i<divs; i++) {
    const y = (h / divs) * i; const nxL = bxL + (txL - bxL) * (y / h); const nxR = bxR + (txR - bxR) * (y / h); const snL = w2s(nxL, y), snR = w2s(nxR, y);
    if (c.patron === 'LADDER' || c.montantesHorizontales) { ctx.moveTo(snL.x, snL.y); ctx.lineTo(snR.x, snR.y); }
    if (c.patron === 'WARREN') { const pY = (h / divs) * (i-1); const pnxL = bxL + (txL - bxL) * (pY / h), pnxR = bxR + (txR - bxR) * (pY / h); const spL = w2s(pnxL, pY), spR = w2s(pnxR, pY); if (i % 2 !== 0) { ctx.moveTo(spL.x, spL.y); ctx.lineTo(snR.x, snR.y); } else { ctx.moveTo(spR.x, spR.y); ctx.lineTo(snL.x, snL.y); } }
    else if (c.patron === 'X_CROSS') { const pY = (h / divs) * (i-1); const pnxL = bxL + (txL - bxL) * (pY / h), pnxR = bxR + (txR - bxR) * (pY / h); const spL = w2s(pnxL, pY), spR = w2s(pnxR, pY); ctx.moveTo(spL.x, spL.y); ctx.lineTo(snR.x, snR.y); ctx.moveTo(spR.x, spR.y); ctx.lineTo(snL.x, snL.y); }
  } ctx.stroke();
  const p0 = w2s(0,0); ctx.beginPath(); ctx.moveTo(0, p0.y); ctx.lineTo(cv.width, p0.y); ctx.strokeStyle = COL.ink; ctx.lineWidth = 3; ctx.stroke();
  ctx.fillStyle = COL.accent; ctx.font = `800 ${Math.max(13, 15*vpZ)}px Exo`; ctx.textAlign = 'left'; drawStrokeText(`COLUMNA: ${c.label} (H: ${(h/1000).toFixed(2)}m)`, p0.x + 10, p0.y + 24); ctx.restore();
}

function drawCerchaAlzado(c) {
  const l = hyp(c.pB[0]-c.pA[0], c.pB[1]-c.pA[1]); ctx.save(); const isS = (seleccionId===c.id);
  ctx.strokeStyle = isS ? COL.accent : COL.ink; ctx.lineWidth = 3; ctx.lineJoin = 'round';
  const baseY = (x) => c.hIzq + (c.hDer - c.hIzq) * (x / l); const pX = l * c.xPico; const pY = baseY(pX) + c.hPico;
  ctx.beginPath(); const sBL = w2s(0, c.hIzq), sBR = w2s(l, c.hDer), sTop = w2s(pX, pY); ctx.moveTo(sBL.x, sBL.y); ctx.lineTo(sBR.x, sBR.y);
  if (c.modelo === 'VIGA') { const sTL = w2s(0, c.hIzq + c.hPico), sTR = w2s(l, c.hDer + c.hPico); ctx.lineTo(sTR.x, sTR.y); ctx.lineTo(sTL.x, sTL.y); ctx.closePath(); ctx.stroke();
  } else {
    ctx.lineTo(sTop.x, sTop.y); ctx.closePath(); ctx.stroke(); ctx.beginPath(); ctx.lineWidth = 1.5; ctx.strokeStyle = isS ? COL.accent : COL.gris; const divs = c.divisiones > 0 ? c.divisiones : 1;
    for(let i=1; i<divs; i++) {
      const nx = (l / divs) * i; const nyBase = baseY(nx); let nyTop; if (nx <= pX) { nyTop = c.hIzq + (pY - c.hIzq) * (nx / pX); } else { nyTop = pY + (c.hDer - pY) * ((nx - pX) / (l - pX)); }
      const sBN = w2s(nx, nyBase), sTN = w2s(nx, nyTop);
      if (c.modelo !== 'RECTA' || c.montantesHorizontales) { ctx.moveTo(sBN.x, sBN.y); ctx.lineTo(sTN.x, sTN.y); }
      if (c.modelo === 'PRATT' || c.modelo === 'FINK') { if (i > 1) { const prevX = (l / divs) * (i-1); const sPB = w2s(prevX, baseY(prevX)); if (nx <= pX) { ctx.moveTo(sTN.x, sTN.y); ctx.lineTo(sPB.x, sPB.y); } else { const sPT = w2s(prevX, c.hIzq + (pY - c.hIzq)*(prevX/pX)); ctx.moveTo(sBN.x, sBN.y); ctx.lineTo(sPT.x, sPT.y); } } }

  ctx.fillStyle = COL.accent; ctx.font = `800 ${Math.max(13, 15*vpZ)}px Exo`; ctx.textAlign = 'left'; drawStrokeText(`ESTRUCTURA: ${c.label} (L: ${(l/1000).toFixed(2)}m)`, p0.x + 10, p0.y + 24); ctx.restore();
}

function drawAlzado(m) {
  const l = hyp(m.pB[0]-m.pA[0], m.pB[1]-m.pA[1]); ctx.save();
  const isS = (seleccionId===m.id && !seleccionAbId);
  const techos = objects.filter(o => o.type === 'roof');
  const midX = (m.pA[0]+m.pB[0])/2, midY = (m.pA[1]+m.pB[1])/2;
  const techosCubren = techos.filter(t => roofCubre(t, midX, midY));

  // PROYECCIÓN A TECHO: el material del panel se rellena hasta el plano inferior del techo
  let pts, proyectado = false;
  if (m.proyectaTecho && techosCubren.length) {
    const zA = Math.min(...techosCubren.map(t => getRoofZ(t, m.pA[0], m.pA[1])));
    const zB = Math.min(...techosCubren.map(t => getRoofZ(t, m.pB[0], m.pB[1])));
    pts = [{x:0, y:0}, {x:0, y:zA}, {x:l, y:zB}, {x:l, y:0}]; proyectado = true;
  } else pts = getMuroPts(m);

  ctx.fillStyle = isS ? 'rgba(254,0,0,0.05)' : 'rgba(235, 235, 240, 0.5)'; ctx.strokeStyle = isS ? COL.accent : COL.ink; ctx.lineWidth = 2;
  ctx.beginPath(); pts.forEach((p, i) => { const sp = w2s(p.x, p.y); i===0 ? ctx.moveTo(sp.x, sp.y) : ctx.lineTo(sp.x, sp.y); }); ctx.closePath(); ctx.fill(); ctx.stroke();

  if (proyectado) { // Trama de material del panel proyectado
    ctx.save(); ctx.clip();
    ctx.strokeStyle = 'rgba(28,28,28,0.10)'; ctx.lineWidth = 1; ctx.beginPath();
    const hMaxT = Math.max(...pts.map(p=>p.y)); const paso = 300;
    for (let x = -hMaxT; x < l + hMaxT; x += paso) { const a = w2s(x, 0), b = w2s(x + hMaxT, hMaxT); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); }
    ctx.stroke(); ctx.restore();
  }

  // Corte del paquete de techo sobre este plano
  techos.forEach(t => {
    const zA = getRoofZ(t, m.pA[0], m.pA[1]), zB = getRoofZ(t, m.pB[0], m.pB[1]), esp = t.espesor || 150;
    const spA = w2s(0, zA), spB = w2s(l, zB), spAt = w2s(0, zA + esp), spBt = w2s(l, zB + esp);
    ctx.beginPath(); ctx.moveTo(spA.x, spA.y); ctx.lineTo(spB.x, spB.y); ctx.lineTo(spBt.x, spBt.y); ctx.lineTo(spAt.x, spAt.y); ctx.closePath();
    ctx.fillStyle = (seleccionId===t.id) ? 'rgba(255,159,10,0.2)' : 'rgba(255,159,10,0.1)'; ctx.fill();
    ctx.strokeStyle = (seleccionId===t.id) ? COL.accent : COL.orange; ctx.lineWidth = 2; ctx.setLineDash([12*vpZ, 8*vpZ]); ctx.stroke(); ctx.setLineDash([]);
  });

  // Losa de entrepiso: apoya y remata en la cara; el revestimiento del panel pasa cubriendo su canto
  const losas = objects.filter(o => o.type === 'losa');
  if (losas.length > 0 && m.type === 'wall') {
    const hAp = Math.min(m.hA, m.hB); const esp = 200;
    const s1 = w2s(0, hAp), s2 = w2s(l, hAp + esp);
    ctx.fillStyle = 'rgba(88,86,214,0.12)'; ctx.strokeStyle = COL.losa; ctx.setLineDash([6*vpZ, 6*vpZ]); ctx.lineWidth = 2;
    ctx.fillRect(s1.x, s2.y, s2.x - s1.x, s1.y - s2.y); ctx.strokeRect(s1.x, s2.y, s2.x - s1.x, s1.y - s2.y); ctx.setLineDash([]);
  }

  // Cielorrasos (línea de NPT)
  objects.filter(o => o.type === 'cielorraso').forEach(c => {
    const sA = w2s(0, c.hBase), sB = w2s(l, c.hBase); ctx.beginPath(); ctx.moveTo(sA.x, sA.y); ctx.lineTo(sB.x, sB.y);
    ctx.strokeStyle = COL.cielo; ctx.lineWidth = 2; ctx.setLineDash([10*vpZ, 5*vpZ]); ctx.stroke(); ctx.setLineDash([]);
  });

  // Columnas próximas al plano del muro
  const uX = (m.pB[0]-m.pA[0]) / l, uY = (m.pB[1]-m.pA[1]) / l;
  objects.filter(o => o.type === 'columna').forEach(c => {
    const cx = c.pt[0] - m.pA[0], cy = c.pt[1] - m.pA[1]; const proj = cx * uX + cy * uY; const perp = Math.abs(cx * (-uY) + cy * uX);
    if (perp < c.espesor + 50 && proj > -c.anchoBase && proj < l + c.anchoBase) {
      ctx.save(); ctx.strokeStyle = COL.gris; ctx.lineWidth = 2; ctx.setLineDash([8*vpZ, 6*vpZ]); ctx.fillStyle = 'rgba(142,142,147,0.15)';
      const hC = c.altura; let bxL, bxR, txL, txR;
      if (c.caraRecta === 'IZQ') { bxL = 0; bxR = c.anchoBase; txL = 0; txR = c.anchoTope; } else if (c.caraRecta === 'DER') { bxL = -c.anchoBase; bxR = 0; txL = -c.anchoTope; txR = 0; } else { bxL = -c.anchoBase/2; bxR = c.anchoBase/2; txL = -c.anchoTope/2; txR = c.anchoTope/2; }
      ctx.beginPath(); const p1 = w2s(proj+bxL, 0), p2 = w2s(proj+bxR, 0), p3 = w2s(proj+txR, hC), p4 = w2s(proj+txL, hC);
      ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.lineTo(p3.x, p3.y); ctx.lineTo(p4.x, p4.y); ctx.closePath(); ctx.fill(); ctx.stroke();
      const pt = w2s(proj, hC/2); ctx.fillStyle = COL.gris; ctx.font = `800 ${Math.max(10, 12*vpZ)}px Exo`; ctx.textAlign = 'center'; ctx.translate(pt.x, pt.y); ctx.rotate(-Math.PI/2); ctx.fillText(c.label, 0, 0); ctx.restore();
    }
  });

  // Aberturas
  if (m.aberturas) {
    m.aberturas.forEach(ab => {
      const s1 = w2s(ab.x, ab.y + ab.h), s2 = w2s(ab.x + ab.w, ab.y), isA = seleccionAbId === ab.id;
      ctx.fillStyle = isA ? 'rgba(254,0,0,0.1)' : '#fff'; ctx.strokeStyle = isA ? COL.accent : COL.ink; ctx.lineWidth = isA ? 3 : 2;
      if (ab.type === 'vano') { ctx.setLineDash([5,5]); ctx.fillRect(s1.x, s1.y, s2.x-s1.x, s2.y-s1.y); ctx.strokeRect(s1.x, s1.y, s2.x-s1.x, s2.y-s1.y); ctx.setLineDash([]); }
      else {
        ctx.fillRect(s1.x, s1.y, s2.x-s1.x, s2.y-s1.y); ctx.strokeRect(s1.x, s1.y, s2.x-s1.x, s2.y-s1.y);
        ctx.beginPath(); ctx.setLineDash([4,4]); ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 1; const mY = s1.y + (s2.y-s1.y)/2;
        if (ab.subType === 'batiente') { const hX = ab.flipX ? s1.x : s2.x, hgX = ab.flipX ? s2.x : s1.x; ctx.moveTo(hgX, s1.y); ctx.lineTo(hX, mY); ctx.lineTo(hgX, s2.y); }
        else if (ab.subType === 'doble') { const mX = s1.x + (s2.x-s1.x)/2; ctx.moveTo(s1.x, s1.y); ctx.lineTo(mX, mY); ctx.lineTo(s1.x, s2.y); ctx.moveTo(s2.x, s1.y); ctx.lineTo(mX, mY); ctx.lineTo(s2.x, s2.y); }
        else if (ab.subType === 'corrediza') { ctx.setLineDash([]); ctx.moveTo(s1.x + 8, mY); ctx.lineTo(s2.x - 8, mY); }
        ctx.stroke(); ctx.setLineDash([]);
      }
    });
  }
  const p0 = w2s(0,0); ctx.beginPath(); ctx.moveTo(0, p0.y); ctx.lineTo(cv.width, p0.y); ctx.strokeStyle = COL.ink; ctx.lineWidth = 3; ctx.stroke();
  ctx.fillStyle = COL.accent; ctx.font = `800 ${Math.max(12, 14*vpZ)}px Exo`; ctx.textAlign = 'left';
  drawStrokeText(`${m.type === 'wall' ? 'PANEL' : 'VIGA'}: ${m.label} (L: ${(l/1000).toFixed(2)}m)${(m.proyectaTecho && techosCubren.length) ? ' — PROYECTADO A TECHO' : ''}`, p0.x + 10, p0.y + 24); ctx.restore();
}

// ---------- OBJETOS 2D ----------
function drawObj(o) {
  if (o.type === 'guide') {
    const isS = (o.id === seleccionId), dX = Math.cos(o.angle)*10000, dY = Math.sin(o.angle)*10000, s1 = w2s(o.pt[0]-dX, o.pt[1]-dY), s2 = w2s(o.pt[0]+dX, o.pt[1]+dY);
    ctx.save(); ctx.strokeStyle = isS ? COL.accent : COL.guia; ctx.lineWidth = isS ? 2 : 1.5; ctx.setLineDash([15*vpZ, 10*vpZ]); ctx.globalAlpha = 0.6; ctx.beginPath(); ctx.moveTo(s1.x, s1.y); ctx.lineTo(s2.x, s2.y); ctx.stroke(); ctx.restore();
  }
  else if (o.type === 'viga') {
    const isS = (o.id === seleccionId), sA = w2s(o.pA[0], o.pA[1]), sB = w2s(o.pB[0], o.pB[1]);
    ctx.save(); ctx.strokeStyle = isS ? COL.accent : COL.orange; ctx.lineWidth = isS ? 3 : 2; ctx.setLineDash([8*vpZ, 4*vpZ]);
    ctx.beginPath(); ctx.moveTo(sA.x, sA.y); ctx.lineTo(sB.x, sB.y); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle = isS ? COL.accent : COL.orange; ctx.font = `800 ${Math.max(12, 14*vpZ)}px Exo`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; drawStrokeText(o.label, (sA.x+sB.x)/2, (sA.y+sB.y)/2 - 12); ctx.restore();
  }
  else if (o.type === 'cercha') {
    const isS = (o.id === seleccionId), sA = w2s(o.pA[0], o.pA[1]), sB = w2s(o.pB[0], o.pB[1]);
    const l = hyp(sB.x-sA.x, sB.y-sA.y), ang = Math.atan2(sB.y-sA.y, sB.x-sA.x), g = (o.espesor || 100)*vpZ;
    let oY = -g/2; if (o.just === 'izq') oY = -g; else if (o.just === 'der') oY = 0;
    ctx.save(); ctx.translate(sA.x, sA.y); ctx.rotate(ang);
    ctx.fillStyle = isS ? 'rgba(254,0,0,0.08)' : 'rgba(52,199,89,0.12)'; ctx.strokeStyle = isS ? COL.accent : COL.green; ctx.lineWidth = isS ? 2 : 1.5; ctx.setLineDash([15*vpZ, 5*vpZ, 3*vpZ, 5*vpZ]);
    ctx.fillRect(0, oY, l, g); ctx.strokeRect(0, oY, l, g); ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(l,0); ctx.strokeStyle = isS ? COL.accent : COL.green; ctx.lineWidth = 3; ctx.stroke();
    ctx.fillStyle = isS ? COL.accent : COL.green; ctx.font = `800 ${Math.max(12, 14*vpZ)}px Exo`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    if (ang > Math.PI/2 || ang < -Math.PI/2) { ctx.scale(-1,-1); drawStrokeText(o.label, -l/2, -(oY + g/2) + 14); } else { drawStrokeText(o.label, l/2, oY + g/2 - 14); }
    ctx.restore();
  }
  else if (o.type === 'columna') {

// ---------- UNIONES A / B / T (steel framing: el que remata para en la CARA del comandante) ----------
function cancelarUnion() { document.getElementById('join-ctx').style.display = 'none'; unionPendiente = null; ST('select'); }

function ejecutarUnion(tipo) {
  document.getElementById('join-ctx').style.display = 'none';
  if (!unionPendiente) return;
  saveHistory();
  const mA = objects.find(o => o.id === unionPendiente.idA), mB = objects.find(o => o.id === unionPendiente.idB);
  if (mA && mB) {
    const I = unionPendiente.I;
    const caras = (m) => { const g = m.espesor; if (m.just === 'izq') return [-g, 0]; if (m.just === 'der') return [0, g]; return [-g/2, g/2]; };
    const dEnd = (m) => Math.min(hyp(I.x-m.pA[0], I.y-m.pA[1]), hyp(I.x-m.pB[0], I.y-m.pB[1]));
    const recortarContra = (mIn, mCmd) => {
      const dx = mCmd.pB[0]-mCmd.pA[0], dy = mCmd.pB[1]-mCmd.pA[1], l = hyp(dx, dy) || 1;
      const ux = dx/l, uy = dy/l, nx = -uy, ny = ux;
      const dA = hyp(I.x-mIn.pA[0], I.y-mIn.pA[1]), dB = hyp(I.x-mIn.pB[0], I.y-mIn.pB[1]);
      const near = dA < dB ? 'pA' : 'pB', far = dA < dB ? mIn.pB : mIn.pA;
      const lado = (far[0]-mCmd.pA[0])*nx + (far[1]-mCmd.pA[1])*ny;
      const off = lado > 0 ? Math.max(...caras(mCmd)) : Math.min(...caras(mCmd));
      const Px = mCmd.pA[0] + nx*off, Py = mCmd.pA[1] + ny*off;
      const J = intersect(mIn.pA[0], mIn.pA[1], mIn.pB[0], mIn.pB[1], Px, Py, Px + ux*1000, Py + uy*1000);
      if (J) mIn[near] = [J.x, J.y];
      return mCmd.id;
    };
    let comandaId = null;
    if (tipo === 'A') comandaId = recortarContra(mB, mA);
    else if (tipo === 'B') comandaId = recortarContra(mA, mB);
    else if (tipo === 'T') comandaId = (dEnd(mA) >= dEnd(mB)) ? recortarContra(mB, mA) : recortarContra(mA, mB);
    if (!mA.uniones) mA.uniones = []; if (!mB.uniones) mB.uniones = [];
    if (!mA.uniones.some(u => u.id === mB.id)) mA.uniones.push({ id: mB.id, tipo: tipo, comanda: comandaId });
    if (!mB.uniones.some(u => u.id === mA.id)) mB.uniones.push({ id: mA.id, tipo: tipo, comanda: comandaId });
    const cmdM = objects.find(o => o.id === comandaId);
    toast(cmdM ? "Comanda " + cmdM.label + " — revestimiento pasa" : "Conexión enlazada");
  }
  unionPendiente = null; ST('select'); render();
}

// ---------- MATRIZ (copia múltiple) ----------
function ejecutarMatriz(tipo, valor) {
  if (!lastCopyData) return; const num = parseInt(valor); if (isNaN(num) || num < 2) return; const src = objects.find(o => o.id === lastCopyData.srcId); if (!src) return;
  saveHistory(); objects = objects.filter(o => o.id !== lastCopyData.newId);
  const clonar = (fx, fy) => {
    const c = JSON.parse(JSON.stringify(src)); c.id = nextId++; c.uniones = [];
    if (src.type === 'columna') { c.label = 'P'+nextColNum++; c.pt[0] += fx; c.pt[1] += fy; }
    else { c.label = (src.type==='wall'?'M':(src.type==='viga'?'V':'C'))+(src.type==='wall'?nextWallNum++:(src.type==='viga'?nextVigaNum++:nextCerchaNum++)); c.pA[0] += fx; c.pA[1] += fy; c.pB[0] += fx; c.pB[1] += fy; }
    objects.push(c);
  };
  if (tipo === 'repetir') { for (let i = 1; i <= num; i++) clonar(lastCopyData.dx * i, lastCopyData.dy * i); toast(`Matriz: ${num} repeticiones`); }
  else if (tipo === 'dividir') { for (let i = 1; i <= num; i++) clonar((lastCopyData.dx / num) * i, (lastCopyData.dy / num) * i); toast(`Copia dividida en ${num} espacios`); }
  lastCopyData = null; seleccionId = null; forceCardOpen = false; ST('select');
}

function modMuro(prop, val) {
  if (!seleccionId) return; const m = objects.find(o => o.id === seleccionId); if (!m || !['wall','viga'].includes(m.type)) return; saveHistory();
  if (prop === 'largo') { const v = parseFloat(val)*1000, a = Math.atan2(m.pB[1]-m.pA[1], m.pB[0]-m.pA[0]); m.pB = [m.pA[0]+Math.cos(a)*v, m.pA[1]+Math.sin(a)*v]; }

  else if (prop === 'techo') { m.proyectaTecho = val; forceCardOpen = true; actualizarPropBar(); }
  else if (prop === 'apoyo') m.solapeAbajo = parseFloat(val);
  else if (prop === 'just') { m.just = val; forceCardOpen = true; actualizarPropBar(); }
  else if (prop === 'ang') { const ang = parseFloat(val)*(Math.PI/180), cx = (m.pA[0]+m.pB[0])/2, cy = (m.pA[1]+m.pB[1])/2, l = hyp(m.pB[0]-m.pA[0], m.pB[1]-m.pA[1]); m.pA = [cx-Math.cos(ang)*l/2, cy-Math.sin(ang)*l/2]; m.pB = [cx+Math.cos(ang)*l/2, cy+Math.sin(ang)*l/2]; ST('select'); }

  else if (prop === 'peakY') m.peak.y = parseFloat(val)*1000;
  render();
}

function actualizarPropBar() {
  const pbT = document.getElementById('pbTool'), pcT = document.getElementById('pc-title'), pcC = document.getElementById('pc-content'), card = document.getElementById('prop-card'), ind = document.getElementById('pb-indicator');
  const nombres = {select:'SELECCIONAR', wall:'PANEL', viga:'VIGA', cercha:'ESTRUCTURA', columna:'COLUMNA', join:'CONEXIÓN', guide:'GUÍA', losa:'LOSA', cielorraso:'CIELORRASO', lapiz:'HUECO', puerta:'PUERTA', ventana:'VENTANA', vano:'VANO', roof:'TECHO', babeta:'BABETA', move:'MOVER', copy:'COPIAR', rotate_edit:'ROTAR'};
  pbT.textContent = nombres[tool] || tool.toUpperCase();
  let html = '', title = '';
  const sel = seleccionId ? objects.find(o => o.id === seleccionId) : null;

  if (['babeta','lapiz','cielorraso'].includes(tool) && drawing) {
    title = tool === 'lapiz' ? 'DIBUJANDO HUECO' : 'DIBUJANDO ' + nombres[tool];
    html = `<div style="font-size:13px;color:var(--label);margin-bottom:10px;">Tocá para agregar puntos. Cerrá tocando el punto inicial.</div><button class="prop-btn-full" onclick="finishPoly()">TERMINAR TRAZADO</button>`;
  }
  else if (tool === 'cercha' && !sel) {
    title = 'NUEVA ESTRUCTURA';
    html = presetSelectorHtml('cercha') + `<div class="prop-row"><label>Eje de Trazado</label><div style="display:flex;gap:6px;">
      <button class="prop-btn-icon ${justificacionActual==='izq'?'on':''}" onclick="justificacionActual='izq';actualizarPropBar();">${svgJIzq}</button>
      <button class="prop-btn-icon ${justificacionActual==='centro'?'on':''}" onclick="justificacionActual='centro';actualizarPropBar();">${svgJCen}</button>
      <button class="prop-btn-icon ${justificacionActual==='der'?'on':''}" onclick="justificacionActual='der';actualizarPropBar();">${svgJDer}</button>
    </div></div>
    <div style="font-size:12px;color:var(--label);margin-top:8px;">Arrastrá en el canvas para trazar la estructura.</div>`;
  }
  else if (tool === 'viga' && !sel) {
    title = 'NUEVA VIGA';
    html = presetSelectorHtml('viga') + `<div style="font-size:12px;color:var(--label);margin-top:8px;">Arrastrá en el canvas para trazar la viga.</div>`;
  }
  else if (tool === 'columna' && !sel) {
    title = 'NUEVA COLUMNA';
    html = presetSelectorHtml('columna') + `<div style="font-size:12px;color:var(--label);margin-top:8px;">Tocá en el canvas para colocar la columna.</div>`;
  }
  else if (tool === 'losa' && !sel) {
    title = 'NUEVA LOSA';
    html = presetSelectorHtml('losa') + `<div style="font-size:12px;color:var(--label);margin-top:8px;">Arrastrá en el canvas para definir el área.</div>`;
  }
  else if (tool === 'roof' && !sel) {
    title = 'NUEVO PLANO DE TECHO';
    html = presetSelectorHtml('roof') + `<div style="font-size:12px;color:var(--label);margin-top:8px;">Arrastrá en el canvas para definir el plano.</div>`;
  }
  else if (['puerta','ventana','vano'].includes(tool) && !sel) {
    title = 'NUEVA ' + (tool === 'puerta' ? 'PUERTA' : tool === 'ventana' ? 'VENTANA' : 'ABERTURA');
    html = `<div style="font-size:12px;color:var(--label);">Arrastrá sobre el alzado del panel para dibujar la abertura.</div>`;
  }
  else if (tool === 'wall' && !sel) {
    title = 'NUEVO PANEL';
    html = presetSelectorHtml('wall') + `<div class="prop-row"><label>Eje de Trazado</label><div style="display:flex;gap:6px;">
      <button class="prop-btn-icon ${justificacionActual==='izq'?'on':''}" onclick="justificacionActual='izq';actualizarPropBar();">${svgJIzq}</button>
      <button class="prop-btn-icon ${justificacionActual==='centro'?'on':''}" onclick="justificacionActual='centro';actualizarPropBar();">${svgJCen}</button>
      <button class="prop-btn-icon ${justificacionActual==='der'?'on':''}" onclick="justificacionActual='der';actualizarPropBar();">${svgJDer}</button>
    </div></div>
    <div class="prop-row"><label>Apoyo en Losa</label><select onchange="apoyoActual=parseFloat(this.value);"><option value="0.15" ${apoyoActual===0.15?'selected':''}>Sobre losa (15cm)</option><option value="0.30" ${apoyoActual===0.30?'selected':''}>Balloon (30cm)</option><option value="0" ${apoyoActual===0?'selected':''}>Sin solape</option></select></div>
    <div style="font-size:12px;color:var(--label);margin-top:8px;">Arrastrá en el canvas para trazar el panel.</div>`;
  }
  else if (sel && ['wall','viga'].includes(sel.type) && !seleccionAbId) {
    const l = hyp(sel.pB[0]-sel.pA[0], sel.pB[1]-sel.pA[1]); const ang = Math.atan2(sel.pB[1]-sel.pA[1], sel.pB[0]-sel.pA[0])*180/Math.PI;
    title = (sel.type === 'wall' ? 'PANEL ' : 'VIGA ') + sel.label;
    html += presetSelectorHtml(sel.type, sel) + `<div class="prop-row"><label>Largo (m)</label><input type="number" step="0.01" value="${(l/1000).toFixed(2)}" onchange="modMuro('largo',this.value)" onkeydown="${kEnt}"></div>
    <div class="prop-row"><label>Ángulo (°)</label><input type="number" step="1" value="${ang.toFixed(0)}" onchange="modMuro('ang',this.value)" onkeydown="${kEnt}"></div>
    <div class="prop-row"><label>Alto inicio (m)</label><input type="number" step="0.05" value="${(sel.hA/1000).toFixed(2)}" onchange="modMuro('hA',this.value)" onkeydown="${kEnt}"></div>
    <div class="prop-row"><label>Alto fin (m)</label><input type="number" step="0.05" value="${(sel.hB/1000).toFixed(2)}" onchange="modMuro('hB',this.value)" onkeydown="${kEnt}"></div>`;
    if (sel.type === 'wall') {
      html += `<div class="prop-row"><label>Eje de Trazado</label><div style="display:flex;gap:6px;">
        <button class="prop-btn-icon ${sel.just==='izq'?'on':''}" onclick="modMuro('just','izq')">${svgJIzq}</button>
        <button class="prop-btn-icon ${(!sel.just||sel.just==='centro')?'on':''}" onclick="modMuro('just','centro')">${svgJCen}</button>
        <button class="prop-btn-icon ${sel.just==='der'?'on':''}" onclick="modMuro('just','der')">${svgJDer}</button>
      </div></div>
      <div class="prop-row"><label>Apoyo en Losa</label><select onchange="modMuro('apoyo',this.value)"><option value="0.15" ${sel.solapeAbajo===0.15?'selected':''}>Sobre losa (15cm)</option><option value="0.30" ${sel.solapeAbajo===0.30?'selected':''}>Balloon (30cm)</option><option value="0" ${sel.solapeAbajo===0?'selected':''}>Sin solape</option></select></div>
      <div class="prop-row"><label>Proyectar a Techo</label><input type="checkbox" ${sel.proyectaTecho?'checked':''} onchange="modMuro('techo',this.checked)"></div>`;
      if (!sel.proyectaTecho) {
        if (sel.peak) html += `<div class="prop-row"><label>Cúspide X (m)</label><input type="number" step="0.01" value="${(sel.peak.x/1000).toFixed(2)}" onchange="modMuro('peakX',this.value)" onkeydown="${kEnt}"></div>
          <div class="prop-row"><label>Cúspide Alto (m)</label><input type="number" step="0.05" value="${(sel.peak.y/1000).toFixed(2)}" onchange="modMuro('peakY',this.value)" onkeydown="${kEnt}"></div>
          <button class="prop-btn-full outline" onclick="modMuro('removePeak')">QUITAR CÚSPIDE</button>`;
        else html += `<button class="prop-btn-full outline" onclick="modMuro('addPeak')">AGREGAR CÚSPIDE</button>`;
      }
      if (sel.uniones && sel.uniones.length) html += roRow('Conexiones', sel.uniones.map(u => { const m2 = objects.find(o=>o.id===u.id); return (m2?m2.label:'?') + ' (' + u.tipo + ')'; }).join(', '));
    }
    html += getMatrizHtml();
  }
  else if (sel && sel.type === 'wall' && seleccionAbId) {
    const ab = sel.aberturas.find(a => a.id === seleccionAbId);
    if (ab) {
      title = (ab.type === 'puerta' ? 'PUERTA' : ab.type === 'ventana' ? 'VENTANA' : 'VANO') + ' EN ' + sel.label;
      const alignSel = `<select id="selAbAlign" onchange="actualizarPropBar()"><option value="dintel">Dintel (borde sup.)</option><option value="antepecho">Antepecho (borde inf.)</option></select>`;
      const yVal = ((ab.y + ab.h)/1000).toFixed(2);
      html = `<div class="prop-row"><label>Ancho (m)</label><input type="number" step="0.05" value="${(ab.w/1000).toFixed(2)}" onchange="modAb('w',this.value)" onkeydown="${kEnt}"></div>
      <div class="prop-row"><label>Alto (m)</label><input type="number" step="0.05" value="${(ab.h/1000).toFixed(2)}" onchange="modAb('h',this.value)" onkeydown="${kEnt}"></div>
      <div class="prop-row"><label>Desde eje X (m)</label><input type="number" step="0.05" value="${(ab.x/1000).toFixed(2)}" onchange="modAb('x',this.value)" onkeydown="${kEnt}"></div>
      <div class="prop-row"><label>Referencia altura</label>${alignSel}</div>
      <div class="prop-row"><label>Cota ref. (m)</label><input type="number" step="0.05" value="${yVal}" onchange="modAb('y_align',this.value)" onkeydown="${kEnt}"></div>`;
      if (ab.type !== 'vano') {
        html += `<div class="prop-row"><label>Tipo</label><select onchange="modAbSubType(this.value)">
          <option value="batiente" ${ab.subType==='batiente'?'selected':''}>Batiente</option><option value="doble" ${ab.subType==='doble'?'selected':''}>Doble hoja</option>
          <option value="corrediza" ${ab.subType==='corrediza'?'selected':''}>Corrediza</option><option value="fijo" ${ab.subType==='fijo'?'selected':''}>Paño fijo</option></select></div>
        <div class="prop-row"><label>Espejar</label><div style="display:flex;gap:6px;"><button class="prop-btn-icon" onclick="flipAb('x')">↔</button><button class="prop-btn-icon" onclick="flipAb('y')">↕</button></div></div>`;
      }
      html += `<button class="prop-btn-full outline danger" onclick="saveHistory();objects.find(o=>o.id===seleccionId).aberturas=objects.find(o=>o.id===seleccionId).aberturas.filter(a=>a.id!==seleccionAbId);seleccionAbId=null;cerrarPanelCard();render();">ELIMINAR ABERTURA</button>`;
    }
  }
  else if (sel && sel.type === 'cercha') {
    const l = hyp(sel.pB[0]-sel.pA[0], sel.pB[1]-sel.pA[1]);
    title = 'ESTRUCTURA ' + sel.label;
    html = presetSelectorHtml('cercha', sel) + `<div class="prop-row"><label>Largo (m)</label><input type="number" step="0.01" value="${(l/1000).toFixed(2)}" onchange="modCercha('largo',this.value)" onkeydown="${kEnt}"></div>
    <div class="prop-row"><label>Alto izq (m)</label><input type="number" step="0.05" value="${(sel.hIzq/1000).toFixed(2)}" onchange="modCercha('hIzq',this.value)" onkeydown="${kEnt}"></div>
    <div class="prop-row"><label>Alto der (m)</label><input type="number" step="0.05" value="${(sel.hDer/1000).toFixed(2)}" onchange="modCercha('hDer',this.value)" onkeydown="${kEnt}"></div>
    <div class="prop-row"><label>Alto pico (m)</label><input type="number" step="0.05" value="${(sel.hPico/1000).toFixed(2)}" onchange="modCercha('hPico',this.value)" onkeydown="${kEnt}"></div>
    <div class="prop-row"><label>Posición pico (0-1)</label><input type="number" step="0.05" min="0" max="1" value="${sel.xPico}" onchange="modCercha('xPico',this.value)" onkeydown="${kEnt}"></div>
    <div class="prop-row"><label>Eje de Trazado</label><div style="display:flex;gap:6px;">
      <button class="prop-btn-icon ${sel.just==='izq'?'on':''}" onclick="modCercha('just','izq')">${svgJIzq}</button>
      <button class="prop-btn-icon ${(!sel.just||sel.just==='centro')?'on':''}" onclick="modCercha('just','centro')">${svgJCen}</button>
      <button class="prop-btn-icon ${sel.just==='der'?'on':''}" onclick="modCercha('just','der')">${svgJDer}</button>
    </div></div>` + getMatrizHtml();
  }
  else if (sel && sel.type === 'columna') {
    title = 'COLUMNA ' + sel.label;
    html = presetSelectorHtml('columna', sel) + `<div class="prop-row"><label>Altura (m)</label><input type="number" step="0.05" value="${(sel.altura/1000).toFixed(2)}" onchange="modColumna('altura',this.value)" onkeydown="${kEnt}"></div>
    <div class="prop-row"><label>Ancho base (m)</label><input type="number" step="0.05" value="${(sel.anchoBase/1000).toFixed(2)}" onchange="modColumna('anchoBase',this.value)" onkeydown="${kEnt}"></div>
    <div class="prop-row"><label>Ancho tope (m)</label><input type="number" step="0.05" value="${(sel.anchoTope/1000).toFixed(2)}" onchange="modColumna('anchoTope',this.value)" onkeydown="${kEnt}"></div>
    <div class="prop-row"><label>Cara recta</label><select onchange="modColumna('caraRecta',this.value)">${['IZQ','DER','CENTRO'].map(c => `<option value="${c}" ${sel.caraRecta===c?'selected':''}>${c}</option>`).join('')}</select></div>
    <div class="prop-row"><label>Ángulo planta (°)</label><input type="number" step="1" value="${(sel.angle*180/Math.PI).toFixed(0)}" onchange="modColumna('ang',this.value)" onkeydown="${kEnt}"></div>` + getMatrizHtml();
  }
  else if (sel && sel.type === 'losa') {
    title = 'LOSA ' + (sel.label || '');
    html = presetSelectorHtml('losa', sel) + `<div class="prop-row"><label>Sentido viguetas</label><select onchange="modLosa('sentidoVigas',this.value)"><option value="X" ${sel.sentidoVigas==='X'?'selected':''}>Horizontal (X)</option><option value="Y" ${sel.sentidoVigas==='Y'?'selected':''}>Vertical (Y)</option></select></div>
    ${roRow('Dimensiones', (Math.abs(sel.p2[0]-sel.p1[0])/1000).toFixed(2) + ' × ' + (Math.abs(sel.p2[1]-sel.p1[1])/1000).toFixed(2) + ' m')}
    <div style="font-size:12px;color:var(--label);margin-top:8px;">Los huecos se trazan con el lápiz.</div>`;
  }
  else if (sel && sel.type === 'cielorraso') {
    title = 'CIELORRASO';
    html = presetSelectorHtml('cielorraso', sel) + `<div class="prop-row"><label>Altura NPT (m)</label><input type="number" step="0.05" value="${(sel.hBase/1000).toFixed(2)}" onchange="modCielo('hBase',this.value)" onkeydown="${kEnt}"></div>
    <div class="prop-row"><label>Sentido omegas</label><select onchange="modCielo('sentidoVigas',this.value)"><option value="X" ${sel.sentidoVigas==='X'?'selected':''}>Horizontal (X)</option><option value="Y" ${sel.sentidoVigas==='Y'?'selected':''}>Vertical (Y)</option></select></div>`;
  }
  else if (sel && sel.type === 'roof') {
    title = 'PLANO DE TECHO';
    html = presetSelectorHtml('roof', sel) + `<div class="prop-row"><label>Altura base (m)</label><input type="number" step="0.05" value="${(sel.hBase/1000).toFixed(2)}" onchange="modRoof('hBase',this.value)" onkeydown="${kEnt}"></div>
    <div class="prop-row"><label>Pendiente (%)</label><input type="number" step="1" value="${sel.slope}" onchange="modRoof('slope',this.value)" onkeydown="${kEnt}"></div>
    <div class="prop-row"><label>Caída hacia</label><select onchange="modRoof('fallDir',this.value)"><option value="abajo" ${sel.fallDir==='abajo'?'selected':''}>Abajo</option><option value="arriba" ${sel.fallDir==='arriba'?'selected':''}>Arriba</option><option value="izq" ${sel.fallDir==='izq'?'selected':''}>Izquierda</option><option value="der" ${sel.fallDir==='der'?'selected':''}>Derecha</option></select></div>
    <div class="prop-row"><label>Alero (m)</label><input type="number" step="0.05" value="${(sel.alero/1000).toFixed(2)}" onchange="modRoof('alero',this.value)" onkeydown="${kEnt}"></div>`;
  }
  else if (sel && sel.type === 'guide') {
    title = 'GUÍA ' + (Math.abs(sel.angle) < 0.01 ? 'HORIZONTAL' : 'VERTICAL');
    html = `<div class="prop-row"><label>Desplazar (m)</label><input type="number" step="0.05" placeholder="±" onkeydown="if(event.key==='Enter'){modGuide(this.value);this.value='';this.blur();}"></div>
    <button class="prop-btn-full outline danger" onclick="saveHistory();objects=objects.filter(o=>o.id!==seleccionId);seleccionId=null;cerrarPanelCard();render();">ELIMINAR GUÍA</button>`;
  }
  else if (sel && ['hueco','babeta'].includes(sel.type)) {
    title = sel.type === 'hueco' ? 'HUECO' : 'BABETA';
    html = roRow('Vértices', sel.pts.length) + `<button class="prop-btn-full outline danger" onclick="saveHistory();objects=objects.filter(o=>o.id!==seleccionId);seleccionId=null;cerrarPanelCard();render();">ELIMINAR</button>`;
  }
  else if (tool === 'rotate_edit' && sel) {
    title = 'ROTAR ' + (sel.label || '');
    if (sel.type === 'columna') html = `<div class="prop-row"><label>Ángulo (°)</label><input type="number" step="5" value="${(sel.angle*180/Math.PI).toFixed(0)}" onchange="modColumna('ang',this.value)" onkeydown="${kEnt}"></div>`;
    else if (['wall','viga'].includes(sel.type)) { const ang = Math.atan2(sel.pB[1]-sel.pA[1], sel.pB[0]-sel.pA[0])*180/Math.PI; html = `<div class="prop-row"><label>Ángulo (°)</label><input type="number" step="5" value="${ang.toFixed(0)}" onchange="modMuro('ang',this.value)" onkeydown="${kEnt}"></div>`; }
    else html = `<div style="font-size:13px;color:var(--label);">Este objeto no admite rotación directa.</div>`;
  }
  else if (tool === 'join') { title = 'CONEXIÓN A/B/T'; html = `<div style="font-size:13px;color:var(--label);">Arrastrá desde el Muro A hasta el Muro B. Elegí quién comanda: su revestimiento pasa y el otro remata en su cara.</div>`; }
  else if (tool === 'guide') { title = 'GUÍA PARALELA'; html = `<div style="font-size:13px;color:var(--label);">Arrastrá desde un muro para crear una guía paralela con offset, o desde el vacío para una guía libre H/V.</div>`; }
  else { title = 'PROPIEDADES'; html = `<div style="font-size:13px;color:var(--label);">Tocá un objeto para ver sus propiedades. Mantené presionado para el menú contextual.</div>`; }

  pcT.textContent = title; pcC.innerHTML = html;
  if (forceCardOpen && html) { card.classList.add('open'); ind.textContent = 'Cerrar ▾'; } else { card.classList.remove('open'); ind.textContent = 'Toca un objeto ▴'; }
}

function cerrarPanelCard() { forceCardOpen = false; document.getElementById('prop-card').classList.remove('open'); document.getElementById('pb-indicator').textContent = 'Toca un objeto ▴'; }
function abrirPanelDesdeBarra() { const card = document.getElementById('prop-card'); if (card.classList.contains('open')) { cerrarPanelCard(); } else { forceCardOpen = true; actualizarPropBar(); } }

// ---------- BITÁCORA DE OBRA ----------
function toggleNotas() { const m = document.getElementById('notas-modal'); const abierto = m.style.display === 'flex'; m.style.display = abierto ? 'none' : 'flex'; if (!abierto) renderNotas(); }

function renderNotas() {
  const h = document.getElementById('notas-historial');
  if (!notasProyecto.length) { h.innerHTML = '<div style="font-size:13px;color:var(--label);">Sin notas todavía.</div>'; return; }
  h.innerHTML = notasProyecto.map((n, i) => `<div style="border:1px solid var(--ink3);border-radius:8px;padding:10px 12px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
      <span style="font-size:11px;font-weight:700;color:var(--accent);">${n.fecha}</span>
      <button onclick="notasProyecto.splice(${i},1);renderNotas();ilPersist();" style="background:none;border:none;color:var(--label);font-size:11px;font-weight:700;cursor:pointer;">BORRAR</button>
    </div><div style="font-size:14px;">${n.html}</div></div>`).join('');
}

function guardarNuevaNota() {
  const el = document.getElementById('nota-content'); const html = el.innerHTML.trim();
  if (!html || html === '<br>') return toast("Nota vacía");
  const f = new Date(); const fecha = f.toLocaleDateString('es-UY') + ' ' + f.toLocaleTimeString('es-UY', {hour:'2-digit', minute:'2-digit'});
  notasProyecto.push({ fecha, html }); el.innerHTML = ''; renderNotas(); ilPersist(); toast("Nota guardada");
}

function copiarHistorial() {
  if (!notasProyecto.length) return toast("Sin notas");
  const tmp = document.createElement('div');
  const txt = notasProyecto.map(n => { tmp.innerHTML = n.html; return `[${n.fecha}]\n${tmp.textContent}`; }).join('\n\n');
  navigator.clipboard.writeText(txt).then(() => toast("Bitácora copiada")).catch(() => toast("No se pudo copiar"));
}

function formatearNota(cmd) { document.getElementById('nota-content').focus(); document.execCommand(cmd, false, null); }

let dictando = null;
function iniciarDictado() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return toast("Dictado no disponible en este navegador");
  if (dictando) { dictando.stop(); dictando = null; return toast("Dictado detenido"); }
  const rec = new SR(); rec.lang = 'es-UY'; rec.continuous = true; rec.interimResults = false;
  rec.onresult = (e) => { const el = document.getElementById('nota-content'); for (let i = e.resultIndex; i < e.results.length; i++) if (e.results[i].isFinal) el.innerHTML += (el.innerHTML ? ' ' : '') + e.results[i][0].transcript; };
  rec.onend = () => { dictando = null; }; rec.onerror = () => { dictando = null; toast("Error de dictado"); };
  rec.start(); dictando = rec; toast("Dictando… tocá el micrófono para parar");
}

// ---------- HELPERS UI ----------
function saveHistory() { history.push(JSON.stringify(objects)); if (history.length > 40) history.shift(); }
function undo() { if (!history.length) return toast("Nada para deshacer"); objects = JSON.parse(history.pop()); seleccionId = null; seleccionAbId = null; lastCopyData = null; cerrarPanelCard(); render(); toast("Deshecho"); }
let toastTimer = null;
function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 2200); }
function toggleTools() { document.getElementById('panel-herr').classList.toggle('open'); }
function toggleSnap() { snapOn = !snapOn; document.getElementById('snapBtn').classList.toggle('on', snapOn); toast(snapOn ? "Snap activado" : "Snap libre"); }

function ST(t) {
  tool = t; drawing = false; polyPts = []; startObjId = null;
  if (!['select','move','copy','rotate_edit'].includes(t)) { seleccionId = null; seleccionAbId = null; lastCopyData = null; }
  document.querySelectorAll('.phb').forEach(b => b.classList.toggle('on', b.dataset.t === t));
  if (['wall','cercha','viga','columna','losa','roof','join','guide','babeta','lapiz','cielorraso','puerta','ventana','vano'].includes(t)) forceCardOpen = true;
  actualizarPropBar(); render();
}

// ---------- INIT ----------
document.title = 'iLFrame v1.40';
setTimeout(() => {
  resize(); setVista('planta');
  // Avisar al dashboard que el canvas está listo → responde con load + types + focus.
  try { parent.postMessage({ ilframe: 'ready' }, '*'); } catch (e) {}
}, 100);
