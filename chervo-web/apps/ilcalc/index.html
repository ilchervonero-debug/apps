<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#F2F2F0">
<title>iLCalc</title>
<link rel="manifest" href="/apps/ilcalc/manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --fondo:#F2F2F0;
    --fondo-2:#E7E7E4;
    --tinta:#1C1C1C;
    --gris:#7A7A7A;
    --linea:#DCDCD8;
    --rojo:#FE0000;
    --op:#D4D4CE;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:'Geist',system-ui,sans-serif;
    background:var(--fondo);color:var(--tinta);
    display:flex;flex-direction:column;overflow:hidden;
    padding:14px 14px calc(14px + env(safe-area-inset-bottom));
  }
  header{flex-shrink:0;padding:6px 4px 12px}
  .titulo{font-size:1.05rem;font-weight:700;letter-spacing:-.02em}
  .titulo span{color:var(--rojo)}
  .pant{
    font-family:'Geist Mono',monospace;font-size:2.2rem;text-align:right;
    padding:18px 16px;background:var(--fondo-2);border-radius:14px;margin-bottom:12px;
    min-height:4rem;overflow:hidden;word-wrap:break-word;flex-shrink:0;
    display:flex;align-items:center;justify-content:flex-end;
  }
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;flex:1}
  .grid button{
    border:none;font-family:'Geist Mono',monospace;font-size:1.5rem;cursor:pointer;
    border-radius:14px;background:var(--fondo-2);color:var(--tinta);
  }
  .grid button:active{filter:brightness(.94)}
  .grid button.op{background:var(--op);color:var(--rojo);font-weight:700}
  .grid button.ig{background:var(--rojo);color:#fff}
</style>
</head>
<body>

<header>
  <div class="titulo" onclick="ilsxOpen()" style="cursor:pointer">iL<span>Calc</span></div>
</header>

<div class="pant" id="pant">0</div>
<div class="grid" id="grid"></div>

<script>
const pant=document.getElementById('pant');
let expr='';

function render(){ pant.textContent=expr||'0'; }

function pulsar(t){
  if(t==='C'){ expr=''; }
  else if(t==='⌫'){ expr=expr.slice(0,-1); }
  else if(t==='='||t==='√'||t==='%'){
    try{
      const js=expr.replace(/÷/g,'/').replace(/×/g,'*').replace(/−/g,'-');
      if(/^[0-9+\-*/().\s]+$/.test(js)&&js.trim()){
        let r=Function('"use strict";return ('+js+')')();
        if(t==='√'){ if(r<0){ pant.textContent='error'; expr=''; return; } r=Math.sqrt(r); }
        if(t==='%') r=r/100;
        expr=(Math.round(r*1000000)/1000000).toString();
      }
    }catch(e){ expr=''; pant.textContent='error'; return; }
  }
  else{ expr+=t; }
  render();
}

const teclas=['C','√','%','÷','7','8','9','×','4','5','6','−','1','2','3','+','0','.','⌫','='];
const grid=document.getElementById('grid');
teclas.forEach(t=>{
  const b=document.createElement('button');
  b.textContent=t;
  if('÷×−+'.includes(t)) b.className='op';
  if('√%'.includes(t)) b.className='op';
  if(t==='=') b.className='ig';
  b.onclick=()=>pulsar(t);
  grid.appendChild(b);
});

// teclado físico (para escritorio)
document.addEventListener('keydown',e=>{
  const k=e.key;
  if(/[0-9().]/.test(k)) pulsar(k);
  else if(k==='/') pulsar('÷');
  else if(k==='*') pulsar('×');
  else if(k==='-') pulsar('−');
  else if(k==='+') pulsar('+');
  else if(k==='Enter'||k==='=') pulsar('=');
  else if(k==='Backspace') pulsar('⌫');
  else if(k==='Escape'||k.toLowerCase()==='c') pulsar('C');
});

render();
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>

<!-- ===== iLStorage panel (estetico, additivo) ===== -->
<link href="https://fonts.googleapis.com/css2?family=Exo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
#ilsx-ov{position:fixed;inset:0;background:rgba(20,20,20,.45);display:none;align-items:flex-end;justify-content:center;z-index:99999;font-family:'Exo',system-ui,sans-serif}
#ilsx-ov.on{display:flex}
#ilsx-sheet{background:#fff;width:100%;max-width:600px;border-radius:22px 22px 0 0;padding:8px 0 calc(20px + env(safe-area-inset-bottom,0px));box-shadow:0 -8px 40px rgba(0,0,0,.18);animation:ilsxUp .25s cubic-bezier(.3,1.1,.5,1)}
@keyframes ilsxUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
#ilsx-grip{width:38px;height:4px;border-radius:2px;background:#e2e2e2;margin:6px auto 14px}
.ilsx-app{font-size:20px;font-weight:700;color:#2b2b2b;padding:0 22px;letter-spacing:-.3px}
.ilsx-app b{color:#fe0000;font-weight:800}
.ilsx-ver{font-size:12px;color:#8a8a8a;padding:3px 22px 12px;font-weight:300}
.ilsx-row{display:flex;align-items:center;gap:13px;width:100%;text-align:left;background:none;border:none;border-top:1px solid #f0f0f0;padding:16px 22px;font-family:inherit;font-size:15px;font-weight:600;color:#2b2b2b;cursor:pointer;text-decoration:none}
.ilsx-row svg{width:19px;height:19px;color:#8a8a8a;flex:none}
.ilsx-row:active{background:#fafafa}
.ilsx-foot{text-align:center;font-size:11px;color:#c4c4c4;font-weight:800;letter-spacing:.14em;padding:16px 0 2px}
</style>
<div id="ilsx-ov" onclick="if(event.target===this)ilsxClose()">
  <div id="ilsx-sheet">
    <div id="ilsx-grip"></div>
    <div class="ilsx-app">iL<b>Calc</b></div>
    <div class="ilsx-ver">versión 1.0</div>
    <a class="ilsx-row" href="/"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Volver a iLStorage</a>
    <div class="ilsx-foot">iLStorage</div>
  </div>
</div>
<script>
function ilsxOpen(){document.getElementById('ilsx-ov').classList.add('on')}
function ilsxClose(){document.getElementById('ilsx-ov').classList.remove('on')}
</script>
</body>
</html>
