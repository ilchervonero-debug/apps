<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Bitacorapp">
    <title>Bitacorapp</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.svg">
    <link href="https://fonts.googleapis.com/css2?family=Exo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f7f7f7;
            --surface: #ffffff;
            --border: #e8e8e8;
            --ink: #1a1a1a;
            --ink-2: #555555;
            --ink-3: #aaaaaa;
            --red: #c0392b;
            --accent: #1a1a1a;
            --accent-soft: #f0f0f0;
            --code-bg: #1a1a1a;
            --code-fg: #e0e0e0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Exo', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }

        /* ===== HEADER ===== */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 20px; border-bottom: 1px solid var(--border);
            background: var(--surface); position: sticky; top: 0; z-index: 100;
            backdrop-filter: blur(10px);
        }
        .header h1 {
            font-size: 1.5rem; font-weight: 800; letter-spacing: -1px;
        }
        .header h1 .bita { color: var(--red); }
        .header h1 .app-word { color: var(--ink); font-weight: 800; }
        .header-fecha { font-size: 0.75rem; color: var(--ink-3); font-weight: 500; text-align: right; line-height: 1.5; }

        /* ===== PAGES ===== */
        .page { padding: 20px; max-width: 900px; margin: 0 auto; display: none; padding-bottom: 110px; }
        .page.active { display: block; animation: fadeIn .22s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        /* ===== DASHBOARD GRID ===== */
        .proyectos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }

        .proyecto-card {
            background: var(--surface); border-radius: 18px; overflow: hidden;
            border: 1px solid var(--border); cursor: pointer;
            transition: transform .18s ease, box-shadow .18s ease; position: relative; aspect-ratio: 1;
            display: flex; flex-direction: column;
            animation: cardIn .25s ease both;
        }
        @keyframes cardIn { from { opacity: 0; transform: scale(.94); } to { opacity: 1; transform: scale(1); } }
        .proyecto-card:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,.1); }
        .proyecto-card:active { transform: scale(0.96); }
        .card-icon-wrap {
            flex: 1; display: flex; align-items: center; justify-content: center;
            background-size: cover; background-position: center;
            transition: transform .3s ease;
        }
        .proyecto-card:hover .card-icon-wrap { transform: scale(1.04); }
        .card-icon-wrap svg { width: 40px; height: 40px; color: var(--ink); opacity: 0.15; }
        .card-icon-wrap.has-photo svg { display: none; }
        .card-body { padding: 10px 12px 12px; border-top: 1px solid var(--border); }
        .card-titulo { font-size: 0.82rem; font-weight: 700; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-meta-row { display: flex; gap: 8px; margin-top: 4px; font-size: 0.7rem; color: var(--ink-3); font-weight: 500; }
        .card-del {
            position: absolute; top: 7px; right: 7px; width: 26px; height: 26px;
            border-radius: 50%; border: 2px solid white; background: #1c1c1e;
            color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity .2s; z-index: 10;
        }
        .card-del svg { width: 11px; height: 11px; }
        @keyframes wiggle {
            0%,100% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(-1.8deg) scale(1.01); }
            75% { transform: rotate(1.8deg) scale(1.01); }
        }
        .edit-mode .proyecto-card { animation: wiggle .45s ease-in-out infinite; }
        .edit-mode .proyecto-card .card-del { opacity: 1; }
        .edit-mode .proyecto-card:hover { transform: none; box-shadow: none; }

        /* ===== EMPTY STATE ===== */
        .empty-state { text-align: center; padding: 80px 20px 40px; animation: fadeIn .3s ease; }
        .empty-state svg { width: 48px; height: 48px; color: var(--ink-3); margin-bottom: 16px; opacity: 0.4; }
        .empty-state h3 { font-size: 1rem; color: var(--ink-2); margin-bottom: 6px; }
        .empty-state p { font-size: 0.82rem; color: var(--ink-3); }

        /* ===== FAB ===== */
        .fab {
            position: fixed; bottom: 28px; right: 24px;
            width: 56px; height: 56px; border-radius: 16px;
            background: #1c1c1e; color: white; border: none;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 16px rgba(0,0,0,.22); z-index: 800;
            transition: transform .18s cubic-bezier(.34,1.5,.64,1), box-shadow .18s;
        }
        .fab:hover { transform: scale(1.07); box-shadow: 0 4px 24px rgba(0,0,0,.3); }
        .fab:active { transform: scale(0.91); }
        .fab svg { width: 24px; height: 24px; }
        .fab.hidden { display: none; }

        /* ===== PROYECTO HEADER ===== */
        .proyecto-header-bar {
            display: flex; align-items: center; gap: 12px;
            padding: 0 0 18px 0; margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        .btn-volver {
            width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border);
            background: var(--surface); color: var(--ink);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all .2s;
        }
        .btn-volver:hover { background: var(--ink); color: white; border-color: var(--ink); }
        .proyecto-header-info { flex: 1; min-width: 0; }
        .proyecto-header-info h2 { font-size: 1.2rem; font-weight: 800; }
        .proyecto-header-info .meta { font-size: 0.72rem; color: var(--ink-3); margin-top: 2px; }
        .btn-editar-nombre {
            padding: 7px 12px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--surface); color: var(--ink-2);
            cursor: pointer; font-family: 'Exo', sans-serif; font-size: 0.78rem; font-weight: 600;
            display: flex; align-items: center; gap: 5px; transition: all .2s; white-space: nowrap;
        }
        .btn-editar-nombre:hover { background: var(--ink); color: white; border-color: var(--ink); }

        /* ===== BLOQUES TIMELINE ===== */
        .bloques-timeline { display: flex; flex-direction: column; gap: 10px; }

        .bloque {
            background: var(--surface); border-radius: 14px; overflow: hidden;
            border: 1px solid var(--border); transition: box-shadow .2s;
            animation: bloqueFade .2s ease both;
        }
        @keyframes bloqueFade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .bloque:hover { box-shadow: 0 4px 16px rgba(0,0,0,.07); }
        .bloque-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 9px 12px; border-bottom: 1px solid var(--border); background: var(--bg);
        }
        .bloque-meta { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; color: var(--ink-3); font-weight: 500; }
        .bloque-acciones { display: flex; gap: 2px; }
        .btn-bloque {
            width: 30px; height: 30px; border-radius: 8px; border: none;
            background: transparent; color: var(--ink-3);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all .15s;
        }
        .btn-bloque svg { width: 14px; height: 14px; }
        .btn-bloque:hover { background: var(--accent-soft); color: var(--ink); }
        .btn-bloque.eliminar:hover { background: #fee2e2; color: #c0392b; }
        .bloque-contenido { padding: 14px 16px; }
        .nota-fotos { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .nota-foto-img { border-radius: 8px; object-fit: cover; cursor: pointer; aspect-ratio: 4/3; flex: 1 1 calc(50% - 3px); max-width: calc(50% - 3px); display: block; }
        .nota-foto-img:only-child { flex: none; width: 100%; max-width: 100%; max-height: 320px; object-fit: contain; background: #000; }

        /* ===== FOTO STRIP EDITOR ===== */
        .foto-strip { display: flex; gap: 8px; padding: 8px 10px; overflow-x: auto; background: var(--bg); border: 1px solid var(--border); border-top: none; min-height: 0; }
        .foto-strip:empty { display: none; }
        .foto-thumb-wrap { position: relative; flex-shrink: 0; }
        .foto-thumb { width: 52px; height: 52px; border-radius: 8px; object-fit: cover; display: block; }
        .foto-thumb-del {
            position: absolute; top: -5px; right: -5px; width: 18px; height: 18px;
            border-radius: 50%; background: #1c1c1e; color: white; border: none;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        /* ===== MARKDOWN ===== */
        .md-render { line-height: 1.75; font-size: 0.93rem; color: var(--ink); }
        .md-render h1 { font-size: 1.25rem; font-weight: 800; margin: 10px 0 6px; }
        .md-render h2 { font-size: 1.05rem; font-weight: 700; margin: 8px 0 4px; }
        .md-render h3 { font-size: 0.95rem; font-weight: 700; margin: 6px 0 4px; }
        .md-render p { margin-bottom: 8px; }
        .md-render ul, .md-render ol { padding-left: 18px; margin-bottom: 8px; }
        .md-render li { margin-bottom: 3px; }
        .md-render strong { font-weight: 800; }
        .md-render em { font-style: italic; color: var(--ink-2); }
        .md-render code { background: var(--bg); padding: 1px 6px; border-radius: 4px; font-family: monospace; font-size: 0.86em; border: 1px solid var(--border); }
        .md-render blockquote { border-left: 3px solid var(--red); padding-left: 12px; color: var(--ink-2); font-style: italic; margin: 6px 0; }
        .md-render hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
        .code-block { background: var(--code-bg); border-radius: 10px; margin: 8px 0; overflow: hidden; position: relative; }
        .code-block pre { padding: 14px; color: var(--code-fg); font-family: 'Courier New', monospace; font-size: 0.83rem; line-height: 1.5; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
        .btn-copy-code {
            position: absolute; top: 8px; right: 8px;
            background: rgba(255,255,255,0.08); color: #999; border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px; padding: 4px 10px; font-size: 0.7rem; cursor: pointer;
            font-family: 'Exo', sans-serif; font-weight: 600; transition: all .2s; display: flex; align-items: center; gap: 4px;
        }
        .btn-copy-code svg { width: 11px; height: 11px; }
        .btn-copy-code:hover { background: white; color: var(--ink); border-color: white; }


        /* ===== MODALES ===== */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4); display: none; align-items: flex-end;
            justify-content: center; z-index: 1000; backdrop-filter: blur(4px);
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--surface); border-radius: 20px 20px 0 0;
            width: 100%; max-width: 700px; max-height: 95vh; overflow-y: auto;
            animation: slideUp 0.28s cubic-bezier(.34,1.2,.64,1); padding-bottom: env(safe-area-inset-bottom, 0);
        }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border); margin: 10px auto 0; }
        .modal-header { padding: 14px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h2 { font-size: 1.1rem; font-weight: 700; }
        .modal-header h2 span { color: var(--red); font-weight: 300; }
        .btn-cerrar {
            width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border);
            background: var(--surface); color: var(--ink-2); cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: all .2s;
        }
        .btn-cerrar svg { width: 14px; height: 14px; }
        .btn-cerrar:hover { background: var(--ink); color: white; border-color: var(--ink); }
        .modal-body { padding: 0 20px 20px; }
        .modal-footer { padding: 12px 20px 20px; display: flex; justify-content: flex-end; gap: 8px; border-top: 1px solid var(--border); }

        /* ===== EDITOR ===== */
        .editor-toolbar {
            display: flex; align-items: center; gap: 3px; padding: 8px 10px;
            background: var(--bg); border-radius: 10px 10px 0 0;
            border: 1px solid var(--border); border-bottom: none; flex-wrap: wrap;
        }
        .tbtn {
            min-width: 28px; height: 28px; padding: 0 5px; border: none; border-radius: 6px;
            background: transparent; color: var(--ink-2); cursor: pointer;
            font-family: 'Exo', sans-serif; font-size: 0.78rem; font-weight: 700;
            display: flex; align-items: center; justify-content: center; transition: all .15s;
        }
        .tbtn svg { width: 13px; height: 13px; }
        .tbtn:hover { background: var(--surface); color: var(--ink); }
        .tbtn.mic { background: var(--ink); color: white; margin-left: auto; border-radius: 8px; padding: 0 10px; gap: 4px; font-size: 0.72rem; }
        .tbtn.mic:hover { opacity: 0.85; }
        .tbtn.mic.grabando { background: var(--red); animation: pulse 1.2s infinite; }
        .tbtn-sep { width: 1px; height: 16px; background: var(--border); margin: 0 2px; }
        .voz-ind { font-size: 0.7rem; color: var(--red); font-weight: 700; display: none; }
        .voz-ind.on { display: inline; animation: pulse 1.2s infinite; }
        .editor-ta {
            width: 100%; min-height: 160px; padding: 14px; border: 1px solid var(--border);
            border-top: none; border-radius: 0 0 10px 10px; font-family: 'Exo', sans-serif;
            font-size: 0.93rem; color: var(--ink); resize: vertical; background: var(--surface);
            transition: border-color .15s;
        }
        .editor-ta:focus { outline: none; border-color: var(--ink); }
        .editor-preview-box {
            width: 100%; min-height: 100px; padding: 14px; border: 1px solid var(--ink);
            border-top: none; border-radius: 0 0 10px 10px; background: var(--bg); display: none;
        }
        .editor-preview-box.on { display: block; }

        /* ===== FORM ===== */
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-weight: 700; font-size: 0.72rem; color: var(--ink-3); margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.8px; }
        .form-input {
            width: 100%; padding: 12px 14px; border: 1px solid var(--border);
            border-radius: 10px; font-family: 'Exo', sans-serif; font-size: 0.93rem;
            color: var(--ink); background: var(--surface); transition: border-color .15s;
        }
        .form-input:focus { outline: none; border-color: var(--red); }
        input[type="file"] { display: none; }

        /* ===== BOTONES ===== */
        .btn { padding: 10px 20px; border-radius: 10px; font-family: 'Exo', sans-serif; font-weight: 700; font-size: 0.88rem; cursor: pointer; transition: all .2s; border: none; display: flex; align-items: center; gap: 6px; }
        .btn svg { width: 15px; height: 15px; }
        .btn-primario { background: var(--red); color: white; }
        .btn-primario:hover { background: #a93226; }
        .btn-secundario { background: var(--bg); color: var(--ink-2); border: 1px solid var(--border); }
        .btn-secundario:hover { background: var(--border); }

        /* ===== TOAST ===== */
        .toast {
            position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(10px);
            background: var(--ink); color: white; padding: 10px 20px; border-radius: 20px;
            font-weight: 600; font-size: 0.82rem; opacity: 0; transition: all .3s; z-index: 3000;
            white-space: nowrap; pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.err { background: var(--red); }

        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }

        @media (max-width: 600px) {
            .proyectos-grid { grid-template-columns: repeat(2, 1fr); }
            .header h1 { font-size: 1.25rem; }
            .btn-add-tipo { font-size: 0.7rem; }
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* ===== PRINT ===== */
        #print-content { display: none; }
        @media print {
            body > *:not(#print-content) { display: none !important; }
            #print-content { display: block !important; font-family: 'Helvetica Neue', Arial, sans-serif; color: #1a1a1a; }
            .pr-portada { padding: 32px 0 20px; border-bottom: 3px solid #C70000; margin-bottom: 28px; }
            .pr-portada h1 { font-size: 1.8rem; font-weight: 900; margin: 0 0 4px; letter-spacing: -1px; }
            .pr-portada h1 span { color: #C70000; }
            .pr-portada h2 { font-size: 1.2rem; margin: 0 0 6px; font-weight: 700; }
            .pr-portada .meta { font-size: 0.75rem; color: #888; }
            .pr-bloque { padding: 14px 0; border-bottom: 1px solid #e8e8e8; break-inside: avoid; }
            .pr-fecha { font-size: 0.7rem; color: #aaa; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
            .md-render { line-height: 1.7; font-size: 0.92rem; }
            .md-render p { margin: 0 0 6px; }
            .md-render h1 { font-size: 1.1rem; font-weight: 800; margin: 8px 0 4px; }
            .md-render h2 { font-size: 1rem; font-weight: 700; margin: 6px 0 3px; }
            .md-render h3 { font-size: 0.9rem; font-weight: 700; margin: 4px 0 2px; }
            .md-render ul, .md-render ol { padding-left: 16px; margin: 0 0 6px; }
            .md-render strong { font-weight: 800; }
            .md-render em { font-style: italic; color: #555; }
            .md-render code { background: #f4f4f4; padding: 1px 4px; border-radius: 3px; font-size: 0.84em; }
            .md-render blockquote { border-left: 3px solid #C70000; padding-left: 10px; color: #555; font-style: italic; margin: 4px 0; }
            .pr-fotos { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
            .pr-fotos img { border-radius: 6px; object-fit: cover; flex: 1 1 calc(50% - 3px); max-width: calc(50% - 3px); max-height: 200px; }
            .pr-fotos img:only-child { flex: none; width: 100%; max-width: 100%; max-height: 280px; object-fit: contain; }
            .code-block { background: #f4f4f4 !important; border-radius: 6px; margin: 6px 0; }
            .code-block pre { color: #1a1a1a !important; padding: 10px; font-size: 0.8rem; }
            .btn-copy-code { display: none !important; }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <h1><span class="bita">Bitacora</span><span class="app-word">app</span></h1>
    <div class="header-fecha" id="header-fecha"></div>
</div>

<!-- PAGE: DASHBOARD -->
<div class="page active" id="page-dashboard">
    <div style="height: 20px;"></div>
    <div class="proyectos-grid" id="proyectos-grid"></div>
    <div class="empty-state" id="empty-state" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        <h3>Sin proyectos</h3>
        <p>Tocá + para empezar</p>
    </div>
</div>

<!-- PAGE: VISTA PROYECTO -->
<div class="page" id="page-proyecto">
    <div style="height: 20px;"></div>
    <div class="proyecto-header-bar">
        <button class="btn-volver" onclick="irDashboard()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="proyecto-header-info">
            <h2 id="vp-nombre">—</h2>
            <div class="meta" id="vp-fecha">—</div>
        </div>
        <button class="btn-editar-nombre" onclick="abrirModalNombre()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Renombrar
        </button>
    </div>
    <div class="bloques-timeline" id="bloques-timeline"></div>
</div>

<!-- PRINT CONTENT — oculto, visible solo en @media print -->
<div id="print-content"></div>

<!-- FAB -->
<button class="fab" id="fab" onclick="onFab()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>
<!-- MODAL: NUEVO PROYECTO -->
<div class="modal-overlay" id="modal-nuevo-proyecto">
    <div class="modal">
        <div class="modal-handle"></div>
        <div class="modal-header">
            <h2>Nuevo <span>proyecto</span></h2>
            <button class="btn-cerrar" onclick="cerrarModal('modal-nuevo-proyecto')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>Nombre</label>

<input type="file" id="input-foto-galeria" accept="image/*" multiple onchange="onFotoNota(event)">
<input type="file" id="input-foto-camara" accept="image/*" capture="environment" onchange="onFotoNota(event)">

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ===== ESTADO =====
let proyectos = JSON.parse(localStorage.getItem('bita_proyectos') || '[]');
let proyectoIdx = null;
let bloqueEditIdx = null;
let notaFotos = [];
let recognition = null;
let grabando = false;
let previewing = false;
let editMode = false;
let lpTimer = null;

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
    actualizarFecha();
    renderDashboard();
    initVoz();
});

function actualizarFecha() {
    const el = document.getElementById('header-fecha');
    const d = new Date();
    const s = d.toLocaleDateString('es-ES', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
    el.textContent = s.charAt(0).toUpperCase() + s.slice(1);
}

function guardar() {
    try {
        localStorage.setItem('bita_proyectos', JSON.stringify(proyectos));
    } catch(e) {
        toast('Sin espacio — las fotos ocupan mucho. Borrá alguna nota con fotos.', 'err');
    }
}

// ===== MARKDOWN =====
function md(text) {
    if (!text) return '';
    let t = text
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const codes = [];
    t = t.replace(/```([\s\S]*?)```/g, (_, c) => {
        const i = codes.length;
        codes.push(c.trim());
        return `\x00CODE${i}\x00`;
    });
    t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
    t = t.replace(/^### (.+)$/gm,'<h3>$1</h3>')
         .replace(/^## (.+)$/gm,'<h2>$1</h2>')
         .replace(/^# (.+)$/gm,'<h1>$1</h1>');
    t = t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
         .replace(/\*(.+?)\*/g,'<em>$1</em>');
    t = t.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>');
    t = t.replace(/^- (.+)$/gm,'<li>$1</li>');
    t = t.replace(/(<li>[\s\S]*?<\/li>\n?)+/g, m => '<ul>'+m+'</ul>');
    t = t.replace(/^---$/gm,'<hr>');
    t = t.replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');
    if (!t.startsWith('<')) t = '<p>'+t+'</p>';
    t = t.replace(/\x00CODE(\d+)\x00/g, (_, i) => {
        const code = codes[parseInt(i)];
        const safe = encodeURIComponent(code);
        return `<div class="code-block"><pre>${code}</pre><button class="btn-copy-code" onclick="copiarCodigo(this,'${safe}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copiar</button></div>`;
    });
    return t;
}

const ICON_CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';

function copiarCodigo(btn, encoded) {
    const text = decodeURIComponent(encoded);
    navigator.clipboard.writeText(text).then(() => {
        btn.innerHTML = ICON_CHECK + ' Copiado';
        setTimeout(() => btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copiar', 2000);
    });
}

const SVG_FOLDER = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>';
const SVG_TRASH = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>';
const SVG_NOTE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>';
const SVG_PHOTO = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>';
const SVG_MIC = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/></svg>';
const SVG_EDIT = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
const SVG_COPY = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>';

// ===== DASHBOARD =====
function renderDashboard() {
    editMode = false;
    const grid = document.getElementById('proyectos-grid');
    const empty = document.getElementById('empty-state');
    if (proyectos.length === 0) {
        grid.innerHTML = '';
        empty.style.display = 'block';
        return;
    }
    empty.style.display = 'none';
    grid.innerHTML = proyectos.map((p, i) => {
        const foto = (p.bloques||[]).find(b => b.img || (b.fotos||[]).length);
        const coverSrc = foto ? (foto.img || foto.fotos[0]) : null;
        const nNotas = (p.bloques||[]).length;
        const iconWrap = coverSrc
            ? `<div class="card-icon-wrap has-photo" style="background-image:url(${coverSrc})"></div>`
            : `<div class="card-icon-wrap">${SVG_FOLDER}</div>`;
        return `
        <div class="proyecto-card" data-idx="${i}" style="animation-delay:${i*0.04}s">
            <button class="card-del" onclick="event.stopPropagation(); eliminarProyecto(${i})" title="Eliminar">${SVG_TRASH}</button>
            ${iconWrap}
            <div class="card-body">
                <div class="card-titulo">${esc(p.nombre)}</div>
                <div class="card-meta-row"><span>${nNotas} nota${nNotas!==1?'s':''}</span></div>
            </div>
        </div>`;
    }).join('');

    grid.querySelectorAll('.proyecto-card').forEach(card => {
        const i = parseInt(card.dataset.idx);
        card.addEventListener('click', () => {
            if (editMode) { exitEditMode(); return; }
            abrirProyecto(i);
        });
        card.addEventListener('touchstart', () => {
            lpTimer = setTimeout(() => enterEditMode(), 500);
        }, {passive:true});
        card.addEventListener('touchend', () => clearTimeout(lpTimer), {passive:true});
        card.addEventListener('touchmove', () => clearTimeout(lpTimer), {passive:true});
    });
}

function enterEditMode() {
    editMode = true;
    document.getElementById('proyectos-grid').classList.add('edit-mode');
}

function exitEditMode() {
    editMode = false;
    document.getElementById('proyectos-grid').classList.remove('edit-mode');
}

// ===== FAB =====
function onFab() {
    if (proyectoIdx === null) {
        document.getElementById('nuevo-nombre').value = '';
        abrirModal('modal-nuevo-proyecto');
        setTimeout(() => document.getElementById('nuevo-nombre').focus(), 300);
    } else {
        abrirNota(null);
    }
}

function cerrarFab() {}

// ===== PROYECTOS =====
function crearProyecto() {
    const nombre = document.getElementById('nuevo-nombre').value.trim();
    if (!nombre) { toast('Escribí un nombre','err'); return; }
    const p = { id: Date.now(), nombre, fechaCreacion: new Date().toISOString(), bloques: [] };
    proyectos.unshift(p);
    guardar();
    cerrarModal('modal-nuevo-proyecto');
    renderDashboard();
    abrirProyecto(0);
    toast('Proyecto creado');
}

function abrirProyecto(i) {
    proyectoIdx = i;
    const p = proyectos[i];
    document.getElementById('vp-nombre').textContent = p.nombre;
    document.getElementById('vp-fecha').textContent = 'Creado ' + fechaCorta(p.fechaCreacion);
    renderBloques();
    document.getElementById('page-dashboard').classList.remove('active');
    document.getElementById('page-proyecto').classList.add('active');
    cerrarFab();
    window.scrollTo(0,0);
}

function irDashboard() {
    document.getElementById('page-proyecto').classList.remove('active');
    document.getElementById('page-dashboard').classList.add('active');
    cerrarFab();
    proyectoIdx = null;
    renderDashboard();
}

function eliminarProyecto(i) {
    confirmar('Eliminar proyecto', '¿Eliminás este proyecto y todo su contenido?', () => {
        proyectos.splice(i,1);
        guardar();
        renderDashboard();
        toast('Proyecto eliminado');
    });
}

function abrirModalNombre() {
    if (proyectoIdx === null) return;
    document.getElementById('edit-nombre').value = proyectos[proyectoIdx].nombre;
    abrirModal('modal-nombre');
    setTimeout(() => document.getElementById('edit-nombre').focus(), 300);
}

function guardarNombre() {
    const n = document.getElementById('edit-nombre').value.trim();
    if (!n) return;
    proyectos[proyectoIdx].nombre = n;
    guardar();
    document.getElementById('vp-nombre').textContent = n;
    cerrarModal('modal-nombre');
    toast('Nombre actualizado');
}

// ===== BLOQUES =====
function renderBloques() {
    const p = proyectos[proyectoIdx];
    const container = document.getElementById('bloques-timeline');
    if (!p.bloques || p.bloques.length === 0) {
        container.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--ink-3);">
            ${SVG_FOLDER.replace('<svg ', '<svg style="width:40px;height:40px;margin-bottom:14px;opacity:0.3;" ')}
            <p style="font-weight:700;color:var(--ink-2);margin-bottom:4px;">Sin notas aún</p>
            <p style="font-size:0.82rem;">Tocá + para agregar tu primera nota</p>
        </div>`;
        return;
    }
    container.innerHTML = p.bloques.map((b,i) => renderBloque(b,i)).join('');
}

function renderBloque(b, i) {
    const textoHtml = b.texto ? `<div class="md-render">${md(b.texto)}</div>` : '';
    const fotos = b.fotos || (b.img ? [b.img] : []);
    const fotosHtml = fotos.length ? `<div class="nota-fotos">${fotos.map(src=>`<img class="nota-foto-img" src="${src}" loading="lazy">`).join('')}</div>` : '';
    return `
    <div class="bloque" id="bloque-${i}" style="animation-delay:${i*0.04}s">
        <div class="bloque-header">
            <div class="bloque-meta">
                <span>${fechaCorta(b.fecha)}</span>
                ${b.editado?'<span>· editado</span>':''}
            </div>
            <div class="bloque-acciones">
                ${b.texto?`<button class="btn-bloque" onclick="copiarBloque(${i})" title="Copiar">${SVG_COPY}</button>`:''}
                <button class="btn-bloque" onclick="abrirNota(${i})" title="Editar">${SVG_EDIT}</button>
                <button class="btn-bloque eliminar" onclick="eliminarBloque(${i})" title="Eliminar">${SVG_TRASH}</button>
            </div>
        </div>
        <div class="bloque-contenido">${textoHtml}${fotosHtml}</div>
    </div>`;
}

function copiarBloque(i) {
    const b = proyectos[proyectoIdx].bloques[i];
    navigator.clipboard.writeText(b.texto || '').then(() => toast('Copiado'));
}

function eliminarBloque(i) {
    confirmar('Eliminar nota', '¿Eliminás esta nota?', () => {
        proyectos[proyectoIdx].bloques.splice(i,1);
        guardar();
        renderBloques();
        toast('Eliminado');
    });
}

// ===== EDITOR DE NOTA =====
function abrirNota(idx) {
    bloqueEditIdx = idx;
    notaFotos = [];
    if (idx !== null) {
        const b = proyectos[proyectoIdx].bloques[idx];
        document.getElementById('editor-ta').value = b.texto || '';
        notaFotos = [...(b.fotos || (b.img ? [b.img] : []))];
        document.getElementById('modal-bloque-titulo').innerHTML = 'Editar <span>nota</span>';
    } else {
        document.getElementById('editor-ta').value = '';
        document.getElementById('modal-bloque-titulo').innerHTML = 'Nueva <span>nota</span>';
    }
    previewing = false;
    document.getElementById('editor-preview').classList.remove('on');
    document.getElementById('editor-ta').style.display = '';
    renderFotoStrip();
    abrirModal('modal-bloque');
    setTimeout(() => document.getElementById('editor-ta').focus(), 300);
}

function renderFotoStrip() {
    document.getElementById('foto-strip').innerHTML = notaFotos.map((src,i) => `
        <div class="foto-thumb-wrap">
            <img class="foto-thumb" src="${src}">
            <button class="foto-thumb-del" onclick="quitarFoto(${i})">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" width="9" height="9"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>`).join('');
}

function quitarFoto(i) { notaFotos.splice(i,1); renderFotoStrip(); }

function adjuntarFoto(origen) {
    document.getElementById(origen==='camara'?'input-foto-camara':'input-foto-galeria').click();
}

function onFotoNota(event) {
    const files = Array.from(event.target.files);
    let done = 0;
    files.forEach(file => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
            const MAX = 1200;
            let w = img.width, h = img.height;
            if (w > MAX || h > MAX) {
                if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
                else { w = Math.round(w * MAX / h); h = MAX; }
            }
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            URL.revokeObjectURL(url);
            notaFotos.push(canvas.toDataURL('image/jpeg', 0.72));
            done++;
            if (done === files.length) renderFotoStrip();
        };
        img.src = url;
    });
    event.target.value = '';
}

function guardarNota() {
    const texto = document.getElementById('editor-ta').value.trim();
    if (!texto && notaFotos.length === 0) { toast('La nota está vacía','err'); return; }
    const p = proyectos[proyectoIdx];
    if (bloqueEditIdx !== null) {
        p.bloques[bloqueEditIdx].texto = texto;
        p.bloques[bloqueEditIdx].fotos = [...notaFotos];
        p.bloques[bloqueEditIdx].editado = new Date().toISOString();
        delete p.bloques[bloqueEditIdx].img;
    } else {
        p.bloques.push({ texto, fotos: [...notaFotos], fecha: new Date().toISOString() });
    }
    guardar();
    cerrarModalBloque();
    renderBloques();
    toast('Guardado');
}

// ===== EDITOR MARKDOWN =====
function ins(before, after, lineStart=false) {
    const ta = document.getElementById('editor-ta');
    const s = ta.selectionStart, e = ta.selectionEnd, v = ta.value;
    let nv, nc;
    if (lineStart) {
        const ls = v.lastIndexOf('\n', s-1)+1;
        nv = v.substring(0,ls)+before+v.substring(ls);
        nc = s+before.length;
    } else {
        const sel = v.substring(s,e);
        nv = v.substring(0,s)+before+sel+after+v.substring(e);
        nc = sel ? e+before.length+after.length : s+before.length;
    }
    ta.value = nv;
    ta.focus();
    ta.setSelectionRange(nc,nc);
}

function togglePreview() {
    previewing = !previewing;
    const ta = document.getElementById('editor-ta');
    const pv = document.getElementById('editor-preview');
    const btn = document.getElementById('btn-prev');
    if (previewing) {
        pv.innerHTML = md(ta.value);
        pv.classList.add('on');
        ta.style.display = 'none';
        btn.style.background = 'var(--red)';
        btn.style.color = 'white';
    } else {
        pv.classList.remove('on');
        ta.style.display = '';
        btn.style.background = '';
        btn.style.color = '';
    }
}

function copiarEditor() {
    const t = document.getElementById('editor-ta').value;
    if (!t) return;
    navigator.clipboard.writeText(t).then(() => toast('Copiado'));
}

// ===== VOZ =====
function initVoz() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { document.getElementById('btn-mic').disabled = true; return; }
    recognition = new SR();
    recognition.lang = 'es-ES';
    recognition.continuous = true;
    recognition.interimResults = false;
    recognition.onstart = () => {
        grabando = true;
        document.getElementById('btn-mic').classList.add('grabando');
        document.getElementById('voz-ind').classList.add('on');
    };
    recognition.onend = () => {
        grabando = false;
        document.getElementById('btn-mic').classList.remove('grabando');
        document.getElementById('voz-ind').classList.remove('on');
    };
    recognition.onresult = e => {
        let txt = '';
        for (let i=e.resultIndex;i<e.results.length;i++) {
            if (e.results[i].isFinal) txt += e.results[i][0].transcript+' ';
        }
        if (txt) {
            const ta = document.getElementById('editor-ta');
            ta.value = (ta.value ? ta.value+'\n' : '') + txt.trim();
        }
    };
    recognition.onerror = ev => {
        toast('Error voz: '+ev.error,'err');
        grabando = false;
        document.getElementById('btn-mic').classList.remove('grabando');
    };
}

function toggleVoz() {
    if (!recognition) return;
    grabando ? recognition.stop() : recognition.start();
}

// ===== CONFIRMAR =====
function confirmar(titulo, msg, onOk) {
    document.getElementById('confirm-titulo').innerHTML = titulo.replace(' ', ' <span>') + '</span>';
    document.getElementById('confirm-msg').textContent = msg;
    const btn = document.getElementById('confirm-ok-btn');
    btn.onclick = () => { cerrarModal('modal-confirmar'); onOk(); };
    abrirModal('modal-confirmar');
}

// ===== MODALES =====
function abrirModal(id) {
    document.getElementById(id).classList.add('active');
}
function cerrarModal(id) {
    document.getElementById(id).classList.remove('active');
    if (grabando && recognition) recognition.stop();
}
function cerrarModalBloque() {
    cerrarModal('modal-bloque');
    bloqueEditIdx = null;
    previewing = false;
}

document.querySelectorAll('.modal-overlay').forEach(o => {
    o.addEventListener('click', e => { if(e.target===o) cerrarModal(o.id); });
});

// ===== UTILS =====
function esc(t) {
    const d=document.createElement('div'); d.textContent=t; return d.innerHTML;
}
function fechaCorta(s) {
    return new Date(s).toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
function toast(msg, tipo='ok') {
    const el=document.getElementById('toast');
    el.textContent=msg; el.className='toast show '+(tipo==='err'?'err':'');
    clearTimeout(el._t);
    el._t=setTimeout(()=>el.classList.remove('show'),2800);
}

// ===== EXPORTAR PDF =====
function exportarPDF() {
    if (proyectoIdx === null) return;
    const p = proyectos[proyectoIdx];
    const bloques = p.bloques || [];

    const bloquesHtml = bloques.map(b => {
        const textoHtml = b.texto ? `<div class="md-render">${md(b.texto)}</div>` : '';
        const fotosHtml = (b.fotos||[]).length
            ? `<div class="pr-fotos">${b.fotos.map(src=>`<img src="${src}">`).join('')}</div>`
            : '';
        return `<div class="pr-bloque">
            <div class="pr-fecha">${fechaCorta(b.fecha)}${b.editado?' · editado':''}</div>
            ${textoHtml}${fotosHtml}
        </div>`;
    }).join('');

    const el = document.getElementById('print-content');
    el.innerHTML = `
        <div class="pr-portada">
            <h1><span>Bitacora</span>app</h1>
            <h2>${esc(p.nombre)}</h2>
            <div class="meta">Exportado el ${new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'long',year:'numeric'})} · ${bloques.length} nota${bloques.length!==1?'s':''}</div>
        </div>
        ${bloquesHtml}`;

    window.addEventListener('afterprint', () => { el.innerHTML = ''; }, { once: true });
    window.print();
}

// ===== PWA =====
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
