<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="theme-color" content="#FE0000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="bitacoraApp">
    <title>bitacoraApp</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.svg">
    <link href="https://fonts.googleapis.com/css2?family=Exo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg: #f7f7f7;
            --surface: #ffffff;
            --border: #e8e8e8;
            --ink: #1a1a1a;
            --ink-2: #555555;
            --ink-3: #6f6f6f;
            --ink-4: hsl(38, 7%, 78%);
            --red: #FE0000;
            --escarlata: #FF2400;
            --red-hover: #d40000;
            --accent-soft: #f0f0f0;
            --code-bg: #F4F4F2;
            --code-fg: #1a1a1a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; }
        body { font-family: 'Exo', sans-serif; background: var(--bg); color: var(--ink); min-height: 100dvh; }

        /* ===== LOADING ===== */
        .loading-screen {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; align-items: center; justify-content: center; z-index: 3000;
        }
        .loading-dots { display: flex; gap: 6px; }
        .loading-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--ink-3); animation: loadPulse 1.2s infinite;
        }
        .loading-dot:nth-child(2) { animation-delay: .2s; }
        .loading-dot:nth-child(3) { animation-delay: .4s; }
        @keyframes loadPulse { 0%,80%,100%{transform:scale(0);opacity:.4} 40%{transform:scale(1);opacity:1} }

        /* ===== LOGIN ===== */
        .login-screen {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000; padding: 40px 20px;
        }
        .login-logo { font-size: 2.9rem; font-weight: 700; letter-spacing: -2px; margin-bottom: 8px; }
        .login-logo .bita { color: var(--red); }
        .login-logo .app-word { color: #999999; }
        .login-sub { font-size: 15px; color: var(--ink-3); margin-bottom: 52px; font-weight: 500; text-align: center; }
        .btn-google {
            display: flex; align-items: center; gap: 12px;
            background: white; border: 1.5px solid var(--border);
            border-radius: 14px; padding: 14px 24px;
            font-family: 'Exo', sans-serif; font-size: 16px; font-weight: 700;
            cursor: pointer; transition: all .2s; color: var(--ink);
        }
        .btn-google:hover { border-color: var(--red); }
        .btn-google:active { transform: scale(0.97); }
        .btn-google svg { width: 22px; height: 22px; flex-shrink: 0; }

        /* ===== HEADER ===== */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 20px; border-bottom: 1px solid var(--border);
            background: var(--surface); position: sticky; top: 0; z-index: 100;
            backdrop-filter: blur(10px);
        }
        .header h1 { font-size: 1.9rem; font-weight: 700; letter-spacing: -1px; }
        .header h1 .bita { color: var(--red); }
        .header h1 .app-word { color: #999999; font-weight: 700; }

        /* ===== ACCOUNT BUTTON ===== */
        .btn-cuenta {
            width: 36px; height: 36px; border-radius: 50%;
            border: 2px solid var(--border); cursor: pointer; overflow: hidden;
            background: var(--accent-soft); display: flex; align-items: center; justify-content: center;
            transition: border-color .2s; flex-shrink: 0; padding: 0;
        }
        .btn-cuenta:hover { border-color: var(--red); }
        .btn-cuenta img { width: 100%; height: 100%; object-fit: cover; }
        .btn-cuenta svg { width: 18px; height: 18px; color: var(--ink-3); }

        /* ===== ACCOUNT MENU ===== */
        .cuenta-info { display: flex; align-items: center; gap: 14px; padding: 16px 20px 14px; }
        .cuenta-avatar { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); flex-shrink: 0; }
        .cuenta-avatar-ph { width: 52px; height: 52px; border-radius: 50%; background: var(--accent-soft); display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 2px solid var(--border); }
        .cuenta-nombre { font-size: 1rem; font-weight: 800; }
        .cuenta-email { font-size: 14px; color: var(--ink-3); margin-top: 2px; }
        .cuenta-version { font-size: 14px; color: var(--ink-3); padding: 0 20px 10px; }
        .cuenta-sep { height: 1px; background: var(--border); margin: 4px 20px; }
        .cuenta-actions { padding: 6px 12px 20px; display: flex; flex-direction: column; gap: 2px; }
        .btn-cuenta-accion {
            display: flex; align-items: center; gap: 10px;
            padding: 12px; border-radius: 10px; border: none;
            background: transparent; font-family: 'Exo', sans-serif;
            font-size: 16px; font-weight: 600; cursor: pointer;
            color: var(--ink-2); width: 100%; text-align: left; transition: background .15s, transform .12s ease;
        }
        .btn-cuenta-accion:hover { background: var(--accent-soft); }
        .btn-cuenta-accion:active { transform: scale(0.98); background: var(--accent-soft); }
        .btn-cuenta-accion.danger { color: var(--red); }
        .btn-cuenta-accion svg { width: 18px; height: 18px; flex-shrink: 0; }

        /* ===== PAGES ===== */
        .page { padding: 20px; max-width: 900px; margin: 0 auto; display: none; padding-bottom: 110px; }
        .page.active { display: block; animation: fadeIn .22s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        /* ===== DASHBOARD GRID ===== */
        .proyectos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .proyecto-card {
            background: var(--surface); border-radius: 18px; overflow: hidden;
            border: 1px solid var(--border); cursor: pointer;
            transition: transform .18s ease, box-shadow .18s ease; position: relative; aspect-ratio: 1;
            display: flex; flex-direction: column;
            animation: cardIn .25s ease both;
        }
        @keyframes cardIn { from { opacity: 0; transform: scale(.94); } to { opacity: 1; transform: scale(1); } }
        .proyecto-card:hover { border-color: #d0d0d0; }
        .proyecto-card:active { transform: scale(0.96); }
        .card-icon-wrap {
            flex: 1; display: flex; align-items: center; justify-content: center;
            background-size: cover; background-position: center;
            transition: transform .3s ease;
        }
        .proyecto-card:hover .card-icon-wrap { transform: scale(1.04); }
        .card-icon-wrap svg { width: 56px; height: 56px; color: var(--ink-2); opacity: 0.9; stroke-width: 1.1; }
        .card-icon-wrap.has-photo svg { display: none; }
        .card-body { padding: 10px 12px 12px; border-top: 1px solid var(--border); }
        .card-titulo { font-size: 16px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-meta-row { display: flex; gap: 8px; margin-top: 4px; font-size: 16px; color: var(--ink-3); font-weight: 400; }
        .card-del {
            position: absolute; top: 2px; right: 2px; width: 44px; height: 44px;
            border: none; background: transparent; color: var(--ink);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity .2s; z-index: 10;
        }
        .card-del svg { width: 27px; height: 27px; stroke-width: 1.6; filter: drop-shadow(0 0 3px white) drop-shadow(0 0 6px rgba(255,255,255,.9)); }
        @keyframes wiggle {
            0%,100% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(-1.8deg) scale(1.01); }
            75% { transform: rotate(1.8deg) scale(1.01); }
        }
        .edit-mode .proyecto-card { animation: wiggle .45s ease-in-out infinite; }
        .edit-mode .proyecto-card .card-del { opacity: 1; }
        .edit-mode .proyecto-card:hover { transform: none; box-shadow: none; }
        .card-move {
            position: absolute; top: 2px; left: 2px; width: 44px; height: 44px;
            border: none; background: transparent; color: var(--ink);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity .2s; z-index: 10;
        }
        .card-move svg { width: 27px; height: 27px; stroke-width: 1.6; filter: drop-shadow(0 0 3px white) drop-shadow(0 0 6px rgba(255,255,255,.9)); }
        .edit-mode .proyecto-card .card-move { opacity: 1; }

        /* ===== BUSQUEDA ===== */
        .search-bar { position: relative; margin-bottom: 20px; }
        .search-bar > svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--ink-3); pointer-events: none; }
        .search-input {
            width: 100%; padding: 12px 42px; border-radius: 14px;
            border: 1.5px solid var(--border); background: var(--surface);
            font-family: 'Exo', sans-serif; font-size: 16px; font-weight: 400;
            color: var(--ink); outline: none; transition: border-color .2s;
        }
        .search-input:focus { border-color: var(--red); }
        .search-clear {
            position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
            width: 28px; height: 28px; border: none; background: transparent;
            color: var(--ink-3); cursor: pointer; display: none;
            align-items: center; justify-content: center; border-radius: 50%;
        }
        .search-clear svg { width: 14px; height: 14px; }

        /* ===== TRABAJOS ===== */
        .trabajo-seccion { margin-bottom: 28px; }
        .trabajo-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; padding: 0 2px; }
        .trabajo-header h3 { font-size: 16px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--ink-2); }
        .trabajo-header .t-count { font-size: 16px; color: var(--ink-3); font-weight: 500; flex: 1; }
        .btn-trabajo-menu {
            width: 28px; height: 28px; border: none; background: transparent;
            color: var(--ink-3); cursor: pointer; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; transition: background .15s;
        }
        .btn-trabajo-menu:hover { background: var(--accent-soft); }
        .btn-trabajo-menu svg { width: 15px; height: 15px; }
        .trabajo-vacio { font-size: 16px; color: var(--ink-3); padding: 4px 2px; }

        /* ===== EMPTY STATE ===== */
        .empty-state { text-align: center; padding: 80px 20px 40px; animation: fadeIn .3s ease; }
        .empty-state svg { width: 48px; height: 48px; color: var(--ink-3); margin-bottom: 16px; opacity: 0.4; }
        .empty-state h3 { font-size: 20px; font-weight: 600; color: var(--ink-2); margin-bottom: 6px; }
        .empty-state p { font-size: 16px; color: var(--ink-3); }

        /* ===== FAB ===== */
        .fab {
            position: fixed; bottom: 28px; right: 24px;
            width: 56px; height: 56px; border-radius: 16px;
            background: var(--escarlata); color: white; border: none;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            z-index: 800; transition: transform .18s cubic-bezier(.34,1.5,.64,1);
        }
        .fab:hover { transform: scale(1.07); background: var(--red-hover); }
        .fab:active { transform: scale(0.91); }
        .fab.abierto { transform: rotate(45deg); }
        .fab-menu {
            position: fixed; bottom: 96px; right: 24px; z-index: 800;
            display: none; flex-direction: column; align-items: flex-end; gap: 14px;
        }
        .fab-menu.abierto { display: flex; }
        .fab-opcion {
            display: flex; align-items: center; gap: 12px;
            background: transparent; border: none; cursor: pointer; padding: 0;
            animation: fabIn .18s ease both;
        }
        .fab-opcion:nth-child(1) { animation-delay: .05s; }
        .fab-opcion .fab-label {
            background: var(--surface); color: var(--escarlata);
            font-family: 'Exo', sans-serif; font-size: 19px; font-weight: 600;
            padding: 9px 16px; border-radius: 10px; border: 1px solid var(--border);
        }
        .fab-opcion .fab-mini {
            width: 56px; height: 56px; border-radius: 16px;
            background: var(--surface); border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center; color: var(--escarlata);
        }
        .fab-opcion .fab-mini svg { width: 45px; height: 45px; stroke-width: 1.6; }
        .fab-opcion:active { transform: scale(0.95); }
        @keyframes fabIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .fab-backdrop { position: fixed; inset: 0; z-index: 790; display: none; }
        .fab-backdrop.abierto { display: block; }
        .fab svg { width: 24px; height: 24px; }
        .fab.hidden { display: none; }

        /* ===== PROYECTO HEADER ===== */
        .proyecto-header-bar {
            display: flex; align-items: center; gap: 12px;
            padding: 0 0 18px 0; margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        .btn-volver {
            width: 44px; height: 44px; border: none; background: transparent; color: var(--ink);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            margin-left: -10px; transition: color .2s;
        }
        .btn-volver svg { width: 28px; height: 28px; }
        .btn-volver:hover { color: var(--red); }
        .btn-volver:active { color: var(--red); }
        .proyecto-header-info { flex: 1; min-width: 0; }
        .proyecto-header-info h2 { font-size: 22px; font-weight: 600; }
        .proyecto-header-info .meta { font-size: 16px; color: var(--ink-3); margin-top: 2px; }
        .btn-editar-nombre {
            padding: 7px 12px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--surface); color: var(--ink-2);
            cursor: pointer; font-family: 'Exo', sans-serif; font-size: 16px; font-weight: 500;
            display: flex; align-items: center; gap: 5px; transition: all .2s; white-space: nowrap;
        }
        .btn-editar-nombre:hover { background: var(--red); color: white; border-color: var(--red); }
        .btn-editar-nombre:active { transform: scale(0.94); }

        /* ===== BLOQUES TIMELINE ===== */
        .bloques-timeline { display: flex; flex-direction: column; gap: 10px; }
        .bloque {
            background: var(--surface); border-radius: 14px; overflow: hidden;
            border: 1px solid var(--border); transition: box-shadow .2s;
            animation: bloqueFade .2s ease both;
        }
        @keyframes bloqueFade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .bloque:hover { border-color: var(--ink-4); }
        .bloque-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 9px 12px; border-bottom: 1px solid var(--border); background: var(--bg);
        }
        .bloque-meta { display: flex; align-items: center; gap: 6px; font-size: 16px; color: var(--ink-3); font-weight: 400; }
        .bloque-acciones { display: flex; gap: 2px; }
        .print-bar { display: flex; justify-content: flex-end; margin-bottom: 14px; }
        .print-bar .btn svg { width: 16px; height: 16px; }
        .print-all { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 600; color: var(--ink-2); padding: 2px 0 12px; border-bottom: 1px solid var(--border); margin-bottom: 8px; cursor: pointer; }
        .print-all input { width: 21px; height: 21px; accent-color: var(--red); }
        #print-list { max-height: 52vh; overflow-y: auto; }
        .print-item { display: flex; align-items: center; gap: 12px; padding: 12px 2px; border-bottom: 1px solid var(--border); cursor: pointer; border-radius: 8px; transition: background-color .15s ease; }
        .print-item:active { background: var(--accent-soft); }
        .print-item input { width: 21px; height: 21px; accent-color: var(--red); flex-shrink: 0; }
        .print-item span { display: flex; flex-direction: column; min-width: 0; }
        .print-item b { font-size: 16px; font-weight: 600; color: var(--ink);}
        .print-item i { font-size: 16px; color: var(--ink-3); font-style: normal; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .btn-bloque {
            width: 30px; height: 30px; border-radius: 8px; border: none;
            background: transparent; color: var(--ink-3);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all .15s;
        }
        .btn-bloque svg { width: 14px; height: 14px; }
        .btn-bloque:hover { background: var(--accent-soft); color: var(--ink-2); }
        .btn-bloque:active { transform: scale(0.88); }
        .btn-bloque.eliminar:hover { background: #fee2e2; color: var(--red); }
        .bloque-contenido { padding: 14px 16px; }
        .nota-fotos { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .nota-foto-img { border-radius: 8px; object-fit: cover; cursor: pointer; aspect-ratio: 4/3; flex: 1 1 calc(50% - 3px); max-width: calc(50% - 3px); display: block; }
        .nota-foto-img:only-child { flex: none; width: 100%; max-width: 100%; max-height: 320px; object-fit: contain; background: #E7E7E4; }

        /* ===== FOTO STRIP ===== */
        .foto-strip { display: flex; gap: 8px; padding: 8px 10px; overflow-x: auto; background: var(--bg); border: 1px solid var(--border); border-top: none; min-height: 0; }
        .foto-strip:empty { display: none; }
        .foto-thumb-wrap { position: relative; flex-shrink: 0; }
        .foto-thumb { width: 52px; height: 52px; border-radius: 8px; object-fit: cover; display: block; }
        .foto-thumb-del {
            position: absolute; top: -5px; right: -5px; width: 18px; height: 18px;
            border-radius: 50%; background: var(--red); color: white; border: none;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        /* ===== MARKDOWN ===== */
        .md-render { line-height: 1.75; font-size: 16px; color: var(--ink); }
        .md-render h1 { font-size: 1.25rem; font-weight: 800; margin: 10px 0 6px; }
        .md-render h2 { font-size: 1.05rem; font-weight: 700; margin: 8px 0 4px; }
        .md-render h3 { font-size: 16px; font-weight: 600; margin: 6px 0 4px; }
        .md-render p { margin-bottom: 8px; }
        .md-render ul, .md-render ol { padding-left: 18px; margin-bottom: 8px; }
        .md-render li { margin-bottom: 3px; }
        .md-render strong { font-weight: 700; }
        .md-render em { font-style: italic; color: var(--ink-2); }
        .md-render code { background: var(--bg); padding: 1px 6px; border-radius: 4px; font-family: monospace; font-size: 0.86em; border: 1px solid var(--border); }
        .md-render blockquote { border-left: 3px solid var(--red); padding-left: 12px; color: var(--ink-2); font-style: italic; margin: 6px 0; }
        .md-render hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
        .code-block { background: var(--code-bg); border-radius: 10px; margin: 8px 0; overflow: hidden; position: relative; }
        .code-block pre { padding: 14px; color: var(--code-fg); font-family: 'Courier New', monospace; font-size: 14px; line-height: 1.5; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
        .btn-copy-code {
            position: absolute; top: 8px; right: 8px;
            background: rgba(255,255,255,0.08); color: #999; border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px; padding: 6px 12px; font-size: 14px; cursor: pointer;
            font-family: 'Exo', sans-serif; font-weight: 600; transition: all .2s; display: flex; align-items: center; gap: 4px;
        }
        .btn-copy-code svg { width: 11px; height: 11px; }
        .btn-copy-code:hover { background: white; color: var(--ink); border-color: white; }

        /* ===== MODALES ===== */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4); display: none; align-items: flex-end;
            justify-content: center; z-index: 1000; backdrop-filter: blur(4px);
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--surface); border-radius: 20px 20px 0 0;
            width: 100%; max-width: 700px; max-height: 95vh; overflow-y: auto;
            animation: slideUp 0.28s cubic-bezier(.34,1.2,.64,1); padding-bottom: env(safe-area-inset-bottom, 0);
        }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border); margin: 10px auto 0; }
        .modal-header { padding: 14px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h2 { font-size: 20px; font-weight: 600; }
        .modal-header h2 span { color: var(--red); font-weight: 600; }
        .btn-cerrar {
            width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border);
            background: var(--surface); color: var(--ink-2); cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: all .2s;
        }
        .btn-cerrar svg { width: 14px; height: 14px; }
        .btn-cerrar:hover { background: var(--red); color: white; border-color: var(--red); }
        .modal-body { padding: 0 20px 20px; }
        .modal-footer { padding: 12px 20px 20px; display: flex; justify-content: flex-end; gap: 8px; border-top: 1px solid var(--border); }

        /* ===== EDITOR ===== */
        .editor-toolbar {
            display: flex; align-items: center; gap: 3px; padding: 8px 10px;
            background: var(--bg); border-radius: 10px 10px 0 0;
            border: 1px solid var(--border); border-bottom: none; flex-wrap: wrap;
        }
        .tbtn {
            min-width: 28px; height: 28px; padding: 0 5px; border: none; border-radius: 6px;
            background: transparent; color: var(--ink-2); cursor: pointer;
            font-family: 'Exo', sans-serif; font-size: 14px; font-weight: 600;
            display: flex; align-items: center; justify-content: center; transition: all .15s;
        }
        .tbtn svg { width: 13px; height: 13px; }
        .tbtn:hover { background: var(--surface); color: var(--ink-2); }
        .tbtn.mic { background: var(--red); color: white; margin-left: auto; border-radius: 8px; padding: 2px 10px; gap: 4px; font-size: 14px; }
        .tbtn.mic:hover { opacity: 0.85; }
        .tbtn.mic.grabando { background: var(--red); animation: pulse 1.2s infinite; }
        .tbtn-sep { width: 1px; height: 16px; background: var(--border); margin: 0 2px; }
        .voz-ind { font-size: 0.7rem; color: var(--red); font-weight: 700; display: none; }
        .voz-ind.on { display: inline; animation: pulse 1.2s infinite; }
        .editor-ta {
            width: 100%; min-height: 160px; padding: 14px; border: 1px solid var(--border);
            border-top: none; border-radius: 0 0 10px 10px; font-family: 'Exo', sans-serif;
            font-size: 16px; color: var(--ink); resize: vertical; background: var(--surface);
            transition: border-color .15s;
        }
        .editor-ta:focus { outline: none; border-color: var(--red); }
        .editor-preview-box {
            width: 100%; min-height: 100px; padding: 14px; border: 1px solid var(--border);
            border-top: none; border-radius: 0 0 10px 10px; background: var(--bg); display: none;
        }
        .editor-preview-box.on { display: block; }

        /* ===== FORM ===== */
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-weight: 500; font-size: 16px; color: var(--ink-3); margin-bottom: 6px; }
        .form-input {
            width: 100%; padding: 12px 14px; border: 1px solid var(--border);
            border-radius: 10px; font-family: 'Exo', sans-serif; font-size: 16px;
            color: var(--ink); background: var(--surface); transition: border-color .15s;
        }
        .form-input:focus { outline: none; border-color: var(--red); }
        input[type="file"] { display: none; }

        /* ===== BOTONES ===== */
        .btn { padding: 10px 20px; border-radius: 10px; font-family: 'Exo', sans-serif; font-weight: 600; font-size: 16px; cursor: pointer; transition: transform .12s ease, background-color .2s ease, box-shadow .2s ease; border: none; display: flex; align-items: center; gap: 6px; }
        .btn:active { transform: scale(0.96); }
        .btn svg { width: 15px; height: 15px; }
        .btn-primario { background: var(--red); color: white; }
        .btn-primario:hover { background: var(--red-hover); }
        .btn-secundario { background: var(--bg); color: var(--ink-2); border: 1px solid var(--border); }
        .btn-secundario:hover { background: var(--border); }

        /* ===== TOAST ===== */
        .toast {
            position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(10px);
            background: var(--ink-2); color: white; padding: 12px 20px; border-radius: 20px;
            font-weight: 500; font-size: 16px; opacity: 0; transition: all .3s; z-index: 3000;
            white-space: nowrap; pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.err { background: var(--red); }

        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }

        @media (max-width: 600px) {
            .proyectos-grid { grid-template-columns: repeat(2, 1fr); }
            .header h1 { font-size: 1.6rem; }
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* ===== PRINT ===== */
        #print-content { display: none; }
        @media print {
            body > *:not(#print-content) { display: none !important; }
            #print-content { display: block !important; font-family: 'Helvetica Neue', Arial, sans-serif; color: #1a1a1a; }
            .pr-portada { padding: 32px 0 20px; border-bottom: 3px solid #FE0000; margin-bottom: 28px; }
            .pr-portada h1 { font-size: 1.8rem; font-weight: 900; margin: 0 0 4px; letter-spacing: -1px; }
            .pr-portada h1 span { color: #FE0000; }
            .pr-portada h2 { font-size: 1.2rem; margin: 0 0 6px; font-weight: 700; }
            .pr-portada .meta { font-size: 0.75rem; color: #888; }
            .pr-bloque { padding: 14px 0; border-bottom: 1px solid #e8e8e8; break-inside: avoid; }
            .pr-fecha { font-size: 0.7rem; color: #aaa; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
            .md-render { line-height: 1.7; font-size: 0.92rem; }
            .md-render p { margin: 0 0 6px; }
            .md-render h1 { font-size: 1.1rem; font-weight: 800; margin: 8px 0 4px; }
            .md-render h2 { font-size: 1rem; font-weight: 700; margin: 6px 0 3px; }
            .md-render h3 { font-size: 0.9rem; font-weight: 700; margin: 4px 0 2px; }
            .md-render ul, .md-render ol { padding-left: 16px; margin: 0 0 6px; }
            .md-render strong { font-weight: 800; }
            .md-render em { font-style: italic; color: #555; }
            .md-render code { background: #f4f4f4; padding: 1px 4px; border-radius: 3px; font-size: 0.84em; }
            .md-render blockquote { border-left: 3px solid #FE0000; padding-left: 10px; color: #555; font-style: italic; margin: 4px 0; }
            .pr-fotos { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
            .pr-fotos img { border-radius: 6px; object-fit: cover; flex: 1 1 calc(50% - 3px); max-width: calc(50% - 3px); max-height: 200px; }
            .pr-fotos img:only-child { flex: none; width: 100%; max-width: 100%; max-height: 280px; object-fit: contain; }
            .code-block { background: #f4f4f4 !important; border-radius: 6px; margin: 6px 0; }
            .code-block pre { color: #1a1a1a !important; padding: 10px; font-size: 0.8rem; }
            .btn-copy-code { display: none !important; }
        }
    </style>
</head>

// fotos: recomprimir a 600px/50% para caber en Firestore sin Storage pago
function comprimirFoto(base64) {
    return new Promise(resolve => {
        if (!base64.startsWith('data:')) { resolve(base64); return; }
        const img = new Image();
        img.onload = () => {
            const MAX = 600;
            let w = img.width, h = img.height;
            if (w > MAX || h > MAX) {
                if (w > h) { h = Math.round(h*MAX/w); w = MAX; }
                else { w = Math.round(w*MAX/h); h = MAX; }
            }
            const c = document.createElement('canvas');
            c.width = w; c.height = h;
            c.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(c.toDataURL('image/jpeg', 0.5));
        };
        img.src = base64;
    });
}
async function subirFotos(fotos) {
    return Promise.all(fotos.map(comprimirFoto));

// ===== MARKDOWN =====
function md(text) {
    if (!text) return '';
    let t = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const codes = [];
    t = t.replace(/```([\s\S]*?)```/g, (_, c) => { const i=codes.length; codes.push(c.trim()); return `\x00CODE${i}\x00`; });
    t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
    t = t.replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>');
    t = t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>');
    t = t.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>');
    t = t.replace(/^- (.+)$/gm,'<li>$1</li>');
    t = t.replace(/(<li>[\s\S]*?<\/li>\n?)+/g, m => '<ul>'+m+'</ul>');
    t = t.replace(/^---$/gm,'<hr>');
    t = t.replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');
    if (!t.startsWith('<')) t = '<p>'+t+'</p>';
    t = t.replace(/\x00CODE(\d+)\x00/g, (_, i) => {
        const code = codes[parseInt(i)];
        const safe = encodeURIComponent(code);
        return `<div class="code-block"><pre>${code}</pre><button class="btn-copy-code" onclick="copiarCodigo(this,'${safe}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copiar</button></div>`;
    });
    return t;
}

const ICON_CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';

function copiarCodigo(btn, encoded) {

        setTimeout(() => btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copiar', 2000);
    });
}

function cardHtml(p, i, k) {
    const foto = (p.bloques||[]).find(b => (b.fotos||[]).length > 0);
    const coverSrc = foto ? foto.fotos[0] : null;
    const nNotas = (p.bloques||[]).length;

        ? `<div class="card-icon-wrap has-photo" style="background-image:url(${coverSrc})"></div>`
        : `<div class="card-icon-wrap">${SVG_SHEET}</div>`;
    return `<div class="proyecto-card" data-idx="${i}" style="animation-delay:${k*0.04}s">
        <button class="card-del" onclick="event.stopPropagation();eliminarProyecto(${i})">${SVG_TRASH}</button>
        <button class="card-move" onclick="event.stopPropagation();abrirModalMover(${i})" title="Mover a otro trabajo">${SVG_MOVE}</button>
        ${iconWrap}
        <div class="card-body">
            <div class="card-titulo">${esc(p.nombre)}</div>
            <div class="card-meta-row"><span>${nNotas} nota${nNotas!==1?'s':''}</span></div>
        </div>
    </div>`;
}

function idsTrabajos() { return trabajos.map(t => t.id); }
function proyectosDe(tid) {
    const ids = idsTrabajos();
    return proyectos.map((p, i) => ({ p, i })).filter(x =>
        tid === '' ? (!x.p.trabajo || !ids.includes(x.p.trabajo)) : x.p.trabajo === tid
    );
}

function trabajoCardHtml(t, cant, k) {
    const acciones = t.id ? `
        <button class="card-del" onclick="event.stopPropagation();eliminarTrabajo('${t.id}')">${SVG_TRASH}</button>
        <button class="card-move" onclick="event.stopPropagation();abrirModalTrabajo('${t.id}')" title="Renombrar">${SVG_EDIT}</button>` : '';
    return `<div class="proyecto-card trabajo-card" data-tid="${t.id}" style="animation-delay:${k*0.04}s">
        ${acciones}
        <div class="card-icon-wrap">${SVG_FOLDER}</div>
        <div class="card-body">
            <div class="card-titulo">${esc(t.nombre)}</div>
            <div class="card-meta-row"><span>${cant} proyecto${cant!==1?'s':''}</span></div>
        </div>
    </div>`;
}

function renderDashboard() {
    editMode = false;
    const cont = document.getElementById('dashboard-secciones');
    cont.classList.remove('edit-mode');
    const empty = document.getElementById('empty-state');
    if (proyectos.length === 0 && trabajos.length === 0) { cont.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';

    const q = busqueda.trim().toLowerCase();
    let html = '';
    if (q) {
        const coincide = p => (p.nombre||'').toLowerCase().includes(q) || (p.bloques||[]).some(b => (b.texto||'').toLowerCase().includes(q));
        const visibles = proyectos.map((p, i) => ({ p, i })).filter(x => coincide(x.p));
        html = visibles.length
            ? `<div class="proyectos-grid">${visibles.map((x, k) => cardHtml(x.p, x.i, k)).join('')}</div>`
            : `<div class="empty-state" style="display:block;padding:50px 20px;"><h3>Sin resultados</h3><p>Probá con otras palabras</p></div>`;
        cont.innerHTML = html;
        attachCardListeners(cont);
        return;
    }
    if (trabajos.length === 0) {
        // sin trabajos creados: vista plana clásica, nada cambia para el usuario
        const visibles = proyectos.map((p, i) => ({ p, i }));
        cont.innerHTML = `<div class="proyectos-grid">${visibles.map((x, k) => cardHtml(x.p, x.i, k)).join('')}</div>`;
        attachCardListeners(cont);
        return;
    }
    // carpetas anidadas: el dashboard muestra solo los trabajos
    html = '<div class="proyectos-grid">';
    trabajos.forEach((t, k) => { html += trabajoCardHtml(t, proyectosDe(t.id).length, k); });
    const sueltos = proyectosDe('');
    // proyectos sin carpeta: se muestran directo como tarjetas en el dashboard (no encerrados en "General")
    sueltos.forEach((x, k) => { html += cardHtml(x.p, x.i, trabajos.length + k); });
    html += '</div>';
    cont.innerHTML = html;
    attachCardListeners(cont);

    cont.querySelectorAll('.trabajo-card').forEach(card => {
        const tid = card.dataset.tid;
        card.addEventListener('click', () => { if (editMode) { exitEditMode(); return; } abrirTrabajo(tid); });
        if (tid) {
            card.addEventListener('touchstart', () => { lpTimer = setTimeout(() => enterEditMode(), 500); }, {passive:true});
            card.addEventListener('touchend', () => clearTimeout(lpTimer), {passive:true});
            card.addEventListener('touchmove', () => clearTimeout(lpTimer), {passive:true});
        }
    });
}

function attachCardListeners(cont) {
    cont.querySelectorAll('.proyecto-card:not(.trabajo-card)').forEach(card => {
        const i = parseInt(card.dataset.idx);
        card.addEventListener('click', () => { if (editMode) { exitEditMode(); return; } abrirProyecto(i); });
        card.addEventListener('touchstart', () => { lpTimer = setTimeout(() => enterEditMode(), 500); }, {passive:true});
        card.addEventListener('touchend', () => clearTimeout(lpTimer), {passive:true});
        card.addEventListener('touchmove', () => clearTimeout(lpTimer), {passive:true});
    });
}

function abrirTrabajo(tid) {
    trabajoActual = tid;
    const t = tid ? trabajos.find(x => x.id === tid) : null;
    document.getElementById('vt-nombre').textContent = t ? t.nombre : 'General';
    document.getElementById('vt-editar').style.display = t ? '' : 'none';
    renderTrabajo();
    document.getElementById('page-dashboard').classList.remove('active');
    document.getElementById('page-trabajo').classList.add('active');
    window.scrollTo(0, 0);
}

function renderTrabajo() {
    if (trabajoActual === null) return;
    editMode = false;
    const grid = document.getElementById('trabajo-grid');
    grid.classList.remove('edit-mode');
    const items = proyectosDe(trabajoActual);
    document.getElementById('vt-meta').textContent = items.length + ' proyecto' + (items.length !== 1 ? 's' : '');
    grid.innerHTML = items.length
        ? `<div class="proyectos-grid">${items.map((x, k) => cardHtml(x.p, x.i, k)).join('')}</div>`
        : `<p class="trabajo-vacio" style="padding:30px 4px;">Sin proyectos todavía. Tocá + para crear el primero.</p>`;
    attachCardListeners(grid);
}

    trabajoActual = null;

function exitEditMode() { editMode = false; document.getElementById('dashboard-secciones').classList.remove('edit-mode'); document.getElementById('trabajo-grid').classList.remove('edit-mode'); }

    document.getElementById('trabajo-modal-titulo').innerHTML = t ? 'Editar <span>trabajo</span>' : 'Nuevo <span>trabajo</span>';

}

async function guardarTrabajo() {
    const nombre = document.getElementById('trabajo-nombre').value.trim();
    if (!nombre) { toast('Escribí un nombre', 'err'); return; }
    let idNuevo = trabajoEditId;
    if (trabajoEditId) {
        const t = trabajos.find(x => x.id === trabajoEditId);
        if (t) t.nombre = nombre;
    } else {
        idNuevo = 't' + Date.now();
        trabajos.push({ id: idNuevo, nombre });
    }
    cerrarModal('modal-trabajo');
    // si el modal de nuevo proyecto está abierto, refrescar su selector con el trabajo nuevo elegido
    const selNuevo = document.getElementById('nuevo-trabajo');
    if (document.getElementById('modal-nuevo-proyecto').classList.contains('active')) {
        poblarSelectTrabajos(selNuevo, idNuevo, true);
    }
    if (trabajoActual && trabajoActual === trabajoEditId) {
        const t = trabajos.find(x => x.id === trabajoActual);
        if (t) document.getElementById('vt-nombre').textContent = t.nombre;
    }
    renderVistaActual();
    toast(trabajoEditId ? 'Trabajo actualizado' : 'Trabajo creado');
    trabajoEditId = null;
    await guardarTrabajos();
}

function eliminarTrabajo(id) {
    id = id || trabajoEditId;
    if (!id) return;
    cerrarModal('modal-trabajo');
    confirmar('Eliminar trabajo', 'Se elimina solo la agrupación: los proyectos NO se borran, pasan a General.', async () => {

function exportarRespaldo() {

        trabajos: trabajos,

    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'bitacorapp_respaldo_' + new Date().toISOString().slice(0, 10) + '.json';

function usoAlmacenamiento() {
    let total = 0, alerta = 0;
    proyectos.forEach(p => {
        const s = new Blob([JSON.stringify(p)]).size;
        total += s;
        if (s > 800 * 1024) alerta++;
    });
    const mb = (total / (1024 * 1024)).toFixed(2);
    return { texto: mb + ' MB en ' + proyectos.length + ' proyecto' + (proyectos.length !== 1 ? 's' : ''), alerta };
}

function renderBloques() {

    if (!p.bloques || p.bloques.length === 0) {
        container.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--ink-3);">

    container.innerHTML = p.bloques.map((b,i) => renderBloque(b,i)).join('');

function renderBloque(b, i) {
    const textoHtml = b.texto ? `<div class="md-render">${md(b.texto)}</div>` : '';
    const fotos = b.fotos || [];
    const fotosHtml = fotos.length ? `<div class="nota-fotos">${fotos.map(src=>`<img class="nota-foto-img" src="${src}" loading="lazy">`).join('')}</div>` : '';
    return `<div class="bloque" id="bloque-${i}" style="animation-delay:${i*0.04}s">
        <div class="bloque-header">
            <div class="bloque-meta">
                <span>${fechaCorta(b.fecha)}</span>
                ${b.editado?'<span>· editado</span>':''}
            </div>
            <div class="bloque-acciones">
                <button class="btn-bloque" onclick="abrirModalPrint(${i})" title="Imprimir esta nota">${SVG_PDF}</button>
                ${b.texto?`<button class="btn-bloque" onclick="copiarBloque(${i})" title="Copiar">${SVG_COPY}</button>`:''}
                <button class="btn-bloque" onclick="abrirNota(${i})" title="Editar">${SVG_EDIT}</button>
                <button class="btn-bloque eliminar" onclick="eliminarBloque(${i})" title="Eliminar">${SVG_TRASH}</button>
            </div>
        </div>
        <div class="bloque-contenido">${textoHtml}${fotosHtml}</div>

}

function abrirModalPrint(soloIdx) {

    document.getElementById('print-list').innerHTML = bs.map((b,i) => {
        const prev = (b.texto || '').replace(/[#*>`_~\-]/g,' ').replace(/\s+/g,' ').trim().slice(0,70)
                     || ((b.fotos||[]).length ? '(fotos)' : '(vacío)');
        const marcada = soloEsta ? i === soloIdx : true;
        return `<label class="print-item"><input type="checkbox" class="print-chk" value="${i}" ${marcada?'checked':''} onclick="printSync()"><span><b>${fechaCorta(b.fecha)}</b><i>${esc(prev)}</i></span></label>`;
    }).join('');

function mostrarLogoPreview(src) {
    const img = document.getElementById('logo-preview');
    const btnQuitar = document.getElementById('btn-quitar-logo');

}
function onLogoUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = async () => {
        const MAX = 400;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) { if (w > h) { h = Math.round(h*MAX/w); w = MAX; } else { w = Math.round(w*MAX/h); h = MAX; } }
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        const dataUrl = c.toDataURL('image/png');
        proyectos[proyectoIdx].logo = dataUrl;
        mostrarLogoPreview(dataUrl);
        await guardarProyecto(proyectos[proyectoIdx]);
    };
    img.onerror = () => toast('No se pudo leer la imagen', 'err');
    img.src = url;
    event.target.value = '';
}
async function quitarLogo() {
    if (proyectoIdx === null) return;
    proyectos[proyectoIdx].logo = '';
    mostrarLogoPreview('');
    await guardarProyecto(proyectos[proyectoIdx]);
}

function renderFotoStrip() {
    document.getElementById('foto-strip').innerHTML = notaFotos.map((src,i) => `
        <div class="foto-thumb-wrap">
            <img class="foto-thumb" src="${src}">
            <button class="foto-thumb-del" onclick="quitarFoto(${i})">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" width="9" height="9"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>`).join('');
}

function quitarFoto(i) { notaFotos.splice(i,1); renderFotoStrip(); }

function adjuntarFoto(origen) {
    document.getElementById(origen==='camara'?'input-foto-camara':'input-foto-galeria').click();
}

function onFotoNota(event) {
    const files = Array.from(event.target.files);
    let done = 0;
    files.forEach(file => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
            const MAX = 1200;
            let w = img.width, h = img.height;
            if (w > MAX || h > MAX) {
                if (w > h) { h = Math.round(h*MAX/w); w = MAX; }
                else { w = Math.round(w*MAX/h); h = MAX; }
            }
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            URL.revokeObjectURL(url);
            notaFotos.push(canvas.toDataURL('image/jpeg', 0.72));
            done++;
            if (done === files.length) renderFotoStrip();
        };
        img.src = url;
    });
    event.target.value = '';
}

async function guardarNota() {
    const texto = document.getElementById('editor-ta').value.trim();
    if (!texto && notaFotos.length === 0) { toast('La nota está vacía','err'); return; }
    toast('Guardando...');
    let fotosUrl;
    try {
        fotosUrl = await subirFotos(notaFotos);
    } catch(e) {
        toast('Error al subir fotos', 'err'); return;
    }
    const p = proyectos[proyectoIdx];
    if (bloqueEditIdx !== null) {
        p.bloques[bloqueEditIdx].texto = texto;
        p.bloques[bloqueEditIdx].fotos = fotosUrl;
        p.bloques[bloqueEditIdx].editado = new Date().toISOString();
        delete p.bloques[bloqueEditIdx].img;
    } else {
        p.bloques.push({ texto, fotos: fotosUrl, fecha: new Date().toISOString() });
    }
    cerrarModalBloque();
    renderBloques();
    toast('Guardado');
    await guardarProyecto(p);
}

// ===== EDITOR MARKDOWN =====
function ins(before, after, lineStart=false) {
    const ta = document.getElementById('editor-ta');
    const s = ta.selectionStart, e = ta.selectionEnd, v = ta.value;
    let nv, nc;
    if (lineStart) {
        const ls = v.lastIndexOf('\n', s-1)+1;
        nv = v.substring(0,ls)+before+v.substring(ls);
        nc = s+before.length;
    } else {
        const sel = v.substring(s,e);
        nv = v.substring(0,s)+before+sel+after+v.substring(e);
        nc = sel ? e+before.length+after.length : s+before.length;
    }
    ta.value = nv; ta.focus(); ta.setSelectionRange(nc,nc);
}

function togglePreview() {
    previewing = !previewing;
    const ta = document.getElementById('editor-ta');
    const pv = document.getElementById('editor-preview');
    const btn = document.getElementById('btn-prev');
    if (previewing) {
        pv.innerHTML = md(ta.value); pv.classList.add('on'); ta.style.display = 'none';
        btn.style.background = 'var(--red)'; btn.style.color = 'white';
    } else {
        pv.classList.remove('on'); ta.style.display = '';
        btn.style.background = ''; btn.style.color = '';
    }
}

// ===== VOZ =====
function initVoz() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { document.getElementById('btn-mic').disabled = true; return; }
    recognition = new SR();
    recognition.lang = 'es-ES'; recognition.continuous = true; recognition.interimResults = false;
    recognition.onstart = () => { grabando=true; document.getElementById('btn-mic').classList.add('grabando'); document.getElementById('voz-ind').classList.add('on'); };
    recognition.onend = () => { grabando=false; document.getElementById('btn-mic').classList.remove('grabando'); document.getElementById('voz-ind').classList.remove('on'); };
    recognition.onresult = e => {
        let txt = '';
        for (let i=e.resultIndex;i<e.results.length;i++) { if (e.results[i].isFinal) txt += e.results[i][0].transcript+' '; }
        if (txt) { const ta=document.getElementById('editor-ta'); ta.value=(ta.value?ta.value+'\n':'')+txt.trim(); }
    };
    recognition.onerror = ev => { toast('Error voz: '+ev.error,'err'); grabando=false; document.getElementById('btn-mic').classList.remove('grabando'); };
}

function toggleVoz() { if (!recognition) return; grabando ? recognition.stop() : recognition.start(); }

function imprimirSeleccion(indices) {

    const p = proyectos[proyectoIdx];
    const todas = p.bloques || [];
    const sel = (indices && indices.length) ? indices.slice().sort((a,b)=>a-b) : todas.map((_,i)=>i);
    const bloques = sel.map(i => todas[i]).filter(Boolean);
    if (!bloques.length) { toast('No hay notas para imprimir', 'err'); return; }

    const bloquesHtml = bloques.map(b => {
        const textoHtml = b.texto ? `<div class="md-render">${md(b.texto)}</div>` : '';
        const fotosHtml = (b.fotos||[]).length
            ? `<div class="pr-fotos">${b.fotos.map(src=>`<img src="${src}">`).join('')}</div>` : '';
        return `<div class="pr-bloque"><div class="pr-fecha">${fechaCorta(b.fecha)}${b.editado?' · editado':''}</div>${textoHtml}${fotosHtml}</div>`;
    }).join('');

    const estilos = `*{box-sizing:border-box}body{font-family:'Helvetica Neue',Arial,sans-serif;color:#1a1a1a;margin:0;padding:26px 22px}
      .pr-bloque{padding:14px 0;border-bottom:1px solid #e8e8e8;break-inside:avoid;page-break-inside:avoid}
      .pr-fecha{font-size:.72rem;color:#aaa;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
      .md-render{line-height:1.7;font-size:.95rem}.md-render h1{font-size:1.15rem;margin:8px 0 4px}.md-render h2{font-size:1.02rem;margin:6px 0 3px}.md-render h3{font-size:.95rem;margin:4px 0 2px}
      .md-render p{margin:0 0 7px}.md-render ul,.md-render ol{padding-left:18px;margin:0 0 7px}.md-render strong{font-weight:800}.md-render em{font-style:italic;color:#555}
      .md-render code{background:#f4f4f4;padding:1px 5px;border-radius:3px;font-size:.85em}.md-render blockquote{border-left:3px solid #FE0000;padding-left:10px;color:#555;font-style:italic;margin:6px 0}
      .code-block{background:#f4f4f4;border-radius:6px;margin:8px 0}.code-block pre{padding:10px;font-size:.82rem;white-space:pre-wrap;word-break:break-word;margin:0}.btn-copy-code{display:none}
      .pr-fotos{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}.pr-fotos img{border-radius:6px;object-fit:cover;flex:1 1 calc(50% - 3px);max-width:calc(50% - 3px);max-height:240px}.pr-fotos img:only-child{flex:none;width:100%;max-width:100%;max-height:340px;object-fit:contain}
      .pr-encabezado{display:flex;align-items:center;gap:16px;margin-bottom:20px;padding-bottom:14px;border-bottom:3px solid #FE0000}
      .pr-logo{max-height:80px;max-width:220px;object-fit:contain;flex-shrink:0}
      .pr-encabezado-texto{line-height:1.6;font-size:.95rem}.pr-encabezado-texto strong{font-weight:800}
      @media print{body{padding:0}@page{margin:14mm}}`;

    const logoHtml = p.logo ? `<img class="pr-logo" src="${p.logo}">` : '';
    const textoEncHtml = (p.encabezado || '').trim() ? `<div class="pr-encabezado-texto">${md(p.encabezado)}</div>` : '';
    const encabezadoHtml = (logoHtml || textoEncHtml) ? `<div class="pr-encabezado">${logoHtml}${textoEncHtml}</div>` : '';

    const doc = `<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${esc(p.nombre)}</title><style>${estilos}</style></head><body>`
        + encabezadoHtml
        + bloquesHtml
        + `<scr`+`ipt>window.addEventListener('load',function(){setTimeout(function(){window.print();},350);});</scr`+`ipt></body></html>`;

    const w = window.open('', '_blank');
    if (!w) { toast('Permití ventanas emergentes para generar el PDF', 'err'); return; }
    w.document.open(); w.document.write(doc); w.document.close();
}

// ===== PWA =====
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
