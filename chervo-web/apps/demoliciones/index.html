<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Demoliciones — APU por rubro</title>
<meta name="theme-color" content="#F2F2F0">
<link rel="manifest" href="/apps/demoliciones/manifest.json">
<link rel="apple-touch-icon" href="/apps/demoliciones/icon-192.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Exo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
:root{
  --white:#FFFFFF; --bg:#F2F2F0; --gray-l:#F6F6F6; --gray-m:#DCDCD8;
  --ink:#1C1C1C; --gray-t:#7A7A7A; --plata:#C0C0C0; --red:#FE0000;
}
*{box-sizing:border-box; margin:0; padding:0; font-family:'Exo',sans-serif; -webkit-tap-highlight-color:transparent;}
html,body{height:100%; background:var(--bg); font-size:16px; color:var(--ink); line-height:1.5; overflow-x:hidden;}
.app{display:flex; flex-direction:column; height:100dvh; overflow:hidden;}
.ic{width:26px; height:26px; fill:none; stroke:var(--ink); stroke-width:1.3; stroke-linecap:round; stroke-linejoin:round; flex:none;}
.ic-red{stroke:var(--red);}

header{background:var(--white); padding:14px 18px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--gray-m); flex-shrink:0;}
/* Wordmark: nombre en PLATA con acento rojo (nunca negro) */
#headTitle{font-size:22px; letter-spacing:-.3px; font-weight:800; color:var(--plata);}
#headTitle .red{color:var(--red);}
.hburger{background:none; border:none; cursor:pointer; padding:6px; display:flex;}
.header-btn{background:none; border:none; color:var(--ink); padding:8px 6px; cursor:pointer; font-size:16px; display:flex; align-items:center; gap:6px;}

.view{display:none; flex:1; overflow:hidden; flex-direction:column;}
.view.active{display:flex;}
.scroll{flex:1; overflow-y:auto; overflow-x:hidden; padding-bottom:30px;}
.container{padding:20px; max-width:900px; margin:0 auto; width:100%;}

.add-bar{display:flex; gap:10px; margin-bottom:20px;}
.input{padding:13px 14px; border:1px solid var(--gray-m); border-radius:8px; font-size:18px; background:var(--white); color:var(--ink); width:100%; max-width:100%;}
.input:focus{outline:none; border-color:var(--red);}
.sel{padding:12px; border:1px solid var(--gray-m); border-radius:8px; font-size:16px; background:var(--white); color:var(--ink); max-width:100%;}
.sel:focus{outline:none; border-color:var(--red);}
.btn{border:none; padding:13px 16px; border-radius:8px; font-size:16px; cursor:pointer; font-weight:500; display:flex; align-items:center; justify-content:center; gap:8px; white-space:nowrap;}
.btn-red{background:var(--red); color:var(--white);}
.btn-out{background:var(--white); color:var(--ink); border:1px solid var(--gray-m);}
.btn-sm{padding:10px 13px; font-size:15px;}
.btn-text{background:none; border:none; color:var(--red); padding:11px 6px; font-size:16px; cursor:pointer; white-space:nowrap;}
.btn:active,.btn-text:active{filter:brightness(.94);}

.card{display:flex; align-items:center; gap:14px; padding:18px; background:var(--white); border:1px solid var(--gray-m); border-radius:10px; margin-bottom:12px; cursor:pointer;}
.card:active{background:var(--gray-l);}
.card-title{font-size:19px; flex:1; min-width:0;}
.card-sub{font-size:14px; color:var(--gray-t);}
.empty{text-align:center; padding:34px 20px; color:var(--gray-t); font-size:17px;}

/* PESTAÑAS */
.tabs{display:flex; gap:8px; margin-bottom:18px;}
.tab{flex:1; padding:12px; border-radius:10px; border:1.5px solid var(--gray-m); background:var(--white); color:var(--ink); font-size:16px; cursor:pointer;}
.tab.on{border-color:var(--red); color:var(--red);}

/* RUBRO (solo carga de datos, sin resultados) */
.item{background:var(--white); border:1px solid var(--gray-m); border-left:4px solid var(--red); border-radius:10px; padding:16px; margin-bottom:14px;}
.item-head{display:flex; align-items:center; gap:10px; margin-bottom:4px;}
.item-name{font-size:18px; flex:1; min-width:0;}
.item-cons{font-size:13px; color:var(--gray-t); margin-bottom:12px;}
.row{display:flex; align-items:center; gap:10px; margin-bottom:10px; flex-wrap:wrap;}
.row .lab{font-size:15px; color:var(--gray-t); width:100px; flex:none;}
.row .input,.row .sel{flex:1; min-width:120px;}

/* RESUMEN */
.enc-lbl{font-size:15px; color:var(--gray-t); margin-bottom:6px;}
textarea.enc{width:100%; min-height:74px; padding:12px 14px; border:1px solid var(--gray-m); border-radius:8px; font-size:17px; color:var(--ink); resize:vertical; margin-bottom:18px;}
textarea.enc:focus{outline:none; border-color:var(--red);}
.tbl-wrap{width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch; margin-bottom:16px;}
.mtable{width:100%; border-collapse:collapse; font-size:15px;}
.mtable th{text-align:left; font-weight:600; color:var(--gray-t); font-size:13px; text-transform:uppercase; padding:8px 6px; border-bottom:1px solid var(--gray-m); white-space:nowrap;}
.mtable td{padding:8px 6px; border-bottom:1px solid var(--gray-l);}
.mtable td.q{text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap;}
.totbox{background:var(--white); border:1px solid var(--gray-m); border-radius:10px; padding:18px; margin-bottom:18px;}
.totrow{display:flex; justify-content:space-between; padding:6px 0; font-size:17px;}
.totrow.big{font-size:22px; font-weight:600; color:var(--red); border-top:2px solid var(--red); margin-top:6px; padding-top:12px;}

/* SHEET config */
.ov{position:fixed; inset:0; background:rgba(20,20,20,.4); display:none; align-items:flex-end; justify-content:center; z-index:100;}
.ov.on{display:flex;}
.sheet{background:var(--white); width:100%; max-width:560px; border-radius:20px 20px 0 0; padding:20px 20px calc(24px + env(safe-area-inset-bottom,0)); max-height:88dvh; overflow-y:auto;}
.sheet h3{font-size:20px; font-weight:600; margin-bottom:16px;}
.cfg-row{display:flex; align-items:center; gap:12px; margin-bottom:12px;}
.cfg-row label{flex:1; font-size:16px;}
.cfg-row input{width:130px; padding:11px 12px; border:1px solid var(--gray-m); border-radius:8px; font-size:17px; text-align:right;}
.cfg-row input:focus{outline:none; border-color:var(--red);}
.sheet .ver{font-size:14px; color:var(--gray-t); margin-top:8px; text-align:center;}

#toast{position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(8px); background:rgba(28,28,28,.92); color:#fff; padding:11px 20px; border-radius:22px; font-size:16px; opacity:0; transition:.2s; pointer-events:none; z-index:200;}
#toast.on{opacity:1; transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="app">

  <header>
    <div id="headTitle"><span class="red">D</span>emoliciones</div>
    <div style="display:flex; align-items:center; gap:4px;">
      <button class="header-btn" id="btnBack" onclick="goBack()" style="display:none;">
        <svg class="ic ic-red" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg> Volver
      </button>
      <button class="hburger" onclick="openConfig()" title="Configuración">
        <svg class="ic ic-red" viewBox="0 0 24 24"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
      </button>
    </div>
  </header>

  <!-- HOME -->
  <div id="view-home" class="view active">
    <div class="scroll"><div class="container">
      <div class="add-bar">
        <input type="text" id="newProjName" class="input" placeholder="Nombre de la obra…">
        <button class="btn btn-red" onclick="createProject()">Crear</button>
      </div>
      <div id="projectsList"></div>
    </div></div>
  </div>

  <!-- OBRA -->
  <div id="view-proj" class="view">
    <div class="scroll"><div class="container">
      <h2 id="pdTitle" style="font-size:24px; font-weight:600; margin-bottom:16px; color:var(--plata);"></h2>

      <div class="tabs">
        <button class="tab on" id="tabR" onclick="switchTab('rubros')">Rubros</button>
        <button class="tab" id="tabS" onclick="switchTab('resumen')">Resumen</button>
      </div>

      <!-- TAB RUBROS: solo carga -->
      <div id="tab-rubros">
        <div class="add-bar">
          <select id="rubroSel" class="sel" style="flex:1;"></select>
          <button class="btn btn-red" onclick="addItem()">Agregar</button>
        </div>
        <div id="itemsList"></div>
      </div>

      <!-- TAB RESUMEN: lo sumado + export -->
      <div id="tab-resumen" style="display:none;">
        <div class="enc-lbl">Encabezado (editable)</div>
        <textarea class="enc" id="encInput" placeholder="Empresa, cliente, obra, dirección…" oninput="setHeader(this.value)"></textarea>
        <div style="display:flex; gap:8px; margin-bottom:10px;">
          <button class="btn btn-red" style="flex:1;" onclick="exportExcel()">
            <svg class="ic" viewBox="0 0 24 24" style="stroke:#fff"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M9 13l2 3-2 3M15 13l-2 3 2 3"/></svg>
            Excel
          </button>
          <button class="btn btn-out" style="flex:1;" onclick="exportCSV()">
            <svg class="ic" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="16" x2="16" y2="16"/></svg>
            CSV
          </button>
        </div>
        <button class="btn btn-out" style="width:100%; margin-bottom:18px;" onclick="imprimir()">
          <svg class="ic" viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Imprimir o guardar PDF
        </button>
        <div class="tbl-wrap"><table class="mtable" id="sumTable"></table></div>
        <div class="totbox" id="sumTotals"></div>
      </div>

    </div></div>
  </div>

</div>

<!-- CONFIG -->
<div class="ov" id="cfgOv" onclick="if(event.target===this)closeConfig()">
  <div class="sheet">
    <h3>Configuración</h3>
    <div class="cfg-row"><label>Hora Oficial ($)</label><input type="number" id="cfg_ofi"></div>
    <div class="cfg-row"><label>Hora Peón ($)</label><input type="number" id="cfg_peon"></div>
    <div class="cfg-row"><label>Hora Medio Oficial ($)</label><input type="number" id="cfg_medio"></div>
    <div class="cfg-row"><label>Herramientas menores (%)</label><input type="number" id="cfg_herr"></div>
    <div class="cfg-row"><label>Gastos generales (%)</label><input type="number" id="cfg_gg"></div>
    <div class="cfg-row"><label>Beneficio (%)</label><input type="number" id="cfg_benef"></div>
    <div class="cfg-row"><label>Capacidad volqueta (m³)</label><input type="number" id="cfg_volq"></div>
    <div class="cfg-row"><label>Flete por volqueta ($)</label><input type="number" id="cfg_flete"></div>
    <button class="btn btn-red" style="width:100%; margin-top:8px;" onclick="saveConfig()">Guardar</button>
    <div class="ver">Demoliciones · versión 1.2</div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ============================================================
   Demoliciones — APU por rubro. Dashboard SOLO carga rubros.
   El sumado/desglose va en la pestaña Resumen (Excel + PDF con
   encabezado editable). Spec: APU_DEMOLICIONES.md. localStorage.
   ============================================================ */

const VOL_BOLSA = 0.03; // m³ por bolsa de escombro

const RUBROS = [
  {key:'piso',       label:'Romper piso (revestimiento)',        u:'M²', hOfi:0,    hPeon:0.45, esp:1.3, espesor:0.02, pesado:false, bolsas:1.25, cons:'Rotomartillo liviano 5 kg, disco'},
  {key:'contrapiso', label:'Contrapiso grueso / platea',         u:'M²', hOfi:0.80, hPeon:1.00, esp:1.5, espesor:0.10, pesado:true,  bolsas:4.5,  cons:'Rotomartillo pesado 11–16 kg, puntas'},
  {key:'tabique',    label:'Tabiques livianos (yeso/placas)',    u:'M²', hOfi:0,    hPeon:0.40, esp:1.8, espesor:0.10, pesado:false, bolsas:2,    cons:'Atornilladora, amoladora, hojas de sierra'},
  {key:'pared15',    label:'Pared mampostería ≤15 cm',           u:'M²', hOfi:0.80, hPeon:1.10, esp:1.4, espesor:0.15, pesado:false, bolsas:4,    cons:'Rotomartillo 5–11 kg, disco diamante 9"'},
  {key:'muro30',     label:'Muro de carga ≥30 cm',               u:'M³', hOfi:4.5,  hPeon:5.5,  esp:1.4, espesor:1,    pesado:false, bolsas:27,   cons:'Rotomartillo pesado, andamio, apuntalamiento'},
  {key:'hormigon',   label:'Hormigón armado (vigas/columnas/losas)', u:'M³', hOfi:18, hPeon:22, esp:1.5, espesor:1,   pesado:true,  bolsas:40,   cons:'Martillo rompepavimentos 16–30 kg, discos, oxicorte'},
  {key:'hierro',     label:'Hierro estructural (IPN/columnas)',  u:'ML', hOfi:1.35, hPeon:1.65, esp:1.1, espesor:0,    pesado:true,  bolsas:0, chatarra:true, cons:'Amoladora 9", discos metal, aparejo, puntales'},
  {key:'estufa',     label:'Estufas / parrilleros',              u:'Un', hOfi:11,   hPeon:13,   esp:1.4, espesor:0,    pesado:true,  bolsas:52,   cons:'Rotomartillo 11 kg, amoladora 9", nylon + cinta'},
  {key:'cielorraso', label:'Cielorraso suspendido',              u:'M²', hOfi:0.35, hPeon:0.35, esp:1.8, espesor:0.05, pesado:false, bolsas:1.5, medioOfi:true, cons:'Atornilladora, amoladora 4.5", andamio liviano'},
  {key:'abertura_ok',label:'Abertura a conservar (desmonte técnico)', u:'Un', hOfi:1, hPeon:1, esp:1,  espesor:0,    pesado:false, bolsas:0,    cons:'Amoladora 4.5" fina, cuñas, palancas'},
  {key:'abertura_no',label:'Abertura a descartar',               u:'Un', hOfi:0,    hPeon:0.5,  esp:1,   espesor:0,    pesado:false, bolsas:0,    cons:'Marra, cortafierro, amoladora 9"'},
  {key:'bano',       label:'Baño integral',                      u:'Gl', hOfi:14,   hPeon:18,   esp:1.4, espesor:0,    pesado:false, bolsas:50,   cons:'Rotomartillo mediano, tapones agua + teflón'},
  {key:'cocina',     label:'Cocina integral',                    u:'Gl', hOfi:16,   hPeon:20,   esp:1.5, espesor:0,    pesado:false, bolsas:45,   cons:'Rotomartillo, discos, tapón de gas + sellador'},
];
const rubro = (k)=> RUBROS.find(r=>r.key===k);
const ACARREO = [['1','Baja (PB, <20 m)'],['1.3','Media (pasillos/giros)'],['1.4','Alta (planta alta por escalera)']];
const INSAL   = [['1','No aplica'],['1.3','Sí (lana, hollín o >3 m)']];

const DEF_CFG = { ofi:450, peon:350, medio:400, herr:10, gg:15, benef:20, volq:5, flete:4000 };
let config = Object.assign({}, DEF_CFG, JSON.parse(localStorage.getItem('demo_cfg')||'{}'));
let projects = JSON.parse(localStorage.getItem('demo_db')||'[]');
let activeId = null, curTab='rubros';

function saveDB(){ localStorage.setItem('demo_db', JSON.stringify(projects)); }
function saveCfgDB(){ localStorage.setItem('demo_cfg', JSON.stringify(config)); }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('on'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('on'),2200); }
const proj = ()=> projects.find(p=>p.id===activeId);
const money = (n)=> '$ '+Math.round(n).toLocaleString('es-UY');
const fmt = (n,d=2)=> (Math.round(n*10**d)/10**d).toLocaleString('es-UY');
function esc(s){ return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// ---------- Cálculo ----------
function computeItem(it){
  const r = rubro(it.rubro); if(!r) return null;
  const q = +it.cantidad||0;
  const mult = (+it.acarreo||1) * (+it.insal||1);
  const hOfi = q * r.hOfi * mult, hPeon = q * r.hPeon * mult;
  const mo = hOfi*(r.medioOfi?config.medio:config.ofi) + hPeon*config.peon;
  const herr = r.pesado ? mo*config.herr/100 : 0;
  const cons = +it.consumibles||0;
  const subtotal = mo + cons + herr;
  const gg = subtotal*config.gg/100;
  const precio = (subtotal+gg)*(1+config.benef/100);
  const vol = r.chatarra ? 0 : (r.espesor>0 ? q*r.espesor*r.esp : (r.bolsas>0 ? q*r.bolsas*VOL_BOLSA : 0));
  return { hOfi, hPeon, mo, herr, cons, gg, precio, vol, bolsas:q*r.bolsas, chatarra:!!r.chatarra };
}
function computeObra(p){
  let precio=0, vol=0, bolsas=0, mo=0;
  for(const it of p.items){ const c=computeItem(it); if(!c)continue; precio+=c.precio; vol+=c.vol; bolsas+=c.bolsas; mo+=c.mo; }
  const volquetas = Math.ceil(vol/(config.volq||5))||0;
  const fletes = volquetas*config.flete;
  return { precio, vol, bolsas, mo, volquetas, fletes, total:precio+fletes };
}

// ---------- Navegación ----------
function navTo(v){
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.getElementById('btnBack').style.display=(v==='home')?'none':'flex';
  if(v==='home') renderHome();
  if(v==='proj'){ curTab='rubros'; switchTab('rubros'); renderProj(); }
}
function goBack(){ navTo('home'); }

// ---------- Proyectos ----------
function createProject(){
  const inp=document.getElementById('newProjName'), name=inp.value.trim();
  if(!name){ toast('Escribí un nombre'); return; }
  projects.push({ id:Date.now(), name, header:'', items:[] });
  saveDB(); inp.value=''; renderHome();
}
function openProject(id){ activeId=id; navTo('proj'); }
function delProject(id,ev){ ev.stopPropagation(); if(!confirm('¿Borrar la obra?'))return; projects=projects.filter(p=>p.id!==id); saveDB(); renderHome(); }
function renderHome(){
  const l=document.getElementById('projectsList');
  if(!projects.length){ l.innerHTML='<div class="empty">Sin obras. Creá la primera arriba.</div>'; return; }
  l.innerHTML = projects.map(p=>`
    <div class="card" onclick="openProject(${p.id})">
      <svg class="ic ic-red" viewBox="0 0 24 24"><path d="M3 21h18M6 21V9l6-4 6 4v12"/><path d="M9 21v-6h6v6"/></svg>
      <div style="flex:1; min-width:0;"><div class="card-title">${esc(p.name)}</div>
        <div class="card-sub">${p.items.length} rubro(s)</div></div>
      <button class="btn-text" onclick="delProject(${p.id},event)">Borrar</button>
    </div>`).join('');
}

// ---------- Pestañas ----------
function switchTab(t){
  curTab=t;
  document.getElementById('tab-rubros').style.display = t==='rubros'?'block':'none';
  document.getElementById('tab-resumen').style.display = t==='resumen'?'block':'none';
  document.getElementById('tabR').classList.toggle('on', t==='rubros');
  document.getElementById('tabS').classList.toggle('on', t==='resumen');
  if(t==='resumen') renderResumen();
}

// ---------- TAB Rubros: solo carga de datos ----------
function renderProj(){
  const p=proj(); if(!p) return navTo('home');
  document.getElementById('pdTitle').textContent = p.name;
  document.getElementById('rubroSel').innerHTML = RUBROS.map(r=>`<option value="${r.key}">${r.label} · ${r.u}</option>`).join('');
  const l=document.getElementById('itemsList');
  if(!p.items.length){ l.innerHTML='<div class="empty">Sin rubros. Elegí uno arriba y tocá Agregar.</div>'; return; }
  l.innerHTML = p.items.map((it)=>{
    const r=rubro(it.rubro);
    return `<div class="item">
      <div class="item-head">
        <div class="item-name">${r.label}</div>
        <button class="btn-text" onclick="delItem(${it.id})">Quitar</button>
      </div>
      <div class="item-cons">Consumible clave: ${esc(r.cons)}</div>
      <div class="row"><span class="lab">Cantidad (${r.u})</span>
        <input type="number" class="input" value="${it.cantidad}" step="0.01" oninput="setItem(${it.id},'cantidad',this.value)"></div>
      <div class="row"><span class="lab">Acarreo</span>
        <select class="sel" onchange="setItem(${it.id},'acarreo',this.value)">${ACARREO.map(([v,t])=>`<option value="${v}" ${String(it.acarreo)===v?'selected':''}>${t}</option>`).join('')}</select></div>
      <div class="row"><span class="lab">Insalubridad</span>
        <select class="sel" onchange="setItem(${it.id},'insal',this.value)">${INSAL.map(([v,t])=>`<option value="${v}" ${String(it.insal)===v?'selected':''}>${t}</option>`).join('')}</select></div>
      <div class="row"><span class="lab">Consumibles $</span>
        <input type="number" class="input" value="${it.consumibles||0}" step="1" oninput="setItem(${it.id},'consumibles',this.value)"></div>
    </div>`;
  }).join('');
}
function addItem(){
  const p=proj(); const k=document.getElementById('rubroSel').value;
  p.items.push({ id:Date.now(), rubro:k, cantidad:0, acarreo:'1', insal:'1', consumibles:0 });
  saveDB(); renderProj();
}
function setItem(id,field,val){
  const p=proj(), it=p.items.find(x=>x.id===id); if(!it)return;
  it[field]=(field==='acarreo'||field==='insal')?val:(+val||0); saveDB();
}
function delItem(id){ const p=proj(); p.items=p.items.filter(x=>x.id!==id); saveDB(); renderProj(); }

// ---------- TAB Resumen ----------
function setHeader(v){ const p=proj(); if(p){ p.header=v; saveDB(); } }
function sumRows(p){
  return p.items.map(it=>{ const r=rubro(it.rubro), c=computeItem(it);
    return { label:r.label, u:r.u, cant:+it.cantidad||0, hOfi:c.hOfi, hPeon:c.hPeon, mo:c.mo, herrgg:c.herr+c.gg, vol:c.vol, chatarra:c.chatarra, precio:c.precio }; });
}
function renderResumen(){
  const p=proj(); if(!p) return;
  document.getElementById('encInput').value = p.header||'';
  const rows=sumRows(p);
  const tbl=document.getElementById('sumTable');
  if(!rows.length){ tbl.innerHTML='<tr><td class="empty" style="padding:24px;">Cargá rubros en la pestaña Rubros.</td></tr>';
    document.getElementById('sumTotals').innerHTML=''; return; }
  tbl.innerHTML = `<thead><tr><th>Rubro</th><th class="q">Cant.</th><th class="q">H Ofi</th><th class="q">H Peón</th><th class="q">Costo MO</th><th class="q">Escombro</th><th class="q">Precio</th></tr></thead><tbody>`
    + rows.map(r=>`<tr><td>${esc(r.label)}</td><td class="q">${fmt(r.cant,2)} ${r.u}</td><td class="q">${fmt(r.hOfi,1)}</td><td class="q">${fmt(r.hPeon,1)}</td><td class="q">${money(r.mo)}</td><td class="q">${r.chatarra?'chatarra':fmt(r.vol,2)+' m³'}</td><td class="q">${money(r.precio)}</td></tr>`).join('')
    + `</tbody>`;
  const t=computeObra(p);
  document.getElementById('sumTotals').innerHTML = `
    <div class="totrow"><span>Trabajos</span><span>${money(t.precio)}</span></div>
    <div class="totrow"><span>Escombro</span><span>${fmt(t.vol,2)} m³ · ${t.volquetas} volq.</span></div>
    <div class="totrow"><span>Fletes</span><span>${money(t.fletes)}</span></div>
    <div class="totrow big"><span>TOTAL OBRA</span><span>${money(t.total)}</span></div>`;
}

// ---------- Config ----------
function openConfig(){
  ['ofi','peon','medio','herr','gg','benef','volq','flete'].forEach(k=>document.getElementById('cfg_'+k).value=config[k]);
  document.getElementById('cfgOv').classList.add('on');
}
function closeConfig(){ document.getElementById('cfgOv').classList.remove('on'); }
function saveConfig(){
  const g=id=>+document.getElementById(id).value;
  config={ ofi:g('cfg_ofi'), peon:g('cfg_peon'), medio:g('cfg_medio'), herr:g('cfg_herr'), gg:g('cfg_gg'), benef:g('cfg_benef'), volq:g('cfg_volq')||5, flete:g('cfg_flete') };
  saveCfgDB(); closeConfig();
  if(document.getElementById('view-proj').classList.contains('active') && curTab==='resumen') renderResumen();
  toast('Configuración guardada');
}

// ---------- Export Excel (.xlsx) ----------
function exportExcel(){
  const p=proj(); if(!p||!p.items.length){ toast('Sin rubros para exportar'); return; }
  if(typeof XLSX==='undefined'){ toast('Necesitás conexión para el Excel'); return; }
  const aoa=[];
  (p.header||'').split('\n').forEach(l=>{ if(l.trim()) aoa.push([l]); });
  if(aoa.length) aoa.push([]);
  aoa.push(['Rubro','Unidad','Cantidad','H Ofi','H Peón','Costo MO','Herr+GG','Escombro m³','Precio']);
  for(const r of sumRows(p)) aoa.push([r.label, r.u, r.cant, +r.hOfi.toFixed(2), +r.hPeon.toFixed(2), Math.round(r.mo), Math.round(r.herrgg), r.chatarra?'chatarra':+r.vol.toFixed(2), Math.round(r.precio)]);
  const t=computeObra(p);
  aoa.push([]);
  aoa.push(['Trabajos','','','','','','','',Math.round(t.precio)]);
  aoa.push(['Escombro (m³)','','','','','','',+t.vol.toFixed(2),'']);
  aoa.push(['Volquetas','','','','','','',t.volquetas,'']);
  aoa.push(['Fletes','','','','','','','',Math.round(t.fletes)]);
  aoa.push(['TOTAL OBRA','','','','','','','',Math.round(t.total)]);
  const ws=XLSX.utils.aoa_to_sheet(aoa); ws['!cols']=[{wch:38},{wch:8},{wch:10},{wch:9},{wch:9},{wch:12},{wch:12},{wch:12},{wch:12}];
  const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Cómputo');
  XLSX.writeFile(wb, 'Demoliciones_'+p.name.replace(/[^\w\-]+/g,'_')+'.xlsx');
  toast('Excel generado');
}

// ---------- Export CSV (funciona sin internet) ----------
function exportCSV(){
  const p=proj(); if(!p||!p.items.length){ toast('Sin rubros para exportar'); return; }
  const R=[];
  (p.header||'').split('\n').forEach(l=>{ if(l.trim()) R.push([l]); });
  if(R.length) R.push([]);
  R.push(['Rubro','Unidad','Cantidad','H Ofi','H Peon','Costo MO','Herr+GG','Escombro m3','Precio']);
  for(const r of sumRows(p)) R.push([r.label, r.u, r.cant, +r.hOfi.toFixed(2), +r.hPeon.toFixed(2), Math.round(r.mo), Math.round(r.herrgg), r.chatarra?'chatarra':+r.vol.toFixed(2), Math.round(r.precio)]);
  const t=computeObra(p);
  R.push([]);
  R.push(['Trabajos','','','','','','','',Math.round(t.precio)]);
  R.push(['Escombro m3','','','','','','',+t.vol.toFixed(2),'']);
  R.push(['Volquetas','','','','','','',t.volquetas,'']);
  R.push(['Fletes','','','','','','','',Math.round(t.fletes)]);
  R.push(['TOTAL OBRA','','','','','','','',Math.round(t.total)]);
  const csv=R.map(row=>row.map(c=>{ const s=String(c); return /[",;\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }).join(';')).join('\n');
  const a=document.createElement('a'); a.download='Demoliciones_'+p.name.replace(/[^\w\-]+/g,'_')+'.csv';
  a.href=URL.createObjectURL(new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'})); a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1500); toast('CSV generado');
}

// ---------- Imprimir (limpio, encabezado editable, sin marca) → guardar PDF ----------
function imprimir(){
  const p=proj(); if(!p||!p.items.length){ toast('Sin rubros para exportar'); return; }
  const t=computeObra(p);
  const enc=(p.header||'').split('\n').filter(l=>l.trim()).map(l=>`<div>${esc(l)}</div>`).join('');
  const rows=sumRows(p).map(r=>`<tr><td>${esc(r.label)}</td><td class="q">${fmt(r.cant,2)} ${r.u}</td><td class="q">${fmt(r.hOfi,1)}</td><td class="q">${fmt(r.hPeon,1)}</td><td class="q">${money(r.mo)}</td><td class="q">${r.chatarra?'chatarra':fmt(r.vol,2)}</td><td class="q">${money(r.precio)}</td></tr>`).join('');
  const w=window.open('','_blank'); if(!w){ toast('Permití la ventana emergente'); return; }
  w.document.write(`<!doctype html><html lang="es"><head><meta charset="utf-8"><title>Cómputo</title>
    <style>@page{size:A4 portrait;margin:15mm}*{font-family:'Segoe UI',Arial,sans-serif}body{color:#1C1C1C;font-size:12px}
    .enc{font-size:15px;line-height:1.5;margin-bottom:16px;border-bottom:2px solid #FE0000;padding-bottom:10px}
    table{width:100%;border-collapse:collapse;margin-bottom:14px}th{text-align:left;font-size:11px;text-transform:uppercase;color:#7A7A7A;border-bottom:1px solid #999;padding:6px 4px}
    td{padding:6px 4px;border-bottom:1px solid #eee}.q{text-align:right;white-space:nowrap}
    .tot div{display:flex;justify-content:space-between;padding:5px 0;font-size:14px}
    .tot .big{font-size:20px;font-weight:700;color:#FE0000;border-top:2px solid #FE0000;margin-top:6px;padding-top:10px}</style></head><body>
    ${enc?`<div class="enc">${enc}</div>`:''}
    <table><thead><tr><th>Rubro</th><th class="q">Cant.</th><th class="q">H Ofi</th><th class="q">H Peón</th><th class="q">Costo MO</th><th class="q">Escombro m³</th><th class="q">Precio</th></tr></thead><tbody>${rows}</tbody></table>
    <div class="tot">
      <div><span>Trabajos</span><span>${money(t.precio)}</span></div>
      <div><span>Escombro / volquetas</span><span>${fmt(t.vol,2)} m³ · ${t.volquetas} volq.</span></div>
      <div><span>Fletes</span><span>${money(t.fletes)}</span></div>
      <div class="big"><span>TOTAL OBRA</span><span>${money(t.total)}</span></div>
    </div>
    <script>onload=function(){setTimeout(function(){print()},150)}<\/script></body></html>`);
  w.document.close(); toast('PDF · elegí "Guardar como PDF"');
}
