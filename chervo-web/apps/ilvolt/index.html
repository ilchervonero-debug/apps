<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>iLVolt — Presupuesto eléctrico</title>
<meta name="theme-color" content="#F2F2F0">
<link rel="manifest" href="/apps/ilvolt/manifest.json">
<link rel="apple-touch-icon" href="/apps/ilvolt/icon-192.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Exo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
:root{ --white:#FFFFFF; --bg:#F2F2F0; --gray-l:#F6F6F6; --gray-m:#DCDCD8; --ink:#1C1C1C; --gray-t:#7A7A7A; --plata:#C0C0C0; --red:#FE0000; }
*{box-sizing:border-box; margin:0; padding:0; font-family:'Exo',sans-serif; -webkit-tap-highlight-color:transparent;}
html,body{height:100%; background:var(--bg); font-size:16px; color:var(--ink); line-height:1.5; overflow-x:hidden;}
.app{display:flex; flex-direction:column; height:100dvh; overflow:hidden;}
.ic{width:26px; height:26px; fill:none; stroke:var(--ink); stroke-width:1.3; stroke-linecap:round; stroke-linejoin:round; flex:none;}
.ic-red{stroke:var(--red);}

header{background:var(--white); padding:14px 18px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--gray-m); flex-shrink:0;}
#headTitle{font-size:22px; letter-spacing:-.3px; font-weight:800; color:var(--plata);}
#headTitle .red{color:var(--red);}
.hburger{background:none; border:none; cursor:pointer; padding:6px; display:flex;}
.header-btn{background:none; border:none; color:var(--ink); padding:8px 6px; cursor:pointer; font-size:16px; display:flex; align-items:center; gap:6px;}

.view{display:none; flex:1; overflow:hidden; flex-direction:column;}
.view.active{display:flex;}
.scroll{flex:1; overflow-y:auto; overflow-x:hidden; padding-bottom:36px;}
.container{padding:20px; max-width:900px; margin:0 auto; width:100%;}

.add-bar{display:flex; gap:10px; margin-bottom:20px;}
.add-bar>*{min-width:0;}
.input,.sel,textarea{padding:12px 14px; border:1px solid var(--gray-m); border-radius:8px; font-size:18px; background:var(--white); color:var(--ink); width:100%; max-width:100%; font-family:'Exo',sans-serif;}
.sel{font-size:16px;}
.input:focus,.sel:focus,textarea:focus{outline:none; border-color:var(--red);}
textarea{resize:vertical; min-height:70px; line-height:1.5;}
/* Sin botones pintados: ícono + borde que cambia de color */
.btn{border:1.5px solid var(--gray-m); padding:12px 16px; border-radius:8px; font-size:16px; cursor:pointer; font-weight:500; display:flex; align-items:center; justify-content:center; gap:8px; white-space:nowrap; background:var(--white); color:var(--ink);}
.btn .ic{stroke:currentColor; width:22px; height:22px;}
.btn-red{color:var(--red); border-color:var(--red);}
.btn-sm{padding:10px 13px; font-size:15px;}
.btn-text{background:none; border:none; color:var(--red); padding:11px 6px; font-size:16px; cursor:pointer; white-space:nowrap;}
.btn:active,.btn-text:active{filter:brightness(.94);}

.card{display:flex; align-items:center; gap:14px; padding:18px; background:var(--white); border:1px solid var(--gray-m); border-radius:10px; margin-bottom:12px; cursor:pointer;}
.card:active{background:var(--gray-l);}
.card-title{font-size:19px; flex:1; min-width:0;}
.card-sub{font-size:14px; color:var(--gray-t);}
.card-core{border-left:4px solid var(--red);}
.empty{text-align:center; padding:30px 20px; color:var(--gray-t); font-size:17px;}

.tabs{display:flex; gap:6px; margin-bottom:18px; overflow-x:auto;}
.tab{flex:1 0 auto; padding:11px 14px; border-radius:10px; border:1.5px solid var(--gray-m); background:var(--white); color:var(--ink); font-size:15px; cursor:pointer; white-space:nowrap;}
.tab.on{border-color:var(--red); color:var(--red);}

.field{margin-bottom:14px;}
.field label{display:block; font-size:15px; color:var(--gray-t); margin-bottom:5px;}
.chk{display:flex; align-items:center; gap:12px; margin-bottom:12px; cursor:pointer; font-size:16px;}
.chk input{display:none;}
.chk .mark{width:24px; height:24px; border:1.5px solid var(--gray-m); border-radius:5px; background:var(--white); position:relative; flex:none;}
.chk input:checked + .mark{border-color:var(--red);}
.chk input:checked + .mark::after{content:""; position:absolute; left:8px; top:4px; width:5px; height:10px; border:solid var(--red); border-width:0 2px 2px 0; transform:rotate(45deg);}
.sub-in{display:flex; align-items:center; gap:10px; margin:-4px 0 12px 36px;}
.sub-in .input{width:130px; font-size:16px;}
.sub-in span{font-size:15px; color:var(--gray-t);}

.item{background:var(--white); border:1px solid var(--gray-m); border-left:4px solid var(--red); border-radius:10px; padding:16px; margin-bottom:14px;}
.item-head{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
.item-head .input{flex:1;}
.g2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.numf{display:flex; flex-direction:column; gap:4px;}
.numf label{font-size:13px; color:var(--gray-t);}
.numf input{padding:10px; border:1px solid var(--gray-m); border-radius:8px; font-size:17px; text-align:right;}
.numf input:focus{outline:none; border-color:var(--red);}

.sec-title{font-size:18px; margin:18px 0 10px; color:var(--ink);}
.eng{background:var(--white); border:1px solid var(--gray-m); border-radius:10px; padding:16px; margin-bottom:14px;}
.eng h4{font-size:16px; margin-bottom:8px;}
.circ{font-size:15px; padding:7px 0; border-bottom:1px solid var(--gray-l); display:flex; gap:8px;}
.circ .cid{color:var(--red); font-weight:600; min-width:74px;}
.stat{display:flex; gap:22px; margin-top:12px;}
.stat b{font-size:22px; font-weight:600; display:block;}
.stat span{font-size:13px; color:var(--gray-t); text-transform:uppercase;}
.alert{border:1.5px solid var(--red); border-radius:10px; padding:12px 14px; margin-bottom:10px; font-size:15px; color:var(--ink);}
.alert.crit{background:#fff;}
.alert .at{color:var(--red); font-weight:600;}

.totbox{background:var(--white); border:1px solid var(--gray-m); border-radius:10px; padding:18px; margin-bottom:16px;}
.totrow{display:flex; justify-content:space-between; padding:6px 0; font-size:17px; gap:10px;}
.totrow.big{font-size:23px; font-weight:600; color:var(--red); border-top:2px solid var(--red); margin-top:6px; padding-top:12px;}
.tbl-wrap{width:100%; overflow-x:auto; margin-bottom:16px;}
.mtable{width:100%; border-collapse:collapse; font-size:15px;}
.mtable th{text-align:left; font-weight:600; color:var(--gray-t); font-size:13px; text-transform:uppercase; padding:8px 6px; border-bottom:1px solid var(--gray-m);}
.mtable td{padding:8px 6px; border-bottom:1px solid var(--gray-l);}
.mtable td.q{text-align:right; white-space:nowrap;}

.ov{position:fixed; inset:0; background:rgba(20,20,20,.4); display:none; align-items:flex-end; justify-content:center; z-index:100;}
.ov.on{display:flex;}
.sheet{background:var(--white); width:100%; max-width:560px; border-radius:20px 20px 0 0; padding:20px 20px calc(24px + env(safe-area-inset-bottom,0)); max-height:88dvh; overflow-y:auto;}
.sheet h3{font-size:20px; font-weight:600; margin-bottom:12px;}
.sheet .row{display:flex; align-items:center; padding:12px 4px; border-bottom:1px solid var(--gray-l); font-size:16px; cursor:pointer; gap:12px;}
.sheet .ver{font-size:14px; color:var(--gray-t); margin-top:12px; text-align:center;}

#toast{position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(8px); background:rgba(28,28,28,.92); color:#fff; padding:11px 20px; border-radius:22px; font-size:16px; opacity:0; transition:.2s; pointer-events:none; z-index:200;}
#toast.on{opacity:1; transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="app">

  <header>
    <div id="headTitle"><span class="red">iL</span>Volt</div>
    <div style="display:flex; align-items:center; gap:4px;">
      <button class="header-btn" id="btnBack" onclick="goBack()" style="display:none;">
        <svg class="ic ic-red" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg> Volver
      </button>
      <button class="hburger" onclick="openMenu()" title="Menú">
        <svg class="ic ic-red" viewBox="0 0 24 24"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
      </button>
    </div>
  </header>

  <!-- LANDING: Core + Proyectos -->
  <div id="view-home" class="view active">
    <div class="scroll"><div class="container">
      <div class="card card-core" onclick="openCore()">
        <svg class="ic ic-red" viewBox="0 0 24 24"><path d="M13 2 3 14h7l-1 8 10-12h-7z"/></svg>
        <div style="flex:1; min-width:0;"><div class="card-title">Core · Tarifas y precios</div>
          <div class="card-sub">Matriz de precios base (editable)</div></div>
        <svg class="ic" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
      </div>
      <div class="add-bar" style="margin-top:8px;">
        <input type="text" id="newProjName" class="input" placeholder="Nombre del proyecto…">
        <button class="btn btn-red" onclick="createProject()">Crear</button>
      </div>
      <div id="projectsList"></div>
    </div></div>
  </div>

  <!-- CORE editor -->
  <div id="view-core" class="view">
    <div class="scroll"><div class="container">
      <h2 style="font-size:24px; font-weight:600; margin-bottom:6px; color:var(--plata);">Core · Tarifas</h2>
      <p class="card-sub" style="margin-bottom:18px;">Valores por defecto en $ UYU. Se guardan al escribir.</p>
      <div id="coreForm"></div>
      <button class="btn btn-red" style="width:100%; margin-top:10px;" onclick="resetCore()">Restaurar valores por defecto</button>
    </div></div>
  </div>

  <!-- PROYECTO -->
  <div id="view-proj" class="view">
    <div class="scroll"><div class="container">
      <h2 id="pdTitle" style="font-size:23px; font-weight:600; margin-bottom:2px; color:var(--plata);"></h2>
      <div id="pdSummary" style="font-size:15px; color:var(--gray-t); margin-bottom:14px;"></div>
      <div class="tabs">
        <button class="tab on" data-tab="datos" onclick="switchTab('datos')">Datos</button>
        <button class="tab" data-tab="ambientes" onclick="switchTab('ambientes')">Ambientes</button>
        <button class="tab" data-tab="ingenieria" onclick="switchTab('ingenieria')">Ingeniería</button>
        <button class="tab" data-tab="resultados" onclick="switchTab('resultados')">Resultados</button>
      </div>
      <div id="tab-datos"></div>
      <div id="tab-ambientes" style="display:none;"></div>
      <div id="tab-ingenieria" style="display:none;"></div>
      <div id="tab-resultados" style="display:none;"></div>
    </div></div>
  </div>

</div>

<!-- MENÚ -->
<div class="ov" id="menuOv" onclick="if(event.target===this)closeMenu()">
  <div class="sheet">
    <h3><span style="color:var(--red);font-weight:800;">iL</span><span style="color:var(--plata);font-weight:800;">Volt</span></h3>
    <div class="row" onclick="closeMenu();openCore()"><svg class="ic" viewBox="0 0 24 24"><path d="M13 2 3 14h7l-1 8 10-12h-7z"/></svg>Core · Tarifas y precios</div>
    <div class="ver">iLVolt · versión 1.3 · presupuesto eléctrico (UY)</div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ============================================================
   iLVolt — Core de presupuestación eléctrica (Uruguay).
   Estructura: Landing (Core + Proyectos) → Dashboard por fases
   (Datos → Ambientes → Ingeniería) → Resultados (pestaña aparte,
   sin mezclar costos en el diseño). localStorage.
   ============================================================ */

// ---- CORE por defecto (matriz de precios, editable) ----
const CORE_DEFAULT = {
  manoDeObra: { bocaFijo:800, peinadoLlave:400, visitaInspeccion:2500 },
  factoresSAU: { jornalBaseMedioOficial:2500, coeficienteBocaEmbutida:0.522, coeficienteBocaVista:0.418, multiplicadorBpsUnificado:1.758 },
  marcasModulos: {
    economico:{ interruptor:105, toma10a:120, schuko:180, schukoCorte:350, usb:600, combinado:149 },
    estandar: { interruptor:75,  toma10a:85,  schuko:229, schukoCorte:350, usb:600, combinado:139 },
    diseno:   { interruptor:180, toma10a:210, schuko:325, schukoCorte:350, usb:650, combinado:285 },
    premium:  { interruptor:240, toma10a:280, schuko:410, schukoCorte:350, usb:750, combinado:290 }
  },
  corrugado: { d20Naranja:15, d25Naranja:19, d32Naranja:31, d20Azul:25, d25Azul:35, d32Azul:45, d20Reforzado:26, d25Reforzado:32 },
  rigido: { d20Tira3m:175, d25Tira3m:210, d32Tira3m:345, cajaPaseIP54:169, caja10x5:45 },
  cables: { cable1_0:11, cable1_5:15, cable2_0:20, cable4:33, cable6:48 },
  daisa: { tubo34Metro:110, tubo1Metro:141, tubo114Metro:209, conector34:130, cajaAluminio:440, grampaOmega1:125 },
  canalExterior: { canaleta20x10:139, canaleta60x40:289, canaleta100x50:799, accesorios:94 },
  tableros: { gabinete4:700, gabinete8:1200, gabinete12:1800, gabinete18:2600, gabinete24:3600, gabinete36:5200, termica1P16:320, termica1P25:360, termica2P25:620, diferencial2P25_30:1400, diferencial2P40_30:1600, rielDIN:120, peineBipolar:260 },
  medidaIndirecta: { gabineteCMdoble:9000, celdaCT:6500, celdaCI:4500, barraCobreEstanada:2500 },
  subterraneo: { pvc63Metro:90, camara40x40:1800, kitPAT:1500 },
  iluminacion: { dicroicaLed:180, panelLedPlafones:450, reflectorExteriorLed:650, sensorMovimientoFotocelula:550 },
  fuerzaExterior: { bombaAguaPiscina:4500, tomaExteriorIP55:365 }
};
let core = mergeCore(JSON.parse(localStorage.getItem('ilvolt_core')||'null'));
function mergeCore(saved){ const c=JSON.parse(JSON.stringify(CORE_DEFAULT)); if(saved){ for(const g in c){ if(saved[g]) for(const k in c[g]){ if(g==='marcasModulos'){ for(const m in c[g][k]) if(saved[g][k]&&saved[g][k][m]!=null) c[g][k][m]=saved[g][k][m]; } else if(saved[g][k]!=null) c[g][k]=saved[g][k]; } } } return c; }
function saveCore(){ localStorage.setItem('ilvolt_core', JSON.stringify(core)); }

let projects = JSON.parse(localStorage.getItem('ilvolt_db')||'[]');
let activeId=null, curTab='datos';
function saveDB(){ localStorage.setItem('ilvolt_db', JSON.stringify(projects)); }
const proj = ()=> projects.find(p=>p.id===activeId);
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('on'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('on'),2200); }
const money = (n)=> '$ '+Math.round(n).toLocaleString('es-UY');
const num = (n)=> (Math.round(n*100)/100).toLocaleString('es-UY');
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// Texto profesional del presupuesto (fijo, bien expresado)
const DOC_INCLUYE = ['Mano de obra para los trabajos descritos.','Materiales indicados en este presupuesto.','Pruebas de funcionamiento.','Limpieza básica del área de trabajo.'];
const DOC_NOINCLUYE = ['Trabajos de albañilería.','Pintura y terminaciones.','Reparación de revestimientos.','Trabajos no especificados.','Materiales no detallados.','Modificaciones solicitadas una vez aceptado el presupuesto.'];
const DOC_CONSID = ['El presupuesto fue realizado con la información disponible al momento de su confección.','Cualquier trabajo adicional será presupuestado por separado.','Si durante la ejecución aparecen situaciones no visibles al momento del presupuesto, serán comunicadas antes de continuar.','El cliente deberá permitir el acceso a la obra y disponer del suministro eléctrico cuando sea necesario.'];
const DOC_GARANTIA = 'La garantía cubre únicamente la mano de obra realizada. No cubre materiales provistos por el cliente, intervenciones de terceros, sobrecargas, daños por humedad, fenómenos climáticos ni modificaciones posteriores a la instalación.';
const DOC_MATNOTA = 'La lista de materiales es orientativa. Las cantidades de cables, caños corrugados y accesorios pueden variar durante la ejecución debido al recorrido definitivo de la instalación o a imprevistos propios de la obra.';
const MAT_MODO = [['manoObra','Mano de obra únicamente'],['incluidos','Materiales incluidos'],['cliente','Materiales suministrados por el cliente']];
const IMPUESTOS = [['final','Precio final'],['ivaIncluido','IVA incluido'],['ivaNoIncluido','IVA no incluido']];

/* ==================== MOTOR (Core JS integrado) ==================== */
const CorePresupuesto = {
  calcularProyecto: function(datosProyecto){
    const P = core;
    let totalMateriales=0, totalManoObra=0, totalBocasContadas=0;
    let desgloseAmbientes=[];
    let ingenieriaTableros={ requiereMedidaIndirecta:false, alertasSeguridad:[],
      T1:{descripcion:"Tablero General Principal (Interior)", circuitos:[]},
      T2:{descripcion:"Tablero Seccional (Exterior/Piscina/Barbacoa)", circuitos:[]},
      totalDiferenciales:0, totalTermicas:0 };
    let totalPotenciaEstimadaW=0;
    const tipoInst = datosProyecto.tipoInstalacion || (datosProyecto.esInstalacionVista?'vista':'embutida');
    const esVista = tipoInst==='vista' || tipoInst==='daisa';
    const mCano = datosProyecto.metrosCanoPorPuesta||4, mCable = datosProyecto.metrosCablePorPuesta||8;
    const precioCaja = tipoInst==='daisa'?P.daisa.cajaAluminio : tipoInst==='vista'?P.rigido.cajaPaseIP54 : P.rigido.caja10x5;
    const precioCano = tipoInst==='daisa'?P.daisa.tubo34Metro : tipoInst==='vista'?(P.canalExterior.canaleta20x10/2) : tipoInst==='embutidaIgnifuga'?P.corrugado.d20Azul : P.corrugado.d20Naranja;
    let necesitaT2 = (datosProyecto.cantidadTableros||1) >= 2;

    ingenieriaTableros.T1.circuitos.push({id:"C1", tipo:"Iluminación LED General", destino:"Interiores limpios"});
    ingenieriaTableros.T1.circuitos.push({id:"C2", tipo:"Tomas Generales 10A", destino:"Dormitorios y Estar"});
    ingenieriaTableros.totalTermicas+=2; ingenieriaTableros.totalDiferenciales+=1;
    let diferencialCocinaAsignado=false;
    let tot={toma10a:0,schuko:0,schukoCorte:0,combinado:0,usb:0,luces:0,paneles:0,sensores:0,reflectores:0,bombas:0};

    (datosProyecto.ambientes||[]).forEach(amb=>{
      let costoMaterialesAmb=0, puestasAmb=0;
      const preciosLinea = P.marcasModulos[datosProyecto.perfilCalidad] || P.marcasModulos.estandar;
      puestasAmb += (amb.tomas10a||0)+(amb.tomasSchuko||0)+(amb.tomasSchukoCorte||0)+(amb.interruptoresCombinados||0)+(amb.modulosUsb||0)+(amb.lucesLed||0);
      totalBocasContadas += puestasAmb;
      tot.toma10a+=(amb.tomas10a||0); tot.schuko+=(amb.tomasSchuko||0); tot.schukoCorte+=(amb.tomasSchukoCorte||0); tot.combinado+=(amb.interruptoresCombinados||0); tot.usb+=(amb.modulosUsb||0); tot.luces+=(amb.lucesLed||0); tot.paneles+=(amb.panelesLed||0);
      if(amb.tipo==='exterior'||amb.tipo==='patio'){ tot.sensores+=(amb.sensoresMovimiento||0); tot.reflectores+=(amb.reflectoresLed||0); if(amb.tieneBombaOFiltrado) tot.bombas++; }
      costoMaterialesAmb += (amb.tomas10a||0)*preciosLinea.toma10a;
      costoMaterialesAmb += (amb.tomasSchuko||0)*preciosLinea.schuko;
      costoMaterialesAmb += (amb.tomasSchukoCorte||0)*preciosLinea.schukoCorte;
      costoMaterialesAmb += (amb.interruptoresCombinados||0)*preciosLinea.combinado;
      costoMaterialesAmb += (amb.modulosUsb||0)*preciosLinea.usb;
      costoMaterialesAmb += (amb.lucesLed||0)*P.iluminacion.dicroicaLed;
      costoMaterialesAmb += (amb.panelesLed||0)*P.iluminacion.panelLedPlafones;
      costoMaterialesAmb += puestasAmb*precioCaja;
      costoMaterialesAmb += puestasAmb*mCano*precioCano;                 // caño/canaleta según tipo
      costoMaterialesAmb += puestasAmb*mCable*3*P.cables.cable2_0;       // cable: 3 conductores por puesta

      if(amb.tipo==="cocina"){
        totalPotenciaEstimadaW+=3500;
        if(amb.tieneHornoAnafe){ totalPotenciaEstimadaW+=4500;
          ingenieriaTableros.alertasSeguridad.push("Cocina: Se detectó Horno/Anafe eléctrico. Se genera circuito exclusivo Carga Pesada.");
          ingenieriaTableros.T1.circuitos.push({id:"C_Horno", tipo:"Circuito Exclusivo Horno/Anafe", destino:"Cocina"});
          ingenieriaTableros.totalTermicas++; }
        if(!diferencialCocinaAsignado){
          ingenieriaTableros.T1.circuitos.push({id:"C_TomasCocina", tipo:"Tomas de Mesada y Electrodomésticos Pesados", destino:"Cocina"});
          ingenieriaTableros.totalTermicas++; ingenieriaTableros.totalDiferenciales++; diferencialCocinaAsignado=true; }
      }
      if(amb.tieneTermofon){ totalPotenciaEstimadaW+=2000;
        ingenieriaTableros.alertasSeguridad.push("Ambiente "+amb.nombre+": Se detectó Termofón. Se exige circuito independiente con Schuko con corte.");
        ingenieriaTableros.T1.circuitos.push({id:"C_Termofon_"+amb.nombre, tipo:"Alimentación Exclusiva Termofón", destino:amb.nombre});
        ingenieriaTableros.totalTermicas++; }

      if(amb.tipo==="exterior"||amb.tipo==="patio"){
        costoMaterialesAmb += (amb.sensoresMovimiento||0)*P.iluminacion.sensorMovimientoFotocelula;
        costoMaterialesAmb += (amb.reflectoresLed||0)*P.iluminacion.reflectorExteriorLed;
        if(amb.tieneBombaOFiltrado){ totalPotenciaEstimadaW+=1500; costoMaterialesAmb += P.fuerzaExterior.bombaAguaPiscina;
          ingenieriaTableros.alertasSeguridad.push("Exterior: Se detectó Bomba/Piscina. Se exige disyuntor diferencial aislado exclusivo para intemperie."); }
        let tableroDestino = necesitaT2 ? "T2":"T1";
        if(necesitaT2 && ingenieriaTableros.T2.circuitos.length===0) ingenieriaTableros.totalDiferenciales++;
        else if(!necesitaT2 && amb.tieneBombaOFiltrado) ingenieriaTableros.totalDiferenciales++;
        ingenieriaTableros[tableroDestino].circuitos.push({id:"C_Ext_Ilum", tipo:"Iluminación Exterior (Sensores/Fotocélulas/Reflectores)", destino:amb.nombre});
        ingenieriaTableros[tableroDestino].circuitos.push({id:"C_Ext_Fuerza", tipo:"Fuerza Exterior (Bombas y Tomas Estancos IP55)", destino:amb.nombre});
        ingenieriaTableros.totalTermicas+=2;
      }
      totalMateriales += costoMaterialesAmb;
      desgloseAmbientes.push({nombre:amb.nombre, puestas:puestasAmb, subtotalMateriales:costoMaterialesAmb});
    });

    let costoSubterraneo=0;
    if(datosProyecto.llevaTramoSubterraneo){
      costoSubterraneo += (datosProyecto.metrosSubterraneo||0)*(P.subterraneo.pvc63Metro*2);
      let cantidadCamaras=2;
      if((datosProyecto.metrosSubterraneo||0)>15 || datosProyecto.tieneCambioDireccionSubterraneo) cantidadCamaras += Math.floor((datosProyecto.metrosSubterraneo||0)/15);
      costoSubterraneo += cantidadCamaras*P.subterraneo.camara40x40;
      totalMateriales += costoSubterraneo;
    }
    totalMateriales += P.subterraneo.kitPAT;

    if(totalPotenciaEstimadaW>40000){ ingenieriaTableros.requiereMedidaIndirecta=true;
      ingenieriaTableros.alertasSeguridad.push("CRÍTICO: La carga calculada supera los 40 kW. Se debe presupuestar e instalar Puesto de Medida Indirecta (Gabinetes acoplados CM doble + CT + CI) con barras de cobre estañadas."); }

    // Tableros y protecciones (material): gabinete + térmicas + diferenciales
    const T=P.tableros;
    let modulosDIN = ingenieriaTableros.totalTermicas + ingenieriaTableros.totalDiferenciales + 1;
    let gabPrincipal = modulosDIN<=4?T.gabinete4:modulosDIN<=8?T.gabinete8:modulosDIN<=12?T.gabinete12:modulosDIN<=18?T.gabinete18:modulosDIN<=24?T.gabinete24:T.gabinete36;
    let costoTableros = gabPrincipal + ingenieriaTableros.totalTermicas*T.termica1P16 + ingenieriaTableros.totalDiferenciales*T.diferencial2P40_30 + Math.max(0,(datosProyecto.cantidadTableros||1)-1)*T.gabinete8;
    totalMateriales += costoTableros;

    // Medida indirecta (si supera 40 kW)
    let costoMedidaIndirecta = 0;
    if(ingenieriaTableros.requiereMedidaIndirecta){ const mi=P.medidaIndirecta; costoMedidaIndirecta = mi.gabineteCMdoble+mi.celdaCT+mi.celdaCI+mi.barraCobreEstanada; totalMateriales += costoMedidaIndirecta; }

    let subtotalManoObraBocas=0;
    if(datosProyecto.calcularPorSAU){
      let factorRendimiento = esVista ? P.factoresSAU.coeficienteBocaVista : P.factoresSAU.coeficienteBocaEmbutida;
      let jornalBase = datosProyecto.jornalBase || P.factoresSAU.jornalBaseMedioOficial;
      let manoObraBaseImponible = totalBocasContadas*factorRendimiento*jornalBase;
      subtotalManoObraBocas = datosProyecto.aplicaBpsUnificado ? manoObraBaseImponible*P.factoresSAU.multiplicadorBpsUnificado : manoObraBaseImponible;
    } else {
      subtotalManoObraBocas = totalBocasContadas*P.manoDeObra.bocaFijo;
    }
    let subtotalManoObraTableros = ingenieriaTableros.totalTermicas*P.manoDeObra.peinadoLlave;
    totalManoObra = subtotalManoObraBocas + subtotalManoObraTableros;
    if(datosProyecto.soloInspeccionaCanalizacion) totalManoObra += (datosProyecto.cantidadVisitasObra||2)*P.manoDeObra.visitaInspeccion;

    // Lista de materiales (BOM) para el presupuesto
    const preciosL = P.marcasModulos[datosProyecto.perfilCalidad]||P.marcasModulos.estandar;
    const lista=[]; const addM=(item,cant,unidad,precio)=>{ if(cant>0.0001) lista.push({item, cant:Math.round(cant*100)/100, unidad, precio:Math.round(precio), subtotal:Math.round(cant*precio)}); };
    addM('Módulo toma 10A', tot.toma10a, 'u', preciosL.toma10a);
    addM('Módulo Schuko 16A', tot.schuko, 'u', preciosL.schuko);
    addM('Módulo Schuko c/corte', tot.schukoCorte, 'u', preciosL.schukoCorte);
    addM('Módulo combinado', tot.combinado, 'u', preciosL.combinado);
    addM('Módulo USB', tot.usb, 'u', preciosL.usb);
    addM('Dicroica / luz LED', tot.luces, 'u', P.iluminacion.dicroicaLed);
    addM('Panel / plafón LED', tot.paneles, 'u', P.iluminacion.panelLedPlafones);
    addM('Sensor / fotocélula', tot.sensores, 'u', P.iluminacion.sensorMovimientoFotocelula);
    addM('Reflector exterior LED', tot.reflectores, 'u', P.iluminacion.reflectorExteriorLed);
    addM('Bomba / filtrado', tot.bombas, 'u', P.fuerzaExterior.bombaAguaPiscina);
    addM('Caja de conexión', totalBocasContadas, 'u', precioCaja);
    addM('Caño / canaleta', totalBocasContadas*mCano, 'm', precioCano);
    addM('Cable (×3 conductores)', totalBocasContadas*mCable*3, 'm', P.cables.cable2_0);
    addM('Gabinete principal', 1, 'u', gabPrincipal);
    addM('Gabinete adicional', Math.max(0,(datosProyecto.cantidadTableros||1)-1), 'u', T.gabinete8);
    addM('Térmica 1P', ingenieriaTableros.totalTermicas, 'u', T.termica1P16);
    addM('Diferencial 2P 30mA', ingenieriaTableros.totalDiferenciales, 'u', T.diferencial2P40_30);
    if(ingenieriaTableros.requiereMedidaIndirecta){ const mi=P.medidaIndirecta; addM('Gabinete CM doble',1,'u',mi.gabineteCMdoble); addM('Celda CT',1,'u',mi.celdaCT); addM('Celda CI',1,'u',mi.celdaCI); addM('Barra cobre estañada',1,'u',mi.barraCobreEstanada); }
    if(datosProyecto.llevaTramoSubterraneo){ addM('Caño PVC 63mm subterráneo', (datosProyecto.metrosSubterraneo||0)*2, 'm', P.subterraneo.pvc63Metro); let cam=2; if((datosProyecto.metrosSubterraneo||0)>15||datosProyecto.tieneCambioDireccionSubterraneo) cam+=Math.floor((datosProyecto.metrosSubterraneo||0)/15); addM('Cámara registro 40×40', cam, 'u', P.subterraneo.camara40x40); }
    addM('Kit puesta a tierra', 1, 'u', P.subterraneo.kitPAT);

    return { cliente:datosProyecto.cliente, ubicacion:datosProyecto.ubicacion, fechaEmision:datosProyecto.fecha||new Date().toLocaleDateString('es-UY'),
      totalBocas:totalBocasContadas, desgloseAmbientes, ingenieriaTableros, listaMateriales:lista,
      materiales:{ canoMetros:Math.round(totalBocasContadas*mCano), cableMetros:Math.round(totalBocasContadas*mCable*3), cajas:totalBocasContadas },
      costos:{ subtotalMateriales:Math.round(totalMateriales-costoSubterraneo-costoTableros-costoMedidaIndirecta),
        subtotalTableros:Math.round(costoTableros), subtotalMedidaIndirecta:Math.round(costoMedidaIndirecta),
        subtotalInfraestructuraSubterraneaUte:Math.round(costoSubterraneo),
        totalMaterialesNeto:Math.round(totalMateriales), totalManoObraNeto:Math.round(totalManoObra), TOTAL:Math.round(totalMateriales+totalManoObra) } };
  }
};

function chkA(id,field,label,val){ return `<label class="chk"><input type="checkbox" ${val?'checked':''} onchange="setAmb(${id},'${field}',this.checked,true)"><span class="mark"></span>${label}</label>`; }
function addAmbiente(){ const p=proj(); p.ambientes.push({id:Date.now(), nombre:'', tipo:'dormitorio', tomas10a:0,tomasSchuko:0,tomasSchukoCorte:0,interruptoresCombinados:0,modulosUsb:0,lucesLed:0,panelesLed:0,sensoresMovimiento:0,reflectoresLed:0,tieneHornoAnafe:false,tieneTermofon:false,tieneBombaOFiltrado:false}); saveDB(); renderAmbientes(); }
function setAmb(id,field,val,rerender){ const p=proj(), a=p.ambientes.find(x=>x.id===id); if(!a)return; a[field]=val; saveDB(); if(rerender) renderAmbientes(); }
function delAmb(id){ const p=proj(); p.ambientes=p.ambientes.filter(x=>x.id!==id); saveDB(); renderAmbientes(); }

  let alerts = ing.alertasSeguridad.map(a=>{ const crit=a.startsWith('CRÍTICO'); return `<div class="alert ${crit?'crit':''}"><span class="at">${crit?'CRÍTICO · ':''}</span>${esc(a.replace(/^CRÍTICO: /,''))}</div>`; }).join('');
  document.getElementById('tab-ingenieria').innerHTML = `
    ${ing.requiereMedidaIndirecta?'<div class="alert crit"><span class="at">Medida indirecta obligatoria (UTE)</span> — supera 40 kW: CM doble + CT + CI.</div>':''}

/* ==================== Export ==================== */
function exportExcel(){
  const p=proj(); if(!p) return; if(typeof XLSX==='undefined'){ toast('Necesitás conexión para el Excel'); return; }
  const r=CorePresupuesto.calcularProyecto(p), c=r.costos, ing=r.ingenieriaTableros; const aoa=[];
  if(p.empresa) aoa.push([p.empresa]);
  if(p.telefono||p.electricistaNombre) aoa.push([[p.telefono&&('Tel: '+p.telefono),p.electricistaNombre].filter(Boolean).join(' · ')]);
  aoa.push(['PRESUPUESTO DE INSTALACIÓN ELÉCTRICA']); aoa.push([]);
  aoa.push(['Cliente', p.cliente]); aoa.push(['Obra', p.name]); aoa.push(['Dirección', p.ubicacion]);
  aoa.push(['Fecha', p.fecha]); if(p.presupuestoNro) aoa.push(['Presupuesto N.º', p.presupuestoNro]);
  aoa.push(['Línea de módulos', MARCA_LABELS[p.perfilCalidad]]); aoa.push([]);
  if(p.trabajos){ aoa.push(['TRABAJOS A REALIZAR']); p.trabajos.split('\n').forEach(l=>l.trim()&&aoa.push([l])); aoa.push([]); }
  // Lista de materiales (BOM)
  aoa.push(['LISTA DE MATERIALES ('+(MAT_MODO.find(x=>x[0]===p.materialesModo)||['','—'])[1]+')']);
  aoa.push(['Material','Cantidad','Unidad','P. unit.','Subtotal']);
  r.listaMateriales.forEach(m=>aoa.push([m.item, m.cant, m.unidad, m.precio, m.subtotal]));
  aoa.push([]); aoa.push(['Cable total (m, ×3 conductores)', r.materiales.cableMetros]);
  aoa.push(['Caño / canaleta total (m)', r.materiales.canoMetros]); aoa.push(['Bocas', r.totalBocas]);
  aoa.push([]); aoa.push(['COSTOS']);
  aoa.push(['Materiales', c.subtotalMateriales]);
  aoa.push(['Tableros y protecciones', c.subtotalTableros]);
  if(c.subtotalMedidaIndirecta>0) aoa.push(['Medida indirecta (UTE)', c.subtotalMedidaIndirecta]);
  if(c.subtotalInfraestructuraSubterraneaUte>0) aoa.push(['Infraestructura subterránea UTE', c.subtotalInfraestructuraSubterraneaUte]);
  aoa.push(['Mano de obra', c.totalManoObraNeto]);
  aoa.push(['TOTAL '+((IMPUESTOS.find(x=>x[0]===p.impuestos)||['','—'])[1]), c.TOTAL]);
  const ws=XLSX.utils.aoa_to_sheet(aoa); ws['!cols']=[{wch:36},{wch:12},{wch:9},{wch:12},{wch:13}];
  const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Presupuesto');
  XLSX.writeFile(wb, 'iLVolt_'+p.name.replace(/[^\w\-]+/g,'_')+'.xlsx'); toast('Excel generado');
}
function exportCSV(){
  const p=proj(); if(!p) return;
  const r=CorePresupuesto.calcularProyecto(p), c=r.costos; const R=[];
  if(p.empresa) R.push([p.empresa]);
  R.push(['Cliente',p.cliente]); R.push(['Obra',p.name]); R.push(['Direccion',p.ubicacion]); R.push(['Fecha',p.fecha]);
  if(p.presupuestoNro) R.push(['Presupuesto N',p.presupuestoNro]); R.push([]);
  R.push(['Material','Cantidad','Unidad','P.unit','Subtotal']);
  r.listaMateriales.forEach(m=>R.push([m.item,m.cant,m.unidad,m.precio,m.subtotal]));
  R.push([]); R.push(['Cable m (x3)',r.materiales.cableMetros]); R.push(['Cano/canaleta m',r.materiales.canoMetros]); R.push(['Bocas',r.totalBocas]);
  R.push([]); R.push(['Materiales',c.subtotalMateriales]); R.push(['Tableros y protecciones',c.subtotalTableros]);
  if(c.subtotalMedidaIndirecta>0) R.push(['Medida indirecta',c.subtotalMedidaIndirecta]);
  if(c.subtotalInfraestructuraSubterraneaUte>0) R.push(['Subterraneo UTE',c.subtotalInfraestructuraSubterraneaUte]);
  R.push(['Mano de obra',c.totalManoObraNeto]); R.push(['TOTAL',c.TOTAL]);
  const csv=R.map(row=>row.map(x=>{const s=String(x==null?'':x); return /[",;\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;}).join(';')).join('\n');
  const a=document.createElement('a'); a.download='iLVolt_'+p.name.replace(/[^\w\-]+/g,'_')+'.csv';
  a.href=URL.createObjectURL(new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'})); a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1500); toast('CSV generado');
}
